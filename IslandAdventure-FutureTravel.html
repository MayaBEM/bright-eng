<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5c45d8" />
<title>Bright EngMath — Word Quest</title>
<style>
/* =========================================================
   DESIGN TOKENS
========================================================= */
:root{
  --ink:#17213b; --ink-soft:#3c4256; --muted:#667085; --paper:#fffdf8;
  --surface:#ffffff; --line:#e8e7f1; --line-soft:#f0eff8;
  --purple:#5c45d8; --purple2:#8a6cff; --orange:#ff9f43;
  --green:#2bb673; --red:#e15b52;

  /* Island Adventure palette */
  --island-1:#0e8fa8; --island-2:#1fc3a6; --island-3:#fff3d6; --island-4:#2fae66; --island-5:#ffb648;
  /* Future Travel palette */
  --future-1:#241a5e; --future-2:#7c4dff; --future-3:#33e0ff; --future-4:#b9a8ff; --future-5:#ff8b7a;

  --accent:var(--purple); --accent-2:var(--purple2); --accent-soft:#f3f0ff; --accent-ink:#4f36bd;

  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:22px; --sp-6:32px; --sp-7:48px;
  --r-sm:12px; --r-md:18px; --r-lg:26px; --r-xl:32px; --r-pill:999px;
  --shadow-sm:0 6px 16px rgba(39,31,91,.08); --shadow-md:0 10px 28px rgba(39,31,91,.10); --shadow-lg:0 18px 50px rgba(39,31,91,.14);

  --font:-apple-system,BlinkMacSystemFont,"Segoe UI Rounded","Segoe UI","Noto Sans Thai",sans-serif;
  --dur-fast:180ms; --dur-med:320ms; --dur-slow:520ms; --ease:cubic-bezier(.22,1,.36,1);
}
[data-theme="island"]{--accent:var(--island-1);--accent-2:var(--island-2);--accent-soft:#e6fbf6;--accent-ink:#0b6f83;}
[data-theme="future"]{--accent:var(--future-2);--accent-2:var(--future-3);--accent-soft:#f1edff;--accent-ink:#4a34a8;}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;font-family:var(--font);color:var(--ink);-webkit-text-size-adjust:100%;
  background:
    radial-gradient(circle at 10% 0%,rgba(99,219,255,.24),transparent 30%),
    radial-gradient(circle at 95% 10%,rgba(145,114,255,.20),transparent 30%),
    linear-gradient(180deg,#f7fbff 0%,#fffaf2 100%);
  padding-bottom:env(safe-area-inset-bottom);
  transition:background var(--dur-slow) var(--ease);
}
body[data-theme="island"]{background:radial-gradient(circle at 8% 0%,rgba(31,195,166,.22),transparent 32%),radial-gradient(circle at 96% 6%,rgba(14,143,168,.18),transparent 32%),linear-gradient(180deg,#f2fdfb 0%,#fffdf3 100%)}
body[data-theme="future"]{background:radial-gradient(circle at 6% 0%,rgba(124,77,255,.22),transparent 34%),radial-gradient(circle at 96% 8%,rgba(51,224,255,.18),transparent 30%),linear-gradient(180deg,#f4f2ff 0%,#fbfaff 100%)}
button,input{font:inherit}
button{border:0;cursor:pointer;background:none;color:inherit}
img,svg{display:block;max-width:100%}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* Focus states */
:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px;border-radius:8px}
button:focus:not(:focus-visible){outline:none}

.app{width:min(1120px,100%);margin:auto;padding:calc(env(safe-area-inset-top) + 14px) clamp(14px,4vw,34px) 44px;position:relative;z-index:1}

/* =========================================================
   TOPBAR
========================================================= */
.topbar{position:sticky;top:calc(env(safe-area-inset-top) + 8px);z-index:30;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(16px);border-radius:20px;box-shadow:var(--shadow-sm)}
.brand{display:flex;gap:10px;align-items:center;font-weight:900;letter-spacing:-.02em;padding:4px;border-radius:14px}
.brand-mark{width:36px;height:36px;flex:none;display:grid;place-items:center;border-radius:13px;background:linear-gradient(145deg,var(--purple),#9f7dff);color:#fff;box-shadow:0 8px 18px rgba(92,69,216,.3);font-size:1rem}
.brand small{display:block;color:var(--muted);font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.pill{display:flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-ink);padding:8px 12px;border-radius:var(--r-pill);font-weight:800;font-size:.84rem;white-space:nowrap}
.pill.star-pill{transition:transform var(--dur-fast) var(--ease)}
.pill.star-pill.bump{animation:pill-bump .4s var(--ease)}
@keyframes pill-bump{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
main{padding-top:20px}

/* =========================================================
   BUTTONS
========================================================= */
.primary,.secondary,.ghost,.icon-btn{border-radius:var(--r-md);font-weight:900;transition:transform var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease);min-height:48px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.primary,.secondary,.ghost{padding:13px 20px}
.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 10px 22px rgba(92,69,216,.22)}
.secondary{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.ghost{background:transparent;color:var(--muted)}
.primary:hover,.secondary:hover{transform:translateY(-2px)}
.primary:active,.secondary:active,.ghost:active{transform:translateY(0) scale(.97)}
.primary:disabled,.secondary:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none}
.icon-btn{width:48px;height:48px;border-radius:16px;background:#fff;border:1.5px solid var(--line);color:var(--ink);font-size:1.2rem;padding:0;flex:none}
.icon-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.icon-btn:active{transform:scale(.94)}
.wide{min-width:170px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}

/* =========================================================
   DECORATIVE SCENES (background, theme specific, subtle)
========================================================= */
.deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;display:none}
body[data-theme="island"] .deco.deco-island{display:block}
body[data-theme="future"] .deco.deco-future{display:block}
.deco-island .cloud{position:absolute;background:#fff;border-radius:60px;opacity:.55;filter:blur(.3px);animation:drift 46s ease-in-out infinite alternate}
.deco-island .cloud:before,.deco-island .cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
.cloud-a{width:120px;height:38px;top:10%;left:-5%}.cloud-a:before{width:60px;height:60px;top:-28px;left:12px}.cloud-a:after{width:44px;height:44px;top:-18px;left:60px}
.cloud-b{width:90px;height:30px;top:26%;right:2%;animation-delay:6s}.cloud-b:before{width:44px;height:44px;top:-20px;left:8px}.cloud-b:after{width:34px;height:34px;top:-14px;left:44px}
.cloud-c{width:100px;height:32px;top:62%;left:4%;animation-delay:14s;opacity:.4}.cloud-c:before{width:48px;height:48px;top:-22px;left:10px}.cloud-c:after{width:36px;height:36px;top:-14px;left:50px}
.deco-island .leaf{position:absolute;width:20px;height:34px;background:linear-gradient(160deg,var(--island-4),#7fd79c);border-radius:0 60% 0 60%;opacity:.35;animation:leaf-sway 12s ease-in-out infinite}
.leaf-a{top:38%;right:8%;animation-delay:0s}.leaf-b{top:74%;right:16%;animation-delay:3s;transform:rotate(40deg)}.leaf-c{top:15%;right:22%;animation-delay:6s;transform:rotate(-25deg)}
.deco-island .wave{position:absolute;left:-10%;right:-10%;bottom:-4%;height:90px;background:linear-gradient(180deg,rgba(31,195,166,.14),rgba(14,143,168,.05));border-radius:50%;animation:wave-bob 9s ease-in-out infinite}
@keyframes drift{to{transform:translateX(40px)}}
@keyframes leaf-sway{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(14px) rotate(8deg)}}
@keyframes wave-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.deco-future .star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 6px 1px rgba(255,255,255,.8);opacity:.6;animation:twinkle 5s ease-in-out infinite}
.deco-future .orbit{position:absolute;border:1.5px solid rgba(124,77,255,.18);border-radius:50%;animation:spin 70s linear infinite}
.orbit-a{width:340px;height:340px;top:-60px;right:-90px}
.orbit-b{width:220px;height:220px;bottom:6%;left:-60px;animation-duration:90s;animation-direction:reverse;border-color:rgba(51,224,255,.18)}
.deco-future .route{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(51,224,255,.4),transparent);opacity:.5;animation:route-glow 6s ease-in-out infinite}
.route-a{top:20%;left:0;width:60%}.route-b{bottom:24%;right:0;width:50%;animation-delay:2s}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes route-glow{0%,100%{opacity:.15}50%{opacity:.6}}

/* =========================================================
   ANIMATION UTILITIES
========================================================= */
.fade-up{animation:fadeUp var(--dur-slow) var(--ease) both}
.stagger > *{animation:fadeUp var(--dur-med) var(--ease) both}
.stagger > *:nth-child(1){animation-delay:.02s}.stagger > *:nth-child(2){animation-delay:.08s}
.stagger > *:nth-child(3){animation-delay:.14s}.stagger > *:nth-child(4){animation-delay:.2s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pop-in{animation:popIn var(--dur-med) var(--ease) both}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.shake{animation:shakeX .4s var(--ease)}
@keyframes shakeX{15%{transform:translateX(-7px)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(3px)}75%{transform:translateX(-2px)}100%{transform:translateX(0)}}
.bounce-pop{animation:bouncePop .5s var(--ease)}
@keyframes bouncePop{0%{transform:scale(1)}35%{transform:scale(1.06)}60%{transform:scale(.98)}100%{transform:scale(1)}}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  .deco{display:none!important}
}

/* =========================================================
   HERO / HOME
========================================================= */
.hero{display:grid;grid-template-columns:1.12fr .88fr;gap:20px;align-items:stretch;margin:8px 0 24px}
.hero-copy,.hero-art{border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-lg)}
.hero-copy{padding:clamp(26px,5vw,52px);background:linear-gradient(145deg,#fff 5%,#f6f2ff 100%);border:1px solid #fff}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-pill);background:#fff3df;color:#a85800;font-weight:900;font-size:.8rem}
h1{margin:16px 0 6px;font-size:clamp(2.1rem,5.6vw,3.6rem);line-height:1.02;letter-spacing:-.04em}
h1 span{display:block;color:var(--purple);font-size:.62em;margin-top:2px}
.hero-copy p.lead{font-size:clamp(1rem,2vw,1.12rem);line-height:1.7;color:#4f5870;margin:0 0 4px;max-width:600px}
.name-card{margin-top:20px;padding:14px 16px;background:#fbfaff;border:1.5px dashed #d8d0f8;border-radius:var(--r-md)}
.name-card label{display:block;font-weight:850;font-size:.85rem;color:var(--ink-soft);margin-bottom:8px}
.name-card input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:14px;outline:none;font-size:1rem;background:#fff}
.name-card input:focus{border-color:#8a75e9;box-shadow:0 0 0 4px rgba(138,117,233,.14)}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.hero-art{position:relative;min-height:340px;background:linear-gradient(145deg,#6ad4f4 0%,#b5eff3 48%,#ffcb79 49%,#f6a85c 100%)}
.sun{position:absolute;right:12%;top:12%;width:72px;height:72px;border-radius:50%;background:#fff4a7;box-shadow:0 0 0 16px rgba(255,255,255,.16)}
.island{position:absolute;left:8%;bottom:7%;width:45%;height:26%;background:#45b770;border-radius:55% 52% 42% 44%;box-shadow:inset 0 -20px 0 rgba(21,105,69,.16)}
.future-city{position:absolute;right:6%;bottom:7%;width:38%;height:56%;display:flex;gap:7px;align-items:flex-end}
.tower{flex:1;border-radius:16px 16px 8px 8px;background:linear-gradient(180deg,#6d56df,#352d8a);box-shadow:inset 0 0 0 3px rgba(255,255,255,.15)}
.tower:nth-child(1){height:55%}.tower:nth-child(2){height:83%}.tower:nth-child(3){height:68%}
.float-icons{position:absolute;inset:0}
.float-icons span{position:absolute;display:grid;place-items:center;width:56px;height:56px;border-radius:20px;background:rgba(255,255,255,.9);font-size:1.7rem;box-shadow:0 12px 22px rgba(42,40,101,.14);animation:float 4.4s ease-in-out infinite}
.float-icons span:nth-child(1){left:9%;top:15%}.float-icons span:nth-child(2){left:42%;top:10%;animation-delay:.7s}.float-icons span:nth-child(3){left:34%;bottom:13%;animation-delay:1.2s}.float-icons span:nth-child(4){right:8%;top:17%;animation-delay:1.8s}
@keyframes float{50%{transform:translateY(-9px) rotate(2deg)}}

/* learning path preview */
.path-preview{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin:6px 0 30px;padding:16px;background:rgba(255,255,255,.7);border:1px solid #fff;border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.path-step{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:var(--r-pill);background:#fff;border:1.5px solid var(--line);font-weight:850;font-size:.86rem;color:var(--ink-soft)}
.path-step b{font-size:1.05rem}
.path-arrow{color:#c7c2e6;font-weight:900;padding:0 2px}

.section-head{display:flex;justify-content:space-between;align-items:end;gap:14px;margin:28px 0 14px}
.section-head h2{margin:0;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.03em}
.section-head p{margin:5px 0 0;color:var(--muted)}

.sets{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
.set-card{position:relative;min-height:340px;padding:24px;border-radius:var(--r-xl);color:#fff;overflow:hidden;box-shadow:var(--shadow-lg);isolation:isolate;text-align:left;display:flex;flex-direction:column}
.set-card:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(17,20,55,.6));z-index:-1}
.set-card.island-card{background:linear-gradient(145deg,#1fbcc8,#24b56b 58%,#f3b355)}
.set-card.future-card{background:linear-gradient(145deg,#5b45dc,#8d6cff 55%,#30b8e6)}
.set-top{display:flex;justify-content:space-between;align-items:flex-start}
.set-number{display:inline-grid;place-items:center;width:46px;height:46px;border-radius:16px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.28);font-size:1.2rem;font-weight:950;backdrop-filter:blur(10px)}
.set-deco{font-size:3.6rem;filter:drop-shadow(0 10px 10px rgba(0,0,0,.12))}
.set-card h3{font-size:clamp(1.5rem,3.6vw,2.2rem);letter-spacing:-.03em;margin:18px 0 3px}
.set-card p.sub{margin:0 0 14px;color:rgba(255,255,255,.86);font-weight:650;font-size:.95rem}
.set-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:auto}
.set-meta span{padding:7px 10px;border-radius:var(--r-pill);background:rgba(255,255,255,.18);font-size:.78rem;font-weight:800}
.set-stats{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:.85rem;font-weight:800}
.progress-line{height:9px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden;margin-top:10px}
.progress-line i{display:block;height:100%;background:#fff;border-radius:99px;transition:width var(--dur-slow) var(--ease)}
.set-card .set-cta{margin-top:14px;background:rgba(255,255,255,.94);color:var(--ink);font-weight:900;padding:12px;border-radius:var(--r-md);text-align:center;width:100%}
.set-card .set-cta:hover{transform:translateY(-2px)}

/* =========================================================
   PANEL / SET OVERVIEW
========================================================= */
.panel{background:rgba(255,255,255,.94);border:1px solid #fff;border-radius:var(--r-xl);padding:clamp(18px,4vw,32px);box-shadow:var(--shadow-lg)}
.back{display:inline-flex;align-items:center;gap:8px;color:#5649a5;background:#f5f2ff;padding:10px 14px;border-radius:13px;font-weight:850;margin-bottom:16px;min-height:44px}
.set-hero{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:22px;border-radius:var(--r-lg);color:#fff;margin-bottom:18px}
.set-hero.island-theme{background:linear-gradient(135deg,#159faa,#29bd72)}
.set-hero.future-theme{background:linear-gradient(135deg,#5b44d5,#8e70ff)}
.set-hero h2{margin:0 0 5px;font-size:clamp(1.5rem,3.6vw,2.4rem);letter-spacing:-.03em}
.set-hero p{margin:0;color:rgba(255,255,255,.85)}
.set-hero .big-icon{font-size:4rem}

.activity-path{display:flex;flex-direction:column;gap:12px;margin:18px 0}
.activity-card{position:relative;display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--r-lg);background:#fff;border:1.5px solid var(--line);box-shadow:var(--shadow-sm);transition:transform var(--dur-fast) var(--ease),box-shadow var(--dur-fast) var(--ease);text-align:left;width:100%}
.activity-card:hover:not(.is-locked){transform:translateY(-2px);box-shadow:var(--shadow-md)}
.activity-card:active:not(.is-locked){transform:scale(.99)}
.activity-card.is-locked{opacity:.55;cursor:not-allowed}
.activity-card.is-completed{border-color:#bfe9d3;background:linear-gradient(90deg,#f2fcf7,#fff)}
.a-icon{width:52px;height:52px;flex:none;border-radius:18px;display:grid;place-items:center;font-size:1.55rem;background:var(--accent-soft)}
.a-body{flex:1;min-width:0}
.a-body strong{display:block;font-size:1.02rem}
.a-body small{color:var(--muted);line-height:1.4;display:block;margin-top:2px}
.a-status{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.status-chip{font-size:.72rem;font-weight:900;padding:5px 9px;border-radius:var(--r-pill);letter-spacing:.02em}
.status-chip.locked{background:#f1f1f6;color:#8a8fa3}
.status-chip.available{background:#eef0ff;color:#4c4fd6}
.status-chip.completed{background:#e4f8ee;color:#1d8a55}
.connector{width:2px;height:14px;background:repeating-linear-gradient(0deg,#d9d5f3 0 4px,transparent 4px 8px);margin-left:42px}

.word-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}
.word-chip{background:#fbfbff;border:1px solid var(--line);padding:12px;border-radius:var(--r-md);display:flex;gap:9px;align-items:center;min-height:48px;text-align:left}
.word-chip:hover{border-color:var(--accent-2);transform:translateY(-1px)}
.word-chip b{font-size:1.3rem;flex:none}
.word-chip span{font-size:.86rem;font-weight:800;display:block;min-width:0}
.word-chip small{display:block;color:var(--muted);font-weight:600;margin-top:2px}

/* =========================================================
   QUIZ SHELL / SHARED QUESTION UI
========================================================= */
.quiz-shell{max-width:760px;margin:auto}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.quiz-head h2{margin:0;font-size:clamp(1.15rem,4vw,1.7rem)}
.meter{height:11px;background:#eceaf6;border-radius:99px;overflow:hidden;margin-bottom:16px}
.meter span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width var(--dur-slow) var(--ease)}

.question-card{min-height:420px;padding:clamp(20px,5vw,40px);border-radius:var(--r-xl);background:linear-gradient(145deg,#fff,#faf8ff);border:1px solid #fff;box-shadow:var(--shadow-lg);text-align:center;display:flex;flex-direction:column;justify-content:center}
.question-card.challenge{border:1.5px solid var(--accent-2)}
.q-icon-badge{width:88px;height:88px;margin:0 auto 8px;border-radius:28px;display:grid;place-items:center;font-size:3rem;background:var(--accent-soft)}
.q-label{font-size:.78rem;font-weight:900;letter-spacing:.09em;text-transform:uppercase;color:var(--accent)}
.q-word{font-size:clamp(1.9rem,7vw,3.6rem);font-weight:950;letter-spacing:-.04em;margin:6px 0;word-break:break-word}
.q-sub{color:var(--muted);margin:0 0 18px;font-size:.98rem}

.options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.option{padding:15px 14px;border-radius:var(--r-md);background:#fff;border:2px solid #eceaf3;font-weight:800;color:var(--ink);transition:transform var(--dur-fast) var(--ease),border-color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease);min-height:56px;display:flex;align-items:center;gap:10px;text-align:left}

========================================================= */

<script>
/* =========================================================
   DATA
========================================================= */
const SETS = {

    number: 1, title: 'Island Adventure', subtitle: 'ผจญภัยตามล่าหาสมบัติ', icon: '🏝️', theme: 'island-theme', themeKey:'island',
    words: [

/* =========================================================
   STATE + PERSISTENCE  (localStorage keys preserved)
========================================================= */
const app = document.getElementById('app');
let state = {setId:null, mode:null, index:0, flashIndex:0, questions:[], score:0, answers:[], locked:false, lastResult:null, reviewList:null, reviewIndex:0};
let progress = JSON.parse(localStorage.getItem('be-word-quest-progress') || '{}');
let stars = Number(localStorage.getItem('be-word-quest-stars') || 0);
let studentName = localStorage.getItem('be-word-quest-name') || '';
updateStars();

function updateStars(){document.getElementById('starCount').textContent = `${stars} stars`;}
function bumpStarPill(){const el=document.getElementById('starPill');if(!el)return;el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');}
function addStars(n){
  stars += n;
  localStorage.setItem('be-word-quest-stars', stars);
  if(state.setId){
    progress[state.setId] = progress[state.setId] || {};
    progress[state.setId].stars = (progress[state.setId].stars || 0) + n;
    saveProgress();
  }
  updateStars();
  bumpStarPill();
}
function saveProgress(){localStorage.setItem('be-word-quest-progress', JSON.stringify(progress));}
function saveName(name){studentName=name;localStorage.setItem('be-word-quest-name',name);}
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}
function normalize(s){return s.toLowerCase().trim().replace(/[\s-]+/g,'').replace(/[^a-z]/g,'')}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function jsStr(s){return String(s).replaceAll('\\','\\\\').replaceAll("'","\\'")}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastT);window.__toastT=setTimeout(()=>el.classList.remove('show'),1900)}

let currentUtterance = null;
function speak(text, rate){
  rate = rate || .8;
  if(!('speechSynthesis' in window)){toast('อุปกรณ์นี้ไม่รองรับเสียงอ่าน');return}
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = rate; u.pitch = 1;
  const btn = document.querySelector('.audio-button');
  u.onstart = ()=>{ if(btn) btn.classList.add('is-playing'); };
  u.onend = u.onerror = ()=>{ if(btn) btn.classList.remove('is-playing'); };
  currentUtterance = u;
  speechSynthesis.speak(u);
}

function setProgress(id){
  const p = progress[id] || {};
  const done = ['learn','meaning','dictation','challenge'].filter(k=>p[k]).length;
  return {done, pct: Math.round(done/4*100), stars: p.stars||0};
}
function activityStatus(setId, key){
  const p = progress[setId] || {};
  if(p[key]) return 'completed';
  if(key === 'challenge') return (p.meaning && p.dictation) ? 'available' : 'locked';
  return 'available';
}

function setTheme(key){
  if(key){ document.body.dataset.theme = key; } else { delete document.body.dataset.theme; }
}

/* =========================================================
   GLOBAL LISTENERS (attached once — no duplicates on re-render)
========================================================= */
function attachGlobalListenersOnce(){
  if(window.__wqListeners) return;
  window.__wqListeners = true;
  let touchX = null;
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest('.flashcard');
    if(!card) { touchX = null; return; }
    touchX = e.touches[0].clientX;
  }, {passive:true});
  document.addEventListener('touchend', e=>{
    if(touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    touchX = null;
    if(Math.abs(dx) < 46) return;
    if(dx < 0) nextCard(); else prevCard();
  }, {passive:true});
  document.addEventListener('keydown', e=>{
    if(!document.querySelector('.flashcard')) return;
    if(e.key === 'ArrowRight') nextCard();
    if(e.key === 'ArrowLeft') prevCard();
  });
}
attachGlobalListenersOnce();

/* =========================================================
   HOME
========================================================= */
function goHome(){
  speechSynthesis && speechSynthesis.cancel();

}

      const p = setProgress(id);
      const cta = p.done===0 ? 'เริ่มเรียนเลย →' : (p.done<4 ? 'เรียนต่อ →' : 'ทบทวนอีกครั้ง ↻');
      return `<div class="set-card ${id}-card pop-in">
        <div class="set-top"><span class="set-number">${s.number}</span><span class="set-deco" aria-hidden="true">${s.icon}</span></div>
        <h3>${s.title}</h3>
        <p class="sub">${s.subtitle} · ${s.words.length} คำ</p>
        <div class="set-meta"><span>🔊 ฟังเสียง</span><span>✍️ Dictation</span><span>🧠 Meaning</span></div>
        <div class="set-stats"><span>ความคืบหน้า ${p.pct}%</span><span>⭐ ${p.stars}</span></div>
        <div class="progress-line"><i style="width:${p.pct}%"></i></div>
        <button class="set-cta" onclick="openSet('${id}')">${cta}</button>
      </div>`;
    }).join('')}</div>
  </section>`;
}

/* =========================================================
   SET OVERVIEW
========================================================= */
function activityMeta(mode){
  return {
    learn:      {icon:'🃏', title:'Learn the Words',  desc:'อ่านคำศัพท์ ดูไอพีเอ ฟังเสียง และดูตัวอย่างประโยค'},
    meaning:    {icon:'🧠', title:'Read & Match',      desc:'อ่านคำศัพท์แล้วเลือกความหมายภาษาไทยที่ถูกต้อง'},
    dictation:  {icon:'🎧', title:'Listen & Type',     desc:'ฟังเสียงแล้วพิมพ์คำศัพท์ตามคำบอก'},
    challenge:  {icon:'🏆', title:'Final Challenge',   desc:'โจทย์ผสมอ่าน + ฟัง 10 ข้อ เก็บดาวให้ครบ'}
  }[mode];
}

function openSet(id){
  state.setId = id; state.mode = null;
  const s = SETS[id]; const p = setProgress(id);
  setTheme(s.themeKey);
  const modes = ['learn','meaning','dictation','challenge'];
  app.innerHTML = `<section class="panel fade-up">
    <button class="back" onclick="goHome()">← กลับหน้าหลัก</button>
    <div class="set-hero ${s.theme}">
      <div>
        <div class="eyebrow" style="background:rgba(255,255,255,.18);color:#fff">SET ${s.number} · ${s.words.length} WORDS</div>
        <h2>${s.title}</h2>
        <p>${s.subtitle} · ทำครบ 4 ภารกิจเพื่อเก็บความคืบหน้า 100%</p>
      </div>
      <div class="big-icon" aria-hidden="true">${s.icon}</div>
    </div>
    <div class="section-head"><div><h2>เส้นทางการเรียน</h2><p>เริ่มจาก Learn แล้วค่อยไปทีละภารกิจตามลำดับ</p></div><div class="pill">${p.pct}% complete</div></div>
    <div class="activity-path stagger">
      ${modes.map((m,i)=>{
        const meta = activityMeta(m);
        const st = activityStatus(id, m);
        const chip = st==='locked' ? '<span class="status-chip locked">🔒 ล็อกอยู่</span>' : st==='completed' ? '<span class="status-chip completed">✅ เสร็จแล้ว</span>' : '<span class="status-chip available">▶ พร้อมเริ่ม</span>';
        const cardHtml = `<button class="activity-card ${st==='locked'?'is-locked':''} ${st==='completed'?'is-completed':''}" ${st==='locked'?'aria-disabled="true"':''} onclick="${st==='locked'?`toast('ทำภารกิจก่อนหน้าให้ครบก่อนนะ 🙂')`:`startMode('${m}')`}">
          <span class="a-icon" aria-hidden="true">${st==='completed'?'✅':meta.icon}</span>
          <span class="a-body"><strong>${meta.title}</strong><small>${meta.desc}</small></span>
          <span class="a-status">${chip}</span>
        </button>`;
        return i>0 ? `<div class="connector" aria-hidden="true"></div>${cardHtml}` : cardHtml;
      }).join('')}
    </div>
    <div class="section-head"><div><h2>Word List</h2><p>แตะคำศัพท์เพื่อฟังเสียงได้ทันที</p></div></div>
    <div class="word-grid">${s.words.map(w=>`<button class="word-chip" onclick="speak('${jsStr(w.word)}')" aria-label="ฟังคำว่า ${esc(w.word)}"><b aria-hidden="true">${w.icon}</b><span>${w.word}<small>${w.th}</small></span></button>`).join('')}</div>
  </section>`;
  window.scrollTo({top:0, behavior:'smooth'});
}

/* =========================================================
   MODE ROUTER
========================================================= */
function startMode(mode){
  const st = activityStatus(state.setId, mode);
  if(st === 'locked'){ toast('ทำภารกิจก่อนหน้าให้ครบก่อนนะ 🙂'); return; }
  state.mode = mode; state.index = 0; state.score = 0; state.answers = []; state.locked = false;
  if(mode === 'learn'){ state.flashIndex = 0; renderFlashcard(); return; }
  buildQuestions(mode);
  renderQuestion();
}
function buildQuestions(mode){
  const words = SETS[state.setId].words;
  if(mode === 'meaning'){ state.questions = shuffle(words).map(w=>({type:'meaning', item:w})); }
  else if(mode === 'dictation'){ state.questions = shuffle(words).map(w=>({type:'dictation', item:w})); }
  else { state.questions = shuffle(words).slice(0,10).map((w,i)=>({type: i%2===0 ? 'meaning' : 'dictation', item:w})); }
}

/* =========================================================
   LEARN CARDS (flashcards)
========================================================= */
function isLearned(setId, word){ return !!((progress[setId] && progress[setId].learnedWords) || {})[word]; }
function toggleLearned(word){
  progress[state.setId] = progress[state.setId] || {};
  progress[state.setId].learnedWords = progress[state.setId].learnedWords || {};
  const already = progress[state.setId].learnedWords[word];
  if(already){ delete progress[state.setId].learnedWords[word]; }
  else { progress[state.setId].learnedWords[word] = true; addStars(1); }
  saveProgress();
  renderFlashcard();
}

function renderFlashcard(){
  const s = SETS[state.setId], w = s.words[state.flashIndex];
  const learned = isLearned(state.setId, w.word);
  app.innerHTML = `<section class="quiz-shell">
    <div class="quiz-head">
      <button class="back" onclick="openSet('${state.setId}')">← เลือกโหมด</button>
      <div class="pill">${state.flashIndex+1} / ${s.words.length}</div>
    </div>
    <div class="meter" role="progressbar" aria-valuenow="${state.flashIndex+1}" aria-valuemin="0" aria-valuemax="${s.words.length}"><span style="width:${(state.flashIndex+1)/s.words.length*100}%"></span></div>
    <div class="flashcard pop-in" key="${state.flashIndex}">
      <div class="flash-index">Word ${state.flashIndex+1}</div>
      <div class="flash-icon-wrap" aria-hidden="true"><div class="flash-icon">${w.icon}</div></div>
      <div class="flash-word">${w.word}</div>
      <div class="ipa">${w.ipa}</div>
      <div class="meaning">${w.th}</div>
      <p class="example">“${w.ex}”</p>
      <div class="audio-row">
        <button class="primary" onclick="speak('${jsStr(w.word)}')" aria-label="ฟังคำศัพท์">🔊 ฟังคำศัพท์</button>
        <button class="secondary" onclick="speak('${jsStr(w.word)}',.55)" aria-label="ฟังคำศัพท์แบบช้า">🐢 ฟังช้า</button>
        <button class="secondary" onclick="speak('${jsStr(w.ex)}',.85)" aria-label="ฟังประโยคตัวอย่าง">💬 ฟังประโยค</button>
      </div>
      <button class="mark-learned" aria-pressed="${learned}" onclick="toggleLearned('${jsStr(w.word)}')">${learned ? '✅ จำได้แล้ว' : '☐ ทำเครื่องหมายว่าจำได้แล้ว'}</button>
    </div>
    <div class="card-nav">
      <button class="secondary icon-btn" onclick="prevCard()" aria-label="คำก่อนหน้า" ${state.flashIndex===0?'disabled':''}>←</button>
      <span class="count">${state.flashIndex+1} of ${s.words.length}</span>
      <button class="primary" onclick="nextCard()">${state.flashIndex===s.words.length-1?'จบการเรียน 🎉':'คำถัดไป →'}</button>
    </div>
  </section>`;
}
function prevCard(){ if(state.flashIndex>0){ state.flashIndex--; renderFlashcard(); } }
function nextCard(){
  const s = SETS[state.setId];
  if(state.flashIndex < s.words.length-1){ state.flashIndex++; renderFlashcard(); }
  else { completeMode('learn'); renderLearnComplete(); }
}
function renderLearnComplete(){
  app.innerHTML = `<section class="panel result-card fade-up">
    <div class="trophy">🌟</div>
    <h2>เรียนครบทุกคำแล้ว!</h2>
    <p>ลองต่อด้วย Read &amp; Match หรือ Listen &amp; Type เพื่อเช็กว่าจำได้จริงไหม</p>
    <div class="hero-actions" style="justify-content:center">
      <button class="primary" onclick="startMode('meaning')">ไป Read &amp; Match</button>
      <button class="secondary" onclick="openSet('${state.setId}')">เลือกโหมดอื่น</button>
    </div>
  </section>`;
}

/* =========================================================
   QUESTIONS (Read & Match / Listen & Type / Final Challenge)
========================================================= */
function questionHeaderLabel(){
  if(state.mode === 'meaning') return 'READ & MATCH';
  if(state.mode === 'dictation') return 'LISTEN & TYPE';
  return 'FINAL CHALLENGE';
}
function questionTitle(){
  if(state.mode === 'meaning') return 'Read & Match';
  if(state.mode === 'dictation') return 'Listen & Type';
  return 'Final Challenge';
}

function renderQuestion(){
  const q = state.questions[state.index];
  const total = state.questions.length;
  const w = q.item;
  const isChallenge = state.mode === 'challenge';
  app.innerHTML = `<section class="quiz-shell">
    <div class="quiz-head">
      <button class="back" onclick="openSet('${state.setId}')">← ออกจากแบบฝึก</button>
      <div class="pill">⭐ ${state.score} คะแนน</div>
    </div>
    <div class="meter" role="progressbar" aria-valuenow="${state.index}" aria-valuemin="0" aria-valuemax="${total}"><span style="width:${(state.index)/total*100}%"></span></div>
    <div class="question-card pop-in ${isChallenge?'challenge':''}">
      <div class="q-label">${questionHeaderLabel()} · ${state.index+1} / ${total}</div>
      ${q.type==='meaning' ? meaningQuestion(w) : dictationQuestion(w)}
      <div class="feedback-panel" id="feedback" hidden></div>
      <div class="next-btn-row" id="nextRow" hidden><button class="primary wide" onclick="nextQuestion()">ข้อถัดไป →</button></div>
    </div>
  </section>`;
  state.locked = false;
  if(q.type === 'dictation'){
    const input = document.getElementById('answerInput');
    if(input){ setTimeout(()=>{ try{ input.focus({preventScroll:true}); }catch(e){} }, 200); }
  }
}

function meaningQuestion(w){
  const pool = shuffle(SETS[state.setId].words.filter(x=>x.word!==w.word)).slice(0,3);
  const opts = shuffle([w, ...pool]);
  const letters = ['A','B','C','D'];
  return `<div class="q-icon-badge" aria-hidden="true">${w.icon}</div>
    <div class="q-word">${w.word}</div>
    <p class="q-sub">คำนี้มีความหมายว่าอะไร?</p>
    <div class="options" role="group" aria-label="ตัวเลือกความหมาย">
      ${opts.map((o,i)=>`<button class="option" data-correct="${o.word===w.word}" data-th="${esc(o.th)}" data-word="${esc(w.word)}" onclick="answerMeaning(this,${o.word===w.word})">
        <span class="opt-mark" aria-hidden="true">${letters[i]}</span><span>${o.th}</span>
      </button>`).join('')}
    </div>`;
}
function dictationQuestion(w){
  const letters = w.word.split('').map(ch => ch===' ' ? '<span class="space">&nbsp;</span>' : ch==='-' ? '<span>-</span>' : '<span>&nbsp;</span>').join('');
  return `<button class="audio-button" onclick="speak('${jsStr(w.word)}')" aria-label="ฟังคำศัพท์">🔊</button>
    <div class="audio-row">
      <button class="mini-btn" onclick="speak('${jsStr(w.word)}')" aria-label="ฟังอีกครั้ง">🔁 ฟังอีกครั้ง</button>
      <button class="mini-btn" onclick="speak('${jsStr(w.word)}',.55)" aria-label="ฟังคำศัพท์แบบช้า">🐢 ฟังช้า</button>
      <button class="mini-btn" onclick="toggleHint()" aria-label="ดูคำใบ้ความหมาย">💡 คำใบ้</button>
    </div>
    <p class="q-sub" id="hint" hidden>${w.icon} ${w.th}</p>
    <div class="letter-hint" aria-hidden="true">${letters}</div>
    <label class="sr-only" for="answerInput">พิมพ์คำศัพท์ที่ได้ยิน</label>
    <input id="answerInput" class="answer-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="พิมพ์คำศัพท์ที่ได้ยิน" onkeydown="if(event.key==='Enter')submitDictation()">
    <div class="submit-row"><button class="primary wide" onclick="submitDictation()">ตรวจคำตอบ</button></div>`;
}
function toggleHint(){ const h=document.getElementById('hint'); if(h) h.hidden = !h.hidden; }

function answerMeaning(btn, correct){
  if(state.locked) return;
  state.locked = true;
  document.querySelectorAll('.option').forEach(b=>{
    b.disabled = true;
    if(b.dataset.correct === 'true') b.classList.add('is-correct');
  });
  if(!correct) btn.classList.add('is-wrong');
  const item = state.questions[state.index].item;
  recordAnswer(correct, btn.querySelector('span:last-child').textContent.trim());
  showFeedback(correct, correct ? '' : `ความหมายที่ถูกต้องของ “${item.word}” คือ “${item.th}”`);
}
function submitDictation(){
  if(state.locked) return;
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if(!val){ toast('พิมพ์คำตอบก่อนนะ'); return; }
  state.locked = true;
  const word = state.questions[state.index].item.word;
  const correct = normalize(val) === normalize(word);
  input.classList.add(correct ? 'is-good' : 'is-bad');
  input.disabled = true;
  recordAnswer(correct, val);
  let extra = '';
  if(!correct){
    extra = `<div style="margin-top:8px">คำที่ถูกต้องคือ:<br><span class="diff-word">${diffHTML(word, val)}</span></div>`;
  }
  showFeedback(correct, extra);
}
function diffHTML(correct, given){
  const g = (given||'').toLowerCase();
  let out = '';
  for(let i=0;i<correct.length;i++){
    const c = correct[i];
    const match = g[i] && g[i] === c.toLowerCase();
    out += `<span class="${match?'diff-ok':'diff-bad'}">${esc(c)}</span>`;
  }
  return out;
}
function recordAnswer(correct, given){
  const item = state.questions[state.index].item;
  if(correct){ state.score++; addStars(2); }
  state.answers.push({word:item.word, th:item.th, given, correct});
}
function showFeedback(correct, extraHtml){
  const f = document.getElementById('feedback');
  const card = document.querySelector('.question-card');
  f.hidden = false;
  f.className = 'feedback-panel ' + (correct ? 'good' : 'bad');
  f.innerHTML = `<span class="f-icon" aria-hidden="true">${correct?'✅':'❌'}</span><span><b>${correct ? 'เก่งมาก! ตอบถูกต้อง +2 ดาว ✨' : 'ยังไม่ถูก ลองดูเฉลยด้านล่าง'}</b>${extraHtml||''}</span>`;
  if(card){ card.classList.remove('bounce-pop','shake'); void card.offsetWidth; card.classList.add(correct ? 'bounce-pop' : 'shake'); }
  document.getElementById('nextRow').hidden = false;
  const btn = document.querySelector('#nextRow button');
  if(btn){ try{ btn.focus({preventScroll:true}); }catch(e){} }
}
function nextQuestion(){
  state.index++;
  if(state.index >= state.questions.length){ completeMode(state.mode); renderResults(); }
  else renderQuestion();
}
function completeMode(mode){
  progress[state.setId] = progress[state.setId] || {};
  progress[state.setId][mode] = true;
  progress[state.setId][`${mode}Best`] = Math.max(progress[state.setId][`${mode}Best`]||0, state.score);
  saveProgress();
  addStars(5);
}

/* =========================================================
   RESULTS
========================================================= */
function starsForPct(pct){ return pct>=90 ? 3 : pct>=60 ? 2 : 1; }
function maybeConfetti(pct){
  if(pct < 80) return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  const colors = ['#5c45d8','#ff9f43','#2bb673','#33e0ff','#ff8b7a'];
  for(let i=0;i<26;i++){
    const p = document.createElement('span');
    p.style.left = Math.random()*100 + '%';
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random()*.35) + 's';
    layer.appendChild(p);
  }
  document.body.appendChild(layer);
  setTimeout(()=>layer.remove(), 2400);
}

function renderResults(){
  const total = state.questions.length;
  const pct = Math.round(state.score/total*100);
  const wrong = state.answers.filter(a=>!a.correct);
  const nStars = starsForPct(pct);
  const mood = pct===100 ? '🏆' : pct>=80 ? '🌟' : pct>=60 ? '💪' : '🌱';
  const message = pct===100 ? 'Perfect! จำได้ครบทุกคำ' : pct>=80 ? 'ยอดเยี่ยม ใกล้เต็มแล้ว' : pct>=60 ? 'ทำได้ดี ทบทวนอีกนิด' : 'เริ่มต้นดี ลองกลับไปดู Learn Cards';
  const set = SETS[state.setId];

  state.lastResult = {setId:state.setId, mode:state.mode, questions:state.questions, answers:state.answers, score:state.score};

  app.innerHTML = `<section class="panel result-card fade-up">
    <div class="cert-card pop-in" id="certCard">
      <div class="trophy">${mood}</div>
      <div class="score">${state.score}/${total}</div>
      <p class="score-pct">${pct}% ถูกต้อง</p>
      <div class="stars-row" aria-hidden="true">${Array.from({length:3}).map((_,i)=>`<span class="star">${i<nStars?'⭐':'☆'}</span>`).join('')}</div>
      <h2>${message}</h2>
      <p>${set.title} · ${questionTitle()}</p>
      <p class="cert-meta">ชื่อนักเรียน: ${esc(studentName || '—')}<br>ตอบถูก ${state.score} จาก ${total} ข้อ</p>
      <p class="cert-brand">Bright EngMath · Word Quest 🎓</p>
    </div>
    <div class="name-row">
      <input id="studentName" placeholder="ชื่อนักเรียน (สำหรับสรุปรายงาน)" value="${esc(studentName)}" oninput="saveName(this.value)">
      <button class="secondary" onclick="buildReport()">สร้างสรุป</button>
    </div>
    ${wrong.length ? `<div class="mistakes"><h3>คำที่ควรทบทวน (${wrong.length})</h3>${wrong.map(x=>`<div class="mistake"><b>ตอบ: ${esc(x.given||'-')}</b><span>คำที่ถูก: ${x.word} — ${x.th}</span></div>`).join('')}</div>` : `<p style="font-weight:900;color:#178652;margin-top:16px">ไม่มีคำตอบผิด 🎉</p>`}
    <div id="reportArea"></div>
    <div class="hero-actions" style="justify-content:center;margin-top:18px">
      ${wrong.length ? `<button class="secondary" onclick="startReview()">🔁 Review mistakes</button>` : ''}
      <button class="primary" onclick="startMode('${state.mode}')">ลองอีกครั้ง</button>
      <button class="secondary" onclick="openSet('${state.setId}')">กลับหน้าเซต</button>
      <button class="ghost" onclick="goHome()">🏠 หน้าหลัก</button>
    </div>
  </section>`;
  window.scrollTo({top:0, behavior:'smooth'});
  maybeConfetti(pct);
}

function buildReport(){
  const name = (document.getElementById('studentName').value.trim()) || 'นักเรียน';
  saveName(name);
  const total = state.questions.length;
  const wrong = state.answers.filter(a=>!a.correct);
  const set = SETS[state.setId];
  const mode = state.mode==='meaning' ? 'อ่านและจับคู่ความหมาย' : state.mode==='dictation' ? 'ฟังและเขียนตามคำบอก' : 'แบบทดสอบรวม';
  const report = `รายงานคำศัพท์ Bright EngMath\nชื่อนักเรียน: ${name}\nชุดคำศัพท์: ${set.title}\nโหมด: ${mode}\nคะแนน: ${state.score}/${total}\n${wrong.length ? `คำที่ควรทบทวน: ${wrong.map(x=>x.word).join(', ')}` : 'ผลการเรียน: ตอบถูกครบทุกข้อ'}\nคำแนะนำ: ${wrong.length ? 'ฟังเสียงและเขียนคำที่ผิดซ้ำคำละ 2–3 รอบ' : 'ไปต่อชุดถัดไปหรือทำ Final Challenge เพื่อย้ำความจำ'}`;
  document.getElementById('reportArea').innerHTML = `<div class="report-box" id="reportText">${esc(report)}</div><button class="secondary" style="margin-top:10px" onclick="copyReport()">📋 คัดลอกรายงาน</button>`;
}
function copyReport(){
  const t = document.getElementById('reportText').textContent;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>toast('คัดลอกรายงานแล้ว')).catch(()=>toast('กดค้างเพื่อคัดลอกข้อความ'));
  } else { toast('กดค้างเพื่อคัดลอกข้อความ'); }
}

/* =========================================================
   REVIEW MISTAKES (mini flashcard loop over wrong words)
========================================================= */
function startReview(){
  const wrong = state.answers.filter(a=>!a.correct);
  if(!wrong.length){ toast('ไม่มีคำที่ต้องทบทวนแล้ว 🎉'); return; }
  state.reviewList = wrong.map(a => SETS[state.setId].words.find(w=>w.word===a.word)).filter(Boolean);
  state.reviewIndex = 0;
  renderReviewCard();
}
function renderReviewCard(){
  const list = state.reviewList; const w = list[state.reviewIndex];
  app.innerHTML = `<section class="quiz-shell">
    <div class="quiz-head">
      <button class="back" onclick="renderResults()">← กลับไปดูผลคะแนน</button>
      <div class="pill">Review ${state.reviewIndex+1} / ${list.length}</div>
    </div>
    <div class="meter"><span style="width:${(state.reviewIndex+1)/list.length*100}%"></span></div>
    <div class="flashcard pop-in">
      <div class="flash-index">คำที่ควรทบทวน</div>
      <div class="flash-icon-wrap" aria-hidden="true"><div class="flash-icon">${w.icon}</div></div>
      <div class="flash-word">${w.word}</div>
      <div class="ipa">${w.ipa}</div>
      <div class="meaning">${w.th}</div>
      <p class="example">“${w.ex}”</p>
      <div class="audio-row">
        <button class="primary" onclick="speak('${jsStr(w.word)}')" aria-label="ฟังคำศัพท์">🔊 ฟังคำศัพท์</button>
        <button class="secondary" onclick="speak('${jsStr(w.word)}',.55)" aria-label="ฟังคำศัพท์แบบช้า">🐢 ฟังช้า</button>
      </div>
    </div>
    <div class="card-nav">
      <button class="secondary icon-btn" onclick="reviewPrev()" aria-label="คำก่อนหน้า" ${state.reviewIndex===0?'disabled':''}>←</button>
      <span class="count">${state.reviewIndex+1} of ${list.length}</span>
      <button class="primary" onclick="reviewNext()">${state.reviewIndex===list.length-1 ? 'กลับไปดูผลคะแนน ✓' : 'คำถัดไป →'}</button>
    </div>
  </section>`;
}
function reviewPrev(){ if(state.reviewIndex>0){ state.reviewIndex--; renderReviewCard(); } }
function reviewNext(){
  if(state.reviewIndex < state.reviewList.length-1){ state.reviewIndex++; renderReviewCard(); }
  else { renderResults(); }
}

/* =========================================================
   INIT
========================================================= */
renderHome();
</script>
</body>
</html>
