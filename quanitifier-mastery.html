<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantifier Mastery — Learn it. Practise it. Ace the test.</title>
<meta name="description" content="Quantifier Mastery: an interactive English quantifiers learning and exam-practice app for Thai students (CEFR A1-A2)." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ivory: #FBF7F1;
  --ivory-soft: #F3ECE1;
  --ivory-card: #FFFFFF;
  --apricot-50: #FDF1E7;
  --apricot-100: #FBE4D3;
  --apricot-300: #F0B588;
  --apricot-400: #EAA372;
  --apricot-500: #E8935C;
  --apricot-600: #D97D40;
  --apricot-700: #B4632F;
  --navy: #233044;
  --navy-muted: #5B6B84;
  --navy-10: rgba(35,48,68,0.1);
  --navy-20: rgba(35,48,68,0.2);
  --sage-50: #EFF6F1;
  --sage-100: #DCEBE0;
  --sage-400: #9DC9AA;
  --sage-500: #8FBC9B;
  --sage-600: #6FA080;
  --sage-700: #4F7D5E;
  --rose-50: #FBF0EE;
  --rose-100: #F5DEDA;
  --rose-400: #EDB3AB;
  --rose-500: #E8A7A0;
  --rose-600: #D97D72;
  --rose-700: #B85B50;
  --shadow-soft: 0 2px 10px rgba(35,48,68,0.06);
  --shadow-card: 0 8px 24px rgba(35,48,68,0.08);
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --font-heading: 'Baloo 2', 'Noto Sans Thai', sans-serif;
  --font-body: 'Inter', 'Noto Sans Thai', sans-serif;
  --font-thai: 'Noto Sans Thai', 'Inter', sans-serif;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
}

body {
  margin: 0;
  background: var(--ivory);
  color: var(--navy);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-family: var(--font-heading); color: var(--navy); margin: 0; line-height: 1.2; }
p { margin: 0; }
ul, ol { margin: 0; padding: 0; list-style: none; }
button { font-family: inherit; }
a { color: inherit; text-decoration: none; }
input { font-family: inherit; }

.font-thai, [lang="th"] { font-family: var(--font-thai); }

.skip-link {
  position: absolute;
  left: -999px;
  top: 0;
  background: var(--navy);
  color: #fff;
  padding: 10px 16px;
  z-index: 200;
  border-radius: 0 0 8px 0;
}
.skip-link:focus {
  left: 0;
}

:focus-visible {
  outline: 3px solid var(--apricot-500);
  outline-offset: 2px;
}

/* ---------- Top nav ---------- */
.topnav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(251,247,241,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--navy-10);
}
.topnav-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: 19px;
  color: var(--navy);
  background: none;
  border: none;
  cursor: pointer;
}
.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: var(--apricot-500);
  color: #fff;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 17px;
  flex-shrink: 0;
}
.nav-links {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 2px;
}
.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 13px;
  color: var(--navy-muted);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: var(--apricot-50); color: var(--navy); }
.nav-link.active { background: var(--apricot-100); color: var(--apricot-700); }
.hamburger {
  display: none;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  border: 2px solid var(--navy-10);
  background: #fff;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.hamburger span, .hamburger span::before, .hamburger span::after {
  content: '';
  display: block;
  width: 18px;
  height: 2px;
  background: var(--navy);
  position: relative;
  transition: transform 0.2s;
}
.hamburger span::before { position: absolute; top: -6px; }
.hamburger span::after { position: absolute; top: 6px; }

.mobile-menu {
  display: none;
  flex-direction: column;
  gap: 2px;
  padding: 8px 20px 16px;
  border-bottom: 1px solid var(--navy-10);
  background: var(--ivory);
}
.mobile-menu.open { display: flex; }
.mobile-menu .nav-link { justify-content: flex-start; width: 100%; text-align: left; padding: 12px 14px; font-size: 15px; }

@media (max-width: 1180px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
}

/* ---------- Layout ---------- */
main {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px 20px 60px;
  min-height: 60vh;
}
.site-footer {
  text-align: center;
  padding: 22px 20px 34px;
  color: var(--navy-muted);
  font-size: 12.5px;
  border-top: 1px solid var(--navy-10);
}

/* ---------- Reusable components ---------- */
.card {
  background: var(--ivory-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(35,48,68,0.05);
}
.section-heading {
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: 26px;
  color: var(--navy);
}
@media (min-width: 640px) { .section-heading { font-size: 30px; } }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 700;
}

.btn-primary, .btn-secondary, .btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  border-radius: 999px;
  cursor: pointer;
  border: none;
  transition: transform 0.12s, box-shadow 0.12s, background 0.15s, border-color 0.15s;
  font-family: var(--font-body);
  white-space: nowrap;
}
.btn-primary {
  background: var(--apricot-500);
  color: #fff;
  padding: 12px 22px;
  box-shadow: 0 4px 14px rgba(232,147,92,0.35);
}
.btn-primary:hover { background: var(--apricot-600); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: #fff;
  color: var(--navy);
  padding: 11px 20px;
  border: 2px solid var(--navy-10);
}
.btn-secondary:hover { border-color: var(--apricot-400); }
.btn-ghost {
  background: none;
  color: var(--navy-muted);
  padding: 9px 14px;
}
.btn-ghost:hover { color: var(--navy); background: var(--apricot-50); }
.btn-block { width: 100%; }
.btn-danger-outline {
  border-color: var(--rose-400);
  color: var(--rose-700);
}
.btn-danger-outline:hover { border-color: var(--rose-600); background: var(--rose-50); }

/* progress bar */
.progressbar-wrap { display: flex; flex-direction: column; gap: 6px; }
.progressbar-label { display: flex; justify-content: space-between; font-size: 12.5px; font-weight: 600; color: var(--navy-muted); }
.progressbar-track { height: 9px; width: 100%; background: var(--ivory-soft); border-radius: 999px; overflow: hidden; }
.progressbar-fill { height: 100%; background: linear-gradient(90deg, var(--apricot-400), var(--apricot-500)); border-radius: 999px; transition: width 0.5s ease; }

/* answer options */
.answer-option {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-radius: var(--radius-md);
  border: 2px solid var(--navy-10);
  background: #fff;
  padding: 14px 16px;
  text-align: left;
  font-size: 17px;
  font-weight: 500;
  color: var(--navy);
  cursor: pointer;
  transition: all 0.15s;
}
.answer-option:hover:not(:disabled) { border-color: var(--apricot-300); background: var(--apricot-50); }
.answer-option:disabled { cursor: default; }
.answer-option.selected { border-color: var(--apricot-400); background: var(--apricot-50); }
.answer-option.correct { border-color: var(--sage-400); background: var(--sage-50); }
.answer-option.incorrect { border-color: var(--rose-400); background: var(--rose-50); animation: shake 0.4s; }
.answer-option.correct-answer { border-color: var(--sage-400); background: rgba(239,246,241,0.6); }
.answer-icon { flex-shrink: 0; font-weight: 800; }
.answer-icon.correct { color: var(--sage-600); }
.answer-icon.incorrect { color: var(--rose-600); }

.text-answer-input {
  width: 100%;
  border-radius: var(--radius-md);
  border: 2px solid var(--navy-10);
  background: #fff;
  padding: 14px 16px;
  font-size: 17px;
  font-weight: 500;
  color: var(--navy);
  outline: none;
}
.text-answer-input:focus { border-color: var(--apricot-400); }
.text-answer-input.correct { border-color: var(--sage-400); background: var(--sage-50); }
.text-answer-input.incorrect { border-color: var(--rose-400); background: var(--rose-50); animation: shake 0.4s; }

/* feedback panel */
.feedback-panel { border-radius: var(--radius-lg); border: 2px solid; padding: 18px; animation: fadeInUp 0.35s ease; }
.feedback-panel.correct { border-color: var(--sage-100); background: var(--sage-50); }
.feedback-panel.incorrect { border-color: var(--rose-100); background: var(--rose-50); }
.feedback-head { display: flex; align-items: flex-start; gap: 12px; }
.feedback-icon { flex-shrink: 0; width: 36px; height: 36px; border-radius: 999px; display: grid; place-items: center; color: #fff; font-weight: 800; }
.feedback-icon.correct { background: var(--sage-500); }
.feedback-icon.incorrect { background: var(--rose-500); }
.feedback-title { font-family: var(--font-heading); font-weight: 700; font-size: 16px; }
.feedback-title.correct { color: var(--sage-700); }
.feedback-title.incorrect { color: var(--rose-700); }
.feedback-body-grid { margin-top: 10px; display: grid; gap: 8px; }
@media (min-width: 640px) { .feedback-body-grid.two-col { grid-template-columns: 1fr 1fr; } }
.feedback-box { border-radius: var(--radius-sm); background: rgba(255,255,255,0.7); padding: 10px 12px; }
.feedback-box-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--navy-muted); }
.feedback-box-value { margin-top: 3px; font-weight: 600; }

/* quiz card */
.question-card { padding: 22px; }
.question-type-pill { background: var(--apricot-100); color: var(--apricot-700); }
.question-context {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  border-radius: var(--radius-md);
  background: var(--ivory-soft);
  padding: 14px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--navy-muted);
  white-space: pre-line;
}
.question-prompt { margin-top: 16px; font-size: 19px; font-weight: 700; line-height: 1.4; color: var(--navy); }
.question-options { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
.question-form { margin-top: 18px; }

/* cards animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
@keyframes sparkle { 0%,100% { opacity: 1; transform: scale(1) rotate(0deg); } 50% { opacity: 0.5; transform: scale(1.3) rotate(20deg); } }
.animate-fade-in-up { animation: fadeInUp 0.35s ease; }
.animate-pop-in { animation: popIn 0.3s ease; }
.sparkle { display: inline-block; animation: sparkle 1.4s ease infinite; }

/* Hero */
.hero { text-align: center; padding: 10px 0 4px; }
@media (min-width: 640px) { .hero { padding: 34px 0 4px; } }
.hero h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; }
@media (min-width: 640px) { .hero h1 { font-size: 44px; } }
.hero .tagline { margin-top: 8px; font-family: var(--font-heading); font-weight: 600; font-size: 18px; color: var(--apricot-600); }
@media (min-width: 640px) { .hero .tagline { font-size: 21px; } }
.hero .lede { max-width: 640px; margin: 16px auto 0; font-size: 16px; line-height: 1.7; color: var(--navy-muted); }
@media (min-width: 640px) { .hero .lede { font-size: 17px; } }
.hero-actions { margin-top: 26px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 12px; }

.stack-14 { display: flex; flex-direction: column; gap: 56px; }
.stack-10 { display: flex; flex-direction: column; gap: 40px; }
.stack-6 { display: flex; flex-direction: column; gap: 24px; }
.stack-5 { display: flex; flex-direction: column; gap: 20px; }
.stack-4 { display: flex; flex-direction: column; gap: 16px; }
.stack-3 { display: flex; flex-direction: column; gap: 12px; }
.stack-2 { display: flex; flex-direction: column; gap: 8px; }

.max-2xl { max-width: 680px; margin: 0 auto; }
.max-3xl { max-width: 820px; margin: 0 auto; }

.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 18px; }
@media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-box { border-radius: var(--radius-md); background: var(--ivory-soft); padding: 14px; text-align: center; }
.stat-box .num { font-size: 21px; font-weight: 800; color: var(--navy); }
.stat-box .lbl { font-size: 12px; color: var(--navy-muted); margin-top: 2px; }

.quantifier-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 22px; }
@media (min-width: 640px) { .quantifier-grid { grid-template-columns: repeat(5, 1fr); } }
.quantifier-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 16px 10px; text-align: center; cursor: pointer; border: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.quantifier-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); }
.quantifier-card .q-name { font-family: var(--font-heading); font-weight: 800; font-size: 16px; color: var(--apricot-600); }
.quantifier-card .q-type { font-size: 11px; color: var(--navy-muted); line-height: 1.35; }

.cu-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 4px; }
@media (min-width: 640px) { .cu-grid { grid-template-columns: 1fr 1fr; } }
.cu-card { padding: 20px; }
.cu-head { display: flex; align-items: center; gap: 10px; }
.cu-icon { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; font-size: 18px; }
.cu-icon.countable { background: var(--apricot-100); color: var(--apricot-600); }
.cu-icon.uncountable { background: var(--sage-100); color: var(--sage-600); }
.cu-examples { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.cu-chip { border-radius: 999px; padding: 6px 12px; font-size: 13.5px; }
.cu-chip.countable { background: var(--apricot-50); }
.cu-chip.uncountable { background: var(--sage-50); }

/* Learn page */
.learn-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-top: 6px; }
@media (min-width: 980px) { .learn-grid { grid-template-columns: 280px 1fr; } }
.lesson-nav { display: flex; flex-direction: column; gap: 10px; }
.lesson-card {
  display: flex; width: 100%; align-items: center; gap: 14px;
  padding: 16px; text-align: left; cursor: pointer; border: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.lesson-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); }
.lesson-card.active { box-shadow: 0 0 0 2px var(--apricot-400); }
.lesson-icon { width: 46px; height: 46px; border-radius: 12px; background: var(--apricot-100); color: var(--apricot-600); display: grid; place-items: center; flex-shrink: 0; }
.lesson-meta-row { display: flex; align-items: center; gap: 8px; }
.lesson-order { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--navy-muted); }
.lesson-title-txt { display: block; margin-top: 2px; font-family: var(--font-heading); font-weight: 700; font-size: 16px; color: var(--navy); }
.lesson-sub-txt { display: block; margin-top: 2px; font-size: 13.5px; color: var(--navy-muted); }
.lesson-chevron { margin-left: auto; flex-shrink: 0; color: var(--navy-muted); }

.lesson-detail-card { padding: 22px; }
.lesson-badge-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.lesson-eyebrow { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--apricot-600); }
.lesson-detail-title { margin-top: 4px; font-size: 26px; }
.lesson-detail-sub { margin-top: 4px; font-size: 15px; color: var(--navy-muted); }
.lesson-detail-intro { margin-top: 12px; font-size: 15.5px; line-height: 1.7; }
.point-block { margin-top: 14px; border-radius: var(--radius-md); background: var(--ivory-soft); padding: 16px; }
.point-heading { font-size: 15px; font-weight: 700; }
.point-body { margin-top: 4px; font-size: 14.5px; line-height: 1.6; color: var(--navy-muted); }
.point-examples { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.point-example { display: flex; gap: 7px; font-size: 14.5px; align-items: flex-start; }
.point-example .arrow { color: var(--apricot-400); flex-shrink: 0; margin-top: 3px; }
.point-example .txt { font-style: italic; }

.mistakes-block { margin-top: 18px; border-radius: var(--radius-md); border: 2px solid var(--rose-100); background: rgba(251,240,238,0.6); padding: 16px; }
.mistakes-block h3 { font-size: 15px; color: var(--rose-700); display: flex; align-items: center; gap: 6px; }
.mistake-row { margin-top: 8px; font-size: 14.5px; }
.mistake-wrong { color: var(--rose-600); text-decoration: line-through; }
.mistake-arrow { margin: 0 6px; color: var(--navy-muted); }
.mistake-right { font-weight: 700; color: var(--sage-700); }

.mini-practice-card { padding: 22px; }

/* comparison table */
.comparison-table-wrap { overflow-x: auto; }
table.comparison-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-soft); }
table.comparison-table th { text-align: left; background: var(--apricot-100); color: var(--apricot-700); padding: 12px 14px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; }
table.comparison-table td { padding: 13px 14px; border-top: 1px solid var(--navy-10); font-size: 14.5px; vertical-align: top; }
table.comparison-table tr:nth-child(even) td { background: var(--ivory-soft); }
.comparison-cards { display: none; flex-direction: column; gap: 10px; }
.comparison-card-item { padding: 14px 16px; }
.comparison-card-item .q { font-family: var(--font-heading); font-weight: 800; color: var(--apricot-600); font-size: 17px; }
.comparison-card-item dl { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
.comparison-card-item dt { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--navy-muted); }
.comparison-card-item dd { margin: 0 0 4px; font-size: 14px; }
@media (max-width: 640px) {
  .comparison-table-wrap { display: none; }
  .comparison-cards { display: flex; }
}

/* memory tips */
.tips-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px auto 0; max-width: 780px; }
@media (min-width: 640px) { .tips-grid { grid-template-columns: 1fr 1fr; } }
.tip-item { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; font-size: 14.5px; }
.tip-bulb { flex-shrink: 0; color: var(--apricot-500); }

/* progress bar sticky quiz header */
.quiz-header { position: sticky; top: 57px; z-index: 20; background: rgba(251,247,241,0.95); backdrop-filter: blur(6px); padding: 10px 0 12px; }
.quiz-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.quiz-title { font-size: 19px; font-weight: 700; }

/* topic performance */
.topic-perf-item { margin-bottom: 12px; }
.topic-perf-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
.topic-perf-row .name { font-weight: 600; }
.topic-perf-row .val { color: var(--navy-muted); }
.topic-perf-track { height: 8px; background: var(--ivory-soft); border-radius: 999px; overflow: hidden; }
.topic-perf-fill { height: 100%; border-radius: 999px; transition: width 0.5s; }
.topic-perf-fill.high { background: var(--sage-500); }
.topic-perf-fill.mid { background: var(--apricot-500); }
.topic-perf-fill.low { background: var(--rose-500); }

/* results */
.results-hero { padding: 28px; text-align: center; }
.results-hero .eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--navy-muted); }
.results-hero .pct { margin-top: 8px; font-size: 48px; font-weight: 800; }
.results-hero .fraction { margin-top: 2px; font-size: 14px; color: var(--navy-muted); }
.perf-pill { margin-top: 14px; display: inline-flex; }
.results-hero .desc { max-width: 460px; margin: 12px auto 0; font-size: 14.5px; line-height: 1.6; color: var(--navy-muted); }
.results-stat-grid { margin-top: 24px; display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; text-align: center; }
.results-stat-box { border-radius: var(--radius-md); padding: 14px 8px; }
.results-stat-box.correct { background: var(--sage-50); }
.results-stat-box.incorrect { background: var(--rose-50); }
.results-stat-box.unanswered { background: var(--ivory-soft); }
.results-stat-box .num { font-size: 19px; font-weight: 800; margin-top: 4px; }
.results-stat-box .lbl { font-size: 12px; color: var(--navy-muted); }
.strength-grid { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 640px) { .strength-grid { grid-template-columns: 1fr 1fr; } }
.strength-box { border-radius: var(--radius-md); padding: 14px; }
.strength-box.strong { background: var(--sage-50); }
.strength-box.weak { background: var(--rose-50); }
.strength-box .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.strength-box.strong .lbl { color: var(--sage-700); }
.strength-box.weak .lbl { color: var(--rose-700); }
.strength-box .val { margin-top: 3px; font-weight: 700; }
.recommend-box { margin-top: 16px; display: flex; align-items: center; gap: 12px; border-radius: var(--radius-md); border: 2px dashed var(--apricot-300); padding: 14px; }

.results-level-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 24px; }
@media (min-width: 640px) { .results-level-grid { grid-template-columns: repeat(3,1fr); } }
.results-level-card { padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.trophy-badge { width: 44px; height: 44px; border-radius: 999px; background: var(--apricot-100); color: var(--apricot-600); display: grid; place-items: center; }

/* mistake review */
.mistake-card { padding: 20px; }
.mistake-answer-grid { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mistake-answer-box { border-radius: var(--radius-sm); padding: 10px 12px; }
.mistake-answer-box.wrong { background: var(--rose-50); }
.mistake-answer-box.right { background: var(--sage-50); }
.explanation-box { margin-top: 10px; border-radius: var(--radius-sm); background: var(--ivory-soft); padding: 10px 12px; }

/* progress page */
.progress-list-item { display: flex; align-items: center; justify-content: space-between; border-radius: var(--radius-md); background: var(--ivory-soft); padding: 12px 15px; margin-bottom: 8px; }
.progress-check { width: 18px; height: 18px; border-radius: 999px; border: 2px solid var(--navy-20); flex-shrink: 0; }
.progress-check.done { border: none; background: var(--sage-600); color: #fff; display: grid; place-items: center; font-size: 11px; }

.score-box { border-radius: var(--radius-md); background: var(--ivory-soft); padding: 14px; text-align: center; }
.score-box .lvl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; color: var(--navy-muted); }
.score-box .pct { font-size: 22px; font-weight: 800; margin-top: 4px; }
.score-box .meta { font-size: 11px; color: var(--navy-muted); }

/* modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(35,48,68,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-box { background: #fff; border-radius: var(--radius-lg); padding: 24px; max-width: 420px; width: 100%; box-shadow: var(--shadow-card); }
.modal-box h3 { font-size: 18px; }
.modal-box p { margin-top: 8px; font-size: 14.5px; color: var(--navy-muted); line-height: 1.6; }
.modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }

/* about */
.about-mark { width: 56px; height: 56px; border-radius: 18px; background: var(--apricot-500); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 22px; margin: 0 auto; box-shadow: var(--shadow-soft); }
.about-section { padding: 20px; display: flex; gap: 14px; align-items: flex-start; }
.about-icon { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; flex-shrink: 0; }
.about-icon.a { background: var(--apricot-100); color: var(--apricot-600); }
.about-icon.b { background: var(--sage-100); color: var(--sage-600); }

.text-center { text-align: center; }
.muted { color: var(--navy-muted); }
.small { font-size: 13px; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--navy-muted); }

.mode-note { display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; margin-bottom: 10px; color: var(--navy-muted); font-size: 14px; }

/* utility icon svg sizing */
.icon { display: inline-block; vertical-align: middle; }

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
</style>

  /* ================================================================

  var STORAGE_KEY = 'quantifier-mastery:progress:v1';

  function recordMistake(question, studentAnswer, quizMode) {
    var entry = {

  function saveTestResult(testLevel, result) {

  function overallProgressPercent() {
    var totalLessons = lessons.length;
    var lessonScore = totalLessons > 0 ? STATE.completedLessons.length / totalLessons : 0;
    var testsTaken = TEST_LEVELS.filter(function (l) { return STATE.testScores[l] && STATE.testScores[l].best; }).length;
    var testScore = testsTaken / TEST_LEVELS.length;
    return Math.round((lessonScore * 0.5 + testScore * 0.5) * 100);
  }
  function categoryStats() {
    var stats = {};
    CATEGORY_ORDER.forEach(function (c) { stats[c] = { correct: 0, total: 0 }; });
    TEST_LEVELS.forEach(function (level) {
      var r = STATE.testScores[level] && STATE.testScores[level].latest;
      if (!r) return;
      Object.keys(r.categoryBreakdown || {}).forEach(function (cat) {
        var b = r.categoryBreakdown[cat];
        if (!b) return;
        if (!stats[cat]) stats[cat] = { correct: 0, total: 0 };
        stats[cat].correct += b.correct;
        stats[cat].total += b.total;
      });
    });
    return stats;
  }

  /* ================================================================
     QUIZ UTILS  (mirrors src/utils/quiz.ts)
     ================================================================ */
  function normalizeAnswer(v) {
    return String(v).trim().toLowerCase().replace(/[.!?,'"]+$/g, '').replace(/\s+/g, ' ');
  }
  function isAnswerCorrect(question, studentAnswer) {
    if (!studentAnswer) return false;
    var norm = normalizeAnswer(studentAnswer);
    if (norm === normalizeAnswer(question.correctAnswer)) return true;
    if (question.acceptableAnswers) {
      return question.acceptableAnswers.some(function (alt) { return normalizeAnswer(alt) === norm; });
    }
    return false;
  }
  function getCorrectAnswerLabel(q) {
    if (q.options) {
      var o = q.options.filter(function (opt) { return opt.id === q.correctAnswer; })[0];
      if (o) return o.label;
    }
    return q.correctAnswer;
  }
  function getAnswerLabel(q, answer) {
    if (!answer) return '';
    if (q.options) {
      var o = q.options.filter(function (opt) { return opt.id === answer; })[0];
      if (o) return o.label;
    }
    return answer;
  }
  function buildTestResult(quizMode, questions, answers) {
    var categoryBreakdown = {};
    var answerRecords = [];
    var correctCount = 0, incorrectCount = 0, unansweredCount = 0;
    questions.forEach(function (q) {
      var studentAnswer = answers[q.id] || '';
      var wasAnswered = studentAnswer.trim().length > 0;
      var correct = wasAnswered && isAnswerCorrect(q, studentAnswer);
      if (!wasAnswered) unansweredCount++; else if (correct) correctCount++; else incorrectCount++;
      answerRecords.push({ questionId: q.id, studentAnswer: studentAnswer, isCorrect: correct, wasAnswered: wasAnswered });
      var bucket = categoryBreakdown[q.category] || { correct: 0, total: 0 };
      bucket.total++;
      if (correct) bucket.correct++;
      categoryBreakdown[q.category] = bucket;
    });
    var total = questions.length;
    var percentage = total > 0 ? Math.round((correctCount / total) * 100) : 0;
    return {
      testLevel: quizMode, score: correctCount, total: total, percentage: percentage,
      correctCount: correctCount, incorrectCount: incorrectCount, unansweredCount: unansweredCount,
      dateTaken: new Date().toISOString(), answers: answerRecords, categoryBreakdown: categoryBreakdown,
    };
  }
  function getPerformanceLevel(pct) {
    if (pct >= 90) return 'Quantifier Expert';
    if (pct >= 75) return 'Almost Exam Ready';
    if (pct >= 60) return 'Good Progress';
    return 'Keep Practising';
  }
  function findStrongestAndWeakest(categoryBreakdown) {
    var strongest = null, weakest = null, bestRatio = -1, worstRatio = 2;
    Object.keys(categoryBreakdown).forEach(function (cat) {
      var stat = categoryBreakdown[cat];
      if (!stat || stat.total === 0) return;
      var ratio = stat.correct / stat.total;
      if (ratio > bestRatio) { bestRatio = ratio; strongest = cat; }
      if (ratio < worstRatio) { worstRatio = ratio; weakest = cat; }
    });
    return { strongest: strongest, weakest: weakest };
  }
  function shuffleArray(arr) {
    var copy = arr.slice();
    for (var i = copy.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = copy[i]; copy[i] = copy[j]; copy[j] = t;
    }
    return copy;
  }
  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch (e) { return iso; }
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  function getLessonById(id) { return lessons.filter(function (l) { return l.id === id; })[0]; }
  function lessonIconMap(name) {

  function lessonIdForQuantifier(q) {

  }

  function buildQuestionCard(q, value, isSub, isCorrect, handlers) {

    if (q.options && q.options.length) {
      var optWrap = document.createElement('div');

          if (isSelected && isCorrect) { stateClass = 'correct'; iconHtml = ic('check', 20); }
          else if (isSelected && !isCorrect) { stateClass = 'incorrect'; iconHtml = ic('x', 20); }
          else if (!isSelected && isThisCorrect && !isCorrect) { stateClass = 'correct-answer'; iconHtml = ic('check', 20); }
        } else if (value === opt.id) { stateClass = 'selected'; }
        btn.className = 'answer-option' + (stateClass ? ' ' + stateClass : '');
        btn.disabled = isSub;
        btn.setAttribute('aria-pressed', value === opt.id ? 'true' : 'false');

  /* ================================================================
     QUIZ ENGINE — shared by mini practice, quick practice & tests
     ================================================================ */
  function createQuizEngine(config) {
    var mode = config.mode; // 'mini' | 'player'
    var quizMode = config.quizMode;
    var testLevel = config.testLevel;
    var questions = config.questions;
    var allowRetry = Boolean(config.allowRetry);
    var lessonId = config.lessonId;
    var title = config.title;
    var onComplete = config.onComplete;

    var wrap = document.createElement('div');
    wrap.className = 'stack-4';

    var restored = null;
    if (mode === 'player' && STATE.inProgressQuiz) {
      var saved = STATE.inProgressQuiz;
      var ids = questions.map(function (q) { return q.id; }).join(',');
      if (saved.quizMode === quizMode && saved.questionIds.join(',') === ids) restored = saved;
    }

    var currentIndex = restored ? restored.currentIndex : 0;
    var answers = restored ? Object.assign({}, restored.answers) : {};
    var submitted = restored ? Object.assign({}, restored.submitted) : {};
    var retryUsed = {};
    var startedAt = restored ? restored.startedAt : new Date().toISOString();
    var finished = false;

    if (mode === 'mini') {
      var savedProgress = STATE.miniPracticeProgress[lessonId] || { completedQuestionIds: [], correctQuestionIds: [] };
      var alreadyDone = savedProgress.completedQuestionIds.length;
      currentIndex = alreadyDone < questions.length ? alreadyDone : 0;
      finished = alreadyDone >= questions.length && questions.length > 0;
    }

    function persistPlayerProgress() {
      if (mode !== 'player') return;
      saveInProgressQuiz({
        quizMode: quizMode, questionIds: questions.map(function (q) { return q.id; }),
        currentIndex: currentIndex, answers: answers, submitted: submitted, startedAt: startedAt,
      });
    }
    function currentQuestion() { return questions[currentIndex]; }

    function paint() {
      wrap.innerHTML = '';
      if (mode === 'mini' && finished) { wrap.appendChild(renderMiniFinished()); return; }
      if (!questions.length) return;

      var q = currentQuestion();
      var isSub = Boolean(submitted[q.id]);
      var val = answers[q.id] || '';
      var correct = isSub ? isAnswerCorrect(q, val) : null;

      if (mode === 'player') {
        var header = document.createElement('div');
        header.className = 'quiz-header';
        var homeBtn = document.createElement('div');
        homeBtn.className = 'quiz-header-row';
        homeBtn.innerHTML = '<h1 class="quiz-title">' + escapeHtml(title) + '</h1>';
        var hb = document.createElement('button');
        hb.className = 'btn-ghost'; hb.type = 'button'; hb.setAttribute('aria-label', 'Return to Home');
        hb.innerHTML = ic('home', 16) + '<span>Home</span>';
        hb.addEventListener('click', function () { navigate('home'); });
        homeBtn.appendChild(hb);
        header.appendChild(homeBtn);
        var pbHost = document.createElement('div');
        pbHost.innerHTML = progressBar(currentIndex + (isSub ? 1 : 0), questions.length, testLevel ? testLevel + ' test' : quizMode);
        header.appendChild(pbHost);
        wrap.appendChild(header);
      } else {
        var pbHost2 = document.createElement('div');
        pbHost2.innerHTML = progressBar(currentIndex + (isSub ? 1 : 0), questions.length, 'Mini practice');
        wrap.appendChild(pbHost2);
      }

      var body = document.createElement('div');
      body.className = 'stack-4';
      body.appendChild(buildQuestionCard(q, val, isSub, correct, {
        onSelect: function (optId) { answers[q.id] = optId; handleSubmit(); },
        onChange: function (v) { answers[q.id] = v; if (mode === 'player') persistPlayerProgress(); },
        onSubmit: function () { handleSubmit(); },
      }));

      if (isSub) {
        body.appendChild(buildFeedbackPanel(q, val, Boolean(correct)));
        var actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;';
        var canRetry = !correct && ((mode === 'player' && allowRetry && !retryUsed[q.id]) || mode === 'mini');
        if (canRetry) {
          var retryBtn = document.createElement('button');
          retryBtn.type = 'button'; retryBtn.className = 'btn-secondary';
          retryBtn.innerHTML = ic('rotate', 16) + ' Try Again';
          retryBtn.addEventListener('click', function () {
            submitted[q.id] = false; answers[q.id] = ''; retryUsed[q.id] = true;
            if (mode === 'player') persistPlayerProgress();
            paint();
          });
          actions.appendChild(retryBtn);
        }
        var isLast = currentIndex === questions.length - 1;
        var nextBtn = document.createElement('button');
        nextBtn.type = 'button'; nextBtn.className = 'btn-primary';
        var nextLabel = mode === 'mini' ? (isLast ? 'Finish mini practice' : 'Next question') : (isLast ? 'See my results' : 'Next question');
        nextBtn.innerHTML = escapeHtml(nextLabel) + ' ' + ic('arrow-right', 16);
        nextBtn.addEventListener('click', function () {
          if (mode === 'mini') {
            if (isLast) { markLessonCompleted(lessonId); finished = true; paint(); return; }
            currentIndex++; paint();
          } else {
            if (isLast) {
              var result = buildTestResult(quizMode, questions, answers);
              saveInProgressQuiz(null);
              onComplete(result);
              return;
            }
            currentIndex++; persistPlayerProgress(); paint();
          }
        });
        actions.appendChild(nextBtn);
        body.appendChild(actions);
      }
      wrap.appendChild(body);
    }

    function renderMiniFinished() {
      var savedProgress = STATE.miniPracticeProgress[lessonId] || { correctQuestionIds: [] };
      var box = document.createElement('div');
      box.className = 'card animate-pop-in text-center';
      box.style.padding = '30px 20px';
      box.innerHTML =
        '<div style="width:48px;height:48px;border-radius:999px;background:var(--sage-100);color:var(--sage-600);display:grid;place-items:center;margin:0 auto;">' + ic('party', 22) + '</div>' +
        '<p style="margin-top:12px;font-family:var(--font-heading);font-weight:700;font-size:18px;">Mini practice complete!</p>' +
        '<p class="muted" style="margin-top:6px;font-size:14px;">You got ' + savedProgress.correctQuestionIds.length + ' out of ' + questions.length + ' correct on your latest attempt.</p>';
      var btn = document.createElement('button');
      btn.className = 'btn-secondary'; btn.style.marginTop = '16px';
      btn.innerHTML = ic('rotate', 16) + ' Practise this lesson again';
      btn.addEventListener('click', function () { currentIndex = 0; answers = {}; submitted = {}; finished = false; paint(); });
      box.appendChild(btn);
      return box;
    }

    function handleSubmit() {
      var q = currentQuestion();
      submitted[q.id] = true;
      var correct = isAnswerCorrect(q, answers[q.id] || '');
      if (mode === 'mini') {
        recordMiniPracticeAnswer(lessonId, q.id, correct);
      } else {
        if (!correct) recordMistake(q, answers[q.id] || '', quizMode);
        else if (retryUsed[q.id]) markImproved(q.id);
        persistPlayerProgress();
      }
      paint();
    }

    paint();
    return wrap;
  }

  /* ================================================================
     RESULTS SUMMARY / TOPIC PERFORMANCE

  function renderTopicPerformance(categoryBreakdown) {
    var entries = CATEGORY_ORDER.map(function (cat) { return { category: cat, stat: categoryBreakdown[cat] }; })
      .filter(function (e) { return e.stat && e.stat.total > 0; });
    var wrap = document.createElement('div');
    if (!entries.length) {
      wrap.innerHTML = '<p class="muted small">No topic data yet &mdash; complete a test to see your breakdown here.</p>';
      return wrap;
    }
    entries.forEach(function (e) {
      var pct = Math.round((e.stat.correct / e.stat.total) * 100);
      var cls = pct >= 75 ? 'high' : pct >= 50 ? 'mid' : 'low';
      var item = document.createElement('div');
      item.className = 'topic-perf-item';
      item.innerHTML = '<div class="topic-perf-row"><span class="name">' + escapeHtml(e.category) + '</span><span class="val">' + e.stat.correct + '/' + e.stat.total + ' (' + pct + '%)</span></div>' +
        '<div class="topic-perf-track"><div class="topic-perf-fill ' + cls + '" style="width:' + pct + '%"></div></div>';
      wrap.appendChild(item);
    });
    return wrap;
  }

  function renderResultsSummary(result) {

  function showConfirmModal(opts) {
    var root = document.getElementById('modal-root');
    root.innerHTML = '';
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'confirm-title');
    var box = document.createElement('div');
    box.className = 'modal-box animate-pop-in';
    box.innerHTML = '<h3 id="confirm-title">' + escapeHtml(opts.title) + '</h3><p>' + escapeHtml(opts.description) + '</p>';
    var actions = document.createElement('div');
    actions.className = 'modal-actions';
    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-secondary'; cancelBtn.textContent = opts.cancelLabel || 'Cancel';
    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn-primary'; confirmBtn.style.background = 'var(--rose-500)';
    confirmBtn.textContent = opts.confirmLabel || 'Confirm';
    function close() { root.innerHTML = ''; document.removeEventListener('keydown', onKey); }
    function onKey(e) { if (e.key === 'Escape') close(); }
    cancelBtn.addEventListener('click', close);
    confirmBtn.addEventListener('click', function () { close(); if (opts.onConfirm) opts.onConfirm(); });
    overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
    document.addEventListener('keydown', onKey);
    actions.appendChild(cancelBtn); actions.appendChild(confirmBtn);
    box.appendChild(actions);
    overlay.appendChild(box);
    root.appendChild(overlay);
    confirmBtn.focus();
  }

        '</div>' +
        '<div class="explanation-box"><p class="feedback-box-label">' + ic('lightbulb', 14) + ' &nbsp;&#3588;&#3635;&#3629;&#3608;&#3636;&#3610;&#3634;&#3618;</p><p class="font-thai" lang="th" style="margin-top:4px;font-size:14.5px;line-height:1.7;">' + escapeHtml(entry.question.explanationThai) + '</p></div>' +
        '<p class="muted" style="margin-top:8px;font-size:13.5px;"><strong style="color:var(--navy);">Rule: </strong>' + escapeHtml(entry.question.grammarRule) + '</p>' +
        '<p class="muted" style="margin-top:4px;font-size:13.5px;font-style:italic;"><strong style="color:var(--navy);font-style:normal;">Example: </strong>' + escapeHtml(entry.question.additionalExample) + '</p>';
        body.innerHTML = html;
        card.appendChild(body);

        var retryBtn = document.createElement('button');
        retryBtn.className = 'btn-secondary'; retryBtn.style.marginTop = '14px';
        retryBtn.innerHTML = ic('rotate', 16) + ' Try Again';
        retryBtn.addEventListener('click', function () { retrying = true; submitted = false; answer = ''; paint(); });
        card.appendChild(retryBtn);
      } else {
        var q = entry.question;
        var isCorrect = submitted ? isAnswerCorrect(q, answer) : null;
        var qcHost = document.createElement('div'); qcHost.style.marginTop = '12px';
        qcHost.appendChild(buildQuestionCard(q, answer, submitted, isCorrect, {
          onSelect: function (optId) {
            answer = optId; submitted = true;
            if (isAnswerCorrect(q, answer)) markImproved(entry.questionId);
            paint();
          },
          onChange: function (v) { answer = v; },
          onSubmit: function () {
            submitted = true;
            if (isAnswerCorrect(q, answer)) markImproved(entry.questionId);
            paint();
          },
        }));
        card.appendChild(qcHost);
        if (submitted) {
          var justSucceeded = isAnswerCorrect(q, answer);
          var msg = document.createElement('div');
          msg.style.cssText = 'margin-top:10px;border-radius:12px;padding:12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;' + (justSucceeded ? 'background:var(--sage-50);color:var(--sage-700);' : 'background:var(--rose-50);color:var(--rose-700);');
          msg.innerHTML = justSucceeded ? (ic('sparkles', 16) + ' Improved! Great work fixing this one.') : ('Still not quite &mdash; the correct answer is &ldquo;' + escapeHtml(getCorrectAnswerLabel(q)) + '&rdquo;.');
          card.appendChild(msg);
          if (justSucceeded && onImproved) setTimeout(onImproved, 900);
        }
        var backBtn = document.createElement('button'); backBtn.className = 'btn-ghost'; backBtn.style.marginTop = '10px'; backBtn.textContent = 'Back to explanation';
        backBtn.addEventListener('click', function () { retrying = false; paint(); });
        card.appendChild(backBtn);
      }
    }
    paint();
    return card;
  }

  function renderMistakes() {
    var wrap = document.createElement('div');
    wrap.className = 'max-2xl stack-5';
    var header = document.createElement('header'); header.className = 'text-center';
    header.innerHTML = '<h1 class="section-heading">Mistake Review</h1><p class="muted" style="max-width:520px;margin:8px auto 0;font-size:14.5px;">Every question you have gotten wrong, with the correct answer and a Thai explanation. Answer correctly to mark it improved.</p>';
    wrap.appendChild(header);

    var list = document.createElement('div'); list.className = 'stack-4';
    function paintList() {
      list.innerHTML = '';
      var active = STATE.mistakes.filter(function (m) { return !m.improved; });
      if (!active.length) {
        var empty = document.createElement('div'); empty.className = 'card empty-state';
        empty.innerHTML = '<p style="font-family:var(--font-heading);font-weight:700;font-size:17px;color:var(--navy);">No outstanding mistakes</p><p class="muted" style="margin-top:6px;font-size:14px;">Great work &mdash; take a test or practice session to keep building your skills.</p>';
        var btn = document.createElement('button'); btn.className = 'btn-primary'; btn.style.marginTop = '14px'; btn.textContent = 'Return Home';
        btn.addEventListener('click', function () { navigate('home'); });
        empty.appendChild(btn);
        list.appendChild(empty);
        return;
      }
      active.slice().reverse().forEach(function (entry) {
        list.appendChild(renderMistakeCard(entry, paintList));
      });
    }
    paintList();
    wrap.appendChild(list);
    return wrap;
  }

  function renderProgress() {
    var wrap = document.createElement('div');
    wrap.className = 'max-3xl stack-6';
    wrap.innerHTML = '<header class="text-center"><h1 class="section-heading">Your Progress</h1><p class="muted" style="max-width:520px;margin:8px auto 0;font-size:14.5px;">Everything here is saved automatically on this device, so you can close the app and pick up right where you left off.</p></header>';

    var overallCard = document.createElement('section'); overallCard.className = 'card'; overallCard.style.padding = '20px';
    var op = overallProgressPercent();
    overallCard.innerHTML = '<h2 style="font-size:16px;">Overall completion</h2>';
    var pbHost = document.createElement('div'); pbHost.style.marginTop = '12px';
    pbHost.innerHTML = progressBar(op, 100, op + '% complete');
    overallCard.appendChild(pbHost);
    wrap.appendChild(overallCard);

    var lessonsCard = document.createElement('section'); lessonsCard.className = 'card'; lessonsCard.style.padding = '20px';
    lessonsCard.innerHTML = '<h2 style="font-size:16px;">Lessons</h2>';
    var listHost = document.createElement('div'); listHost.style.marginTop = '12px';
    var totalMini = 0, completedMini = 0;
    lessons.forEach(function (lesson) {
      totalMini += lesson.miniPractice.length;
      var mp = STATE.miniPracticeProgress[lesson.id] || { completedQuestionIds: [], correctQuestionIds: [] };
      completedMini += mp.completedQuestionIds.length;
      var done = STATE.completedLessons.indexOf(lesson.id) !== -1;
      var row = document.createElement('div'); row.className = 'progress-list-item';
      row.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><span class="progress-check' + (done ? ' done' : '') + '">' + (done ? ic('check', 11) : '') + '</span><span style="font-size:14px;font-weight:600;">' + escapeHtml(lesson.title) + '</span></div><span class="muted" style="font-size:12.5px;">' + mp.correctQuestionIds.length + '/' + lesson.miniPractice.length + ' correct</span>';
      listHost.appendChild(row);
    });
    lessonsCard.appendChild(listHost);
    var miniSummary = document.createElement('p'); miniSummary.className = 'muted small'; miniSummary.style.marginTop = '8px';
    miniSummary.textContent = completedMini + '/' + totalMini + ' mini practice questions attempted in total.';
    lessonsCard.appendChild(miniSummary);
    wrap.appendChild(lessonsCard);

    var scoresCard = document.createElement('section'); scoresCard.className = 'card'; scoresCard.style.padding = '20px';
    scoresCard.innerHTML = '<h2 style="font-size:16px;">Test scores</h2>';
    var scoreGrid = document.createElement('div'); scoreGrid.style.cssText = 'margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;';
    TEST_LEVELS.forEach(function (level) {
      var entry = STATE.testScores[level];
      var box = document.createElement('div'); box.className = 'score-box';
      var inner = '<p class="lvl">' + level + '</p>';
      if (entry && entry.best) {
        inner += '<p class="pct">' + entry.best.percentage + '%</p><p class="meta">Best &middot; ' + formatDate(entry.best.dateTaken) + '</p>';
        if (entry.latest) inner += '<p class="meta">Latest: ' + entry.latest.percentage + '%</p>';
      } else {
        inner += '<p class="pct">&mdash;</p><p class="meta">Not attempted</p>';
      }
      box.innerHTML = inner;
      scoreGrid.appendChild(box);
    });
    scoresCard.appendChild(scoreGrid);
    wrap.appendChild(scoresCard);

    var topicCard = document.createElement('section'); topicCard.className = 'card'; topicCard.style.padding = '20px';
    topicCard.innerHTML = '<h2 style="font-size:16px;">Topic performance (latest tests)</h2>';
    var tpHost = document.createElement('div'); tpHost.style.marginTop = '12px';
    tpHost.appendChild(renderTopicPerformance(categoryStats()));
    topicCard.appendChild(tpHost);
    wrap.appendChild(topicCard);

    var mistakesCard = document.createElement('section'); mistakesCard.className = 'card'; mistakesCard.style.padding = '20px';
    var outstanding = STATE.mistakes.filter(function (m) { return !m.improved; }).length;
    var improved = STATE.improvedQuestionIds.length;
    mistakesCard.innerHTML = '<h2 style="font-size:16px;">Mistakes</h2>' +
      '<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;">' +
        '<div style="border-radius:12px;background:var(--rose-50);padding:12px;"><p style="font-size:19px;font-weight:800;">' + outstanding + '</p><p class="muted small">Still to review</p></div>' +
        '<div style="border-radius:12px;background:var(--sage-50);padding:12px;"><p style="font-size:19px;font-weight:800;">' + improved + '</p><p class="muted small">Improved</p></div>' +
      '</div>';
    var goBtn = document.createElement('button'); goBtn.className = 'btn-secondary btn-block'; goBtn.style.marginTop = '14px'; goBtn.innerHTML = ic('rotate', 16) + ' Go to Mistake Review';
    goBtn.addEventListener('click', function () { navigate('mistakes'); });
    mistakesCard.appendChild(goBtn);
    wrap.appendChild(mistakesCard);

    var resetCard = document.createElement('section'); resetCard.className = 'card'; resetCard.style.padding = '20px';
    resetCard.innerHTML = '<h2 style="font-size:16px;">Reset</h2><p class="muted small" style="margin-top:4px;">This clears every saved lesson, score, and mistake on this device. This cannot be undone.</p>';
    var resetBtn = document.createElement('button'); resetBtn.className = 'btn-secondary btn-danger-outline'; resetBtn.style.marginTop = '12px'; resetBtn.innerHTML = ic('trash', 16) + ' Reset Progress';
    resetBtn.addEventListener('click', function () {
      showConfirmModal({
        title: 'Reset all progress?',
        description: 'This will permanently delete all completed lessons, test scores, and mistake history saved on this device.',
        confirmLabel: 'Yes, reset everything',
        cancelLabel: 'Cancel',
        onConfirm: function () { resetProgress(); render(); },
      });
    });
    resetCard.appendChild(resetBtn);
    wrap.appendChild(resetCard);

    return wrap;
  }

  function renderAbout() {
    var wrap = document.createElement('div');
    wrap.className = 'max-2xl stack-6';
    wrap.innerHTML =
      '<header class="text-center">' +
        '<span class="about-mark">Q</span>' +
        '<h1 class="section-heading" style="margin-top:14px;">About Quantifier Mastery</h1>' +
        '<p class="muted" style="max-width:520px;margin:8px auto 0;font-size:14.5px;">A focused, interactive way to learn one of the trickiest topics in English grammar for CEFR A1&ndash;A2 learners.</p>' +
      '</header>' +
      '<section class="card about-section">' +
        '<span class="about-icon a">' + ic('book', 20) + '</span>' +
        '<div><h2 style="font-size:16px;">What you\'ll learn</h2><p class="muted" style="margin-top:4px;font-size:14px;line-height:1.6;">Ten quantifiers &mdash; many, much, some, any, a few, few, a little, little, each, and every &mdash; taught through six short lessons, interactive mini practice, and three full exam-style tests (Easy, Medium, and Challenge), each with 15 original questions.</p></div>' +
      '</section>' +
      '<section class="card about-section">' +
        '<span class="about-icon b">' + ic('grad-cap', 20) + '</span>' +
        '<div><h2 style="font-size:16px;">Who it\'s for</h2><p class="muted" style="margin-top:4px;font-size:14px;line-height:1.6;">Designed for upper primary and lower secondary students in Thailand studying at a CEFR A1&ndash;A2 level, and for anyone preparing for school English exams that test quantifiers.</p></div>' +
      '</section>' +
      '<section class="card about-section">' +
        '<span class="about-icon a">' + ic('shield', 20) + '</span>' +
        '<div><h2 style="font-size:16px;">Your data</h2><p class="muted" style="margin-top:4px;font-size:14px;line-height:1.6;">This app has no login and no server &mdash; all of your progress, scores, and mistake history are saved privately in your browser\'s local storage on this device only.</p></div>' +
      '</section>' +
      '<section class="card text-center" style="padding:22px;">' +
        '<div style="color:var(--apricot-500);">' + ic('sparkles', 20) + '</div>' +
        '<p class="muted" style="margin-top:6px;font-size:14px;">Ready to start?</p>' +
        '<div style="margin-top:10px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">' +
          '<button class="btn-primary" data-nav="learn">Start Learning</button>' +
          '<button class="btn-secondary" data-nav="home">Return Home</button>' +
        '</div>' +
      '</section>' +
      '<p class="text-center muted small">Cr. Bright EngMath</p>';
    return wrap;
  }

  /* ================================================================
     ROUTER
     ================================================================ */
  var main = document.getElementById('main');

  function parseHash() {
    var hash = window.location.hash || '#/home';
    hash = hash.replace(/^#\/?/, '');
    var parts = hash.split('?');
    var path = parts[0] || 'home';
    var params = {};
    if (parts[1]) {
      parts[1].split('&').forEach(function (kv) {
        var pair = kv.split('=');
        if (pair[0]) params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
      });
    }
    return { path: path, params: params };
  }
  function navigate(path) { window.location.hash = '#/' + path; }
  window.__qmNavigate = navigate;

  function setActiveNav(path) {
    var top = path.split('/')[0];
    var links = document.querySelectorAll('[data-nav]');
    for (var i = 0; i < links.length; i++) {
      var target = links[i].getAttribute('data-nav').split('?')[0];
      var targetTop = target.split('/')[0];
      var active = target === path || (targetTop === 'test' && top === 'test' && target === path);
      links[i].classList.toggle('active', active);
    }
  }

  document.addEventListener('click', function (e) {
    var navBtn = e.target.closest ? e.target.closest('[data-nav]') : null;
    if (navBtn) {
      navigate(navBtn.getAttribute('data-nav'));
      closeMobileMenu();
    }
  });

  var hamburgerBtn = document.getElementById('hamburger-btn');
  var mobileMenu = document.getElementById('mobile-menu');
  hamburgerBtn.addEventListener('click', function () {
    var open = mobileMenu.classList.toggle('open');
    hamburgerBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  function closeMobileMenu() { mobileMenu.classList.remove('open'); hamburgerBtn.setAttribute('aria-expanded', 'false'); }

  function render() {
    var parsed = parseHash();
    var path = parsed.path;
    var params = parsed.params;
    setActiveNav(path);
    main.innerHTML = '';
    var node;
    if (path === 'home') node = renderHome();
    else if (path === 'learn') node = renderLearn(params);
    else if (path === 'practice') node = renderPractice();
    else if (path.indexOf('test/') === 0) node = renderTest(path.split('/')[1]);
    else if (path === 'mistakes') node = renderMistakes();
    else if (path === 'results') node = renderResults(params);
    else if (path === 'progress') node = renderProgress();
    else if (path === 'about') node = renderAbout();
    else node = renderHome();
    main.appendChild(node);
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  window.addEventListener('hashchange', render);
  window.addEventListener('DOMContentLoaded', function () {
    if (!window.location.hash) window.location.hash = '#/home';
    render();
  });
  // In case DOMContentLoaded already fired before this script executed:
  if (document.readyState === 'interactive' || document.readyState === 'complete') {
    if (!window.location.hash) window.location.hash = '#/home';
    render();
  }
})();
</script>
