:root {
  /* ---- Brand palette ---- */
  --color-cream: #fdf8ee;
  --color-cream-deep: #f7eed8;
  --color-blue: #5a8fd6;
  --color-blue-deep: #3f6fb0;
  --color-blue-tint: #eaf2fb;
  --color-mint: #4fb99b;
  --color-mint-deep: #33917a;
  --color-mint-tint: #e4f6f0;
  --color-butter: #f6c453;
  --color-butter-deep: #d99f2b;
  --color-butter-tint: #fdf1d4;
  --color-coral: #f0805f;
  --color-coral-deep: #d85f3e;
  --color-coral-tint: #fde9e1;
  --color-navy: #1f2a3d;
  --color-navy-soft: #45536b;
  --color-white: #ffffff;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;

  --shadow-sm: 0 2px 8px rgba(31, 42, 61, 0.08);
  --shadow-md: 0 8px 24px rgba(31, 42, 61, 0.1);

  --font-body: 'Nunito', 'Noto Sans Thai', system-ui, sans-serif;

  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  min-width: 320px;
  overflow-x: hidden;
}

body {
  font-family: var(--font-body);
  background: var(--color-cream);
  color: var(--color-navy);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

#root {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

h1,
h2,
h3,
h4 {
  font-weight: 800;
  color: var(--color-navy);
  line-height: 1.25;
  margin: 0 0 0.5em;
}

p {
  margin: 0 0 1em;
}

// ---------------------------------------------------------------------------
// Quantifier Quick Review — standalone single-file app logic (vanilla JS).
// Mirrors the React version's behavior exactly; no build step, no modules,
// no external requests. Safe to open straight from disk or any static host.
// ---------------------------------------------------------------------------

var LAST_RESULT_KEY = 'qqr:last-result';

function saveLastResult(result) {
  try {
    window.localStorage.setItem(LAST_RESULT_KEY, JSON.stringify(result));
  } catch (e) {
    /* localStorage may be unavailable — fail silently */
  }
}

function loadLastResult() {
  try {
    var raw = window.localStorage.getItem(LAST_RESULT_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

// ---- Global state ----
var state = { page: 'home' };
var reviewState = { activeId: reviewTopics[0].id };
var practiceState = null;
var mockState = null;
var pendingResult = null;
var pendingDetailedAnswers = undefined;

function resetPracticeState() {
  practiceState = { index: 0, selected: null, answered: false, correctCount: 0, breakdown: {} };
}

function resetMockState() {
  mockState = {
    index: 0,
    answers: new Array(mockQuestions.length).fill(null),
    showWarning: false,
  };
}

function navigate(page) {
  if (page === 'practice') resetPracticeState();
  if (page === 'mock') resetMockState();
  if (page === 'review') reviewState = { activeId: reviewTopics[0].id };
  state.page = page;
  render();
  updateNavActive();
  window.scrollTo(0, 0);
}

function updateNavActive() {
  var links = document.querySelectorAll('#mainNav a');
  links.forEach(function (link) {
    if (link.getAttribute('data-page') === state.page) {
      link.classList.add('topbar__link--active');
    } else {
      link.classList.remove('topbar__link--active');
    }
  });
}

function render() {
  var app = document.getElementById('app');
  if (state.page === 'home') app.innerHTML = renderHome();
  else if (state.page === 'review') app.innerHTML = renderReview();
  else if (state.page === 'practice') app.innerHTML = renderPractice();
  else if (state.page === 'mock') app.innerHTML = renderMock();
  else if (state.page === 'result') app.innerHTML = renderResult();
}

function renderHome() {
  var last = loadLastResult();
  var lastScoreHtml = '';
  if (last) {
    lastScoreHtml =
      '<p class="home__last-score">Last ' +
      (last.mode === 'mock' ? 'Mock Test' : 'Practice Quiz') +
      ' score: ' +
      last.percentage +
      '% (' +
      last.correctCount +
      '/' +
      last.totalQuestions +
      ') — ' +
      (last.passed ? 'Passed 🎉' : 'Keep practicing!') +
      '</p>';
  }

  return (
    '<div>' +
    '<section class="home__hero">' +
    '<span class="home__eyebrow">Grade 4–6 · English Grammar Review</span>' +
    '<h1 class="home__title">Quantifier Quick Review</h1>' +
    '<p class="home__subtitle">A short, friendly review of Countable &amp; Uncountable Nouns and Quantifiers — perfect for a quick warm-up before a test, in class or over Zoom.</p>' +
    '</section>' +
    '<section class="home__actions" aria-label="Choose an activity">' +
    '<a href="#" class="home__action-card home__action-card--review" onclick="navigate(\'review\');return false;">' +
    '<span class="home__action-icon" aria-hidden="true">📘</span>' +
    '<span class="home__action-title">Start Review</span>' +
    '<p class="home__action-desc">Six short topic cards with clear rules and examples — no long reading required.</p>' +
    '<span class="home__cta">Open Review →</span>' +
    '</a>' +
    '<a href="#" class="home__action-card home__action-card--practice" onclick="navigate(\'practice\');return false;">' +
    '<span class="home__action-icon" aria-hidden="true">✏️</span>' +

    '<a href="#" class="home__action-card home__action-card--mock" onclick="navigate(\'mock\');return false;">' +

  reviewState.activeId = id;
  render();
}

function renderReview() {
  var activeTopic = reviewTopics.find(function (t) { return t.id === reviewState.activeId; }) || reviewTopics[0];

  var tabsHtml = reviewTopics
    .map(function (topic) {
      var activeClass = topic.id === activeTopic.id ? ' review__tab--active' : '';
      return (
        '<button role="tab" aria-selected="' +
        (topic.id === activeTopic.id) +
        '" class="review__tab' +
        activeClass +
        '" onclick="selectReviewTab(\'' +
        topic.id +
        '\')">' +
        topic.title +
        '</button>'
      );
    })
    .join('');

  var rulesHtml = activeTopic.rules.map(function (rule) { return '<li>' + rule + '</li>'; }).join('');

  var wordGroupsHtml = '';
  if (activeTopic.wordGroups) {
    wordGroupsHtml =
      '<div class="review__word-groups">' +
      activeTopic.wordGroups
        .map(function (group, index) {
          var chips = group.words.map(function (w) { return '<span class="review__word-chip">' + w + '</span>'; }).join('');
          return (
            '<div class="review__word-group review__word-group--' +
            index +
            '"><div class="review__word-group-label">' +
            group.label +
            '</div><div class="review__word-chips">' +
            chips +
            '</div></div>'
          );
        })
        .join('') +
      '</div>';
  }

  var examplesHtml = '';
  if (activeTopic.examples) {
    examplesHtml =
      '<ul class="review__examples">' +
      activeTopic.examples.map(function (ex) { return '<li>' + ex + '</li>'; }).join('') +
      '</ul>';
  }

  return (
    '<div>' +
    '<div class="review__intro"><h1>Review</h1><p class="home__subtitle" style="margin:0 auto">Six short topics. Tap a tab, read the rule, and check the examples.</p></div>' +
    '<div class="review__tabs" role="tablist" aria-label="Grammar topics">' +
    tabsHtml +
    '</div>' +
    '<div class="card" role="tabpanel">' +
    '<h2>' +
    activeTopic.title +
    '</h2>' +
    '<p class="review__panel-summary">' +
    activeTopic.summary +
    '</p>' +
    '<ul class="review__rules">' +
    rulesHtml +
    '</ul>' +
    wordGroupsHtml +
    examplesHtml +
    '</div>' +
    '</div>'
  );
}

// ---------------------------------------------------------------------------
// Practice Quiz
// ---------------------------------------------------------------------------
function renderOptionButton(letter, text, selected, disabled, optionState, onclickAttr) {
  var classNames = 'option-btn';
  if (optionState === 'correct') classNames += ' option-btn--correct';
  else if (optionState === 'incorrect') classNames += ' option-btn--incorrect';
  else if (selected) classNames += ' option-btn--selected';

  var mark = '';
  if (optionState === 'correct') mark = '<span class="option-btn__mark" aria-label="Correct answer">✓</span>';
  else if (optionState === 'incorrect') mark = '<span class="option-btn__mark" aria-label="Your answer, incorrect">✗</span>';

  return (
    '<button type="button" class="' +
    classNames +
    '" ' +
    (disabled ? 'disabled ' : '') +
    'aria-pressed="' +
    selected +
    '" ' +
    onclickAttr +
    '>' +
    '<span class="option-btn__letter" aria-hidden="true">' +
    letter +
    '</span><span>' +
    text +
    '</span>' +
    mark +
    '</button>'
  );
}

function selectPracticeOption(optionIndex) {
  if (practiceState.answered) return;
  var question = practiceQuestions[practiceState.index];
  var isCorrect = optionIndex === question.correctIndex;
  practiceState.selected = optionIndex;
  practiceState.answered = true;
  if (isCorrect) practiceState.correctCount += 1;

  var existing = practiceState.breakdown[question.category] || { correct: 0, total: 0 };
  practiceState.breakdown[question.category] = {
    correct: existing.correct + (isCorrect ? 1 : 0),
    total: existing.total + 1,
  };
  render();
}

function nextPractice() {
  var isLast = practiceState.index === practiceQuestions.length - 1;
  if (isLast) {
    var totalQuestions = practiceQuestions.length;
    var finalCorrect = practiceState.correctCount;
    var percentage = Math.round((finalCorrect / totalQuestions) * 100);
    var result = {
      mode: 'practice',
      totalQuestions: totalQuestions,
      correctCount: finalCorrect,
      incorrectCount: totalQuestions - finalCorrect,
      percentage: percentage,
      passed: percentage >= 70,
      categoryBreakdown: practiceState.breakdown,
      completedAt: new Date().toISOString(),
    };
    saveLastResult(result);
    pendingResult = result;
    pendingDetailedAnswers = undefined;
    navigate('result');
    return;
  }
  practiceState.index += 1;
  practiceState.selected = null;
  practiceState.answered = false;
  render();
}

function renderPractice() {
  var question = practiceQuestions[practiceState.index];
  var isLast = practiceState.index === practiceQuestions.length - 1;
  var percent = ((practiceState.index + (practiceState.answered ? 1 : 0)) / practiceQuestions.length) * 100;
  var isCorrectAnswer = practiceState.answered && practiceState.selected === question.correctIndex;

  var optionsHtml = question.options
    .map(function (option, i) {
      var optionState = 'neutral';
      if (practiceState.answered) {
        if (i === question.correctIndex) optionState = 'correct';
        else if (i === practiceState.selected) optionState = 'incorrect';
      }
      var letter = String.fromCharCode(65 + i);
      var onclickAttr = practiceState.answered ? '' : 'onclick="selectPracticeOption(' + i + ')"';
      return renderOptionButton(letter, option, practiceState.selected === i, practiceState.answered, optionState, onclickAttr);
    })
    .join('');

  var feedbackHtml = '';
  if (practiceState.answered) {
    feedbackHtml =
      '<div class="feedback-panel feedback-panel--' +
      (isCorrectAnswer ? 'correct' : 'incorrect') +
      '" role="status">' +
      '<span class="feedback-panel__headline">' +
      (isCorrectAnswer ? 'Correct!' : 'Not quite.') +
      '</span>' +
      '<span>Answer: <strong>' +
      question.options[question.correctIndex] +
      '</strong></span>' +
      '<span>' +
      question.explanation +
      '</span>' +
      '</div>';
  }

  return (
    '<div>' +
    '<div class="quiz__header"><h1 class="quiz__title">Practice Quiz</h1><span class="quiz__counter">Question ' +
    (practiceState.index + 1) +
    ' / ' +
    practiceQuestions.length +
    '</span></div>' +
    '<div class="quiz__progress-track" role="progressbar" aria-valuenow="' +
    Math.round(percent) +
    '" aria-valuemin="0" aria-valuemax="100" aria-label="Practice quiz progress"><div class="quiz__progress-fill" style="width:' +
    percent +
    '%"></div></div>' +
    '<div class="card">' +
    '<span class="quiz__category-tag">' +
    CATEGORY_LABELS[question.category] +
    '</span><span class="quiz__format-tag">' +
    question.formatLabel +
    '</span>' +
    '<p class="quiz__prompt">' +
    question.prompt +
    '</p>' +
    '<div class="quiz__options" role="group" aria-label="Answer options">' +
    optionsHtml +
    '</div>' +
    feedbackHtml +
    '<div class="quiz__footer-actions"><button type="button" class="btn btn--primary" onclick="nextPractice()" ' +
    (practiceState.answered ? '' : 'disabled') +
    '>' +
    (isLast ? 'See Results' : 'Next Question') +
    '</button></div>' +
    '</div>' +
    '</div>'
  );
}

// ---------------------------------------------------------------------------
// Mock Test
// ---------------------------------------------------------------------------
function selectMockOption(optionIndex) {
  mockState.answers[mockState.index] = optionIndex;
  render();
}

function gotoMock(targetIndex) {
  mockState.index = Math.max(0, Math.min(mockQuestions.length - 1, targetIndex));
  render();
}

function submitMock() {
  var total = mockQuestions.length;
  var answeredCount = mockState.answers.filter(function (a) { return a !== null; }).length;
  if (answeredCount < total) {
    mockState.showWarning = true;
    render();
    return;
  }

  var correctCount = 0;
  var breakdown = {};
  var detailedAnswers = mockQuestions.map(function (q, i) {
    var chosen = mockState.answers[i];
    var isCorrect = chosen === q.correctIndex;
    if (isCorrect) correctCount += 1;
    var existing = breakdown[q.category] || { correct: 0, total: 0 };
    breakdown[q.category] = { correct: existing.correct + (isCorrect ? 1 : 0), total: existing.total + 1 };
    return {
      prompt: q.prompt,
      chosenText: chosen !== null ? q.options[chosen] : '—',
      correctText: q.options[q.correctIndex],
      explanation: q.explanation,
      isCorrect: isCorrect,
    };
  });

  var percentage = Math.round((correctCount / total) * 100);
  var result = {
    mode: 'mock',
    totalQuestions: total,
    correctCount: correctCount,
    incorrectCount: total - correctCount,
    percentage: percentage,
    passed: percentage >= 70,
    categoryBreakdown: breakdown,
    completedAt: new Date().toISOString(),
  };
  saveLastResult(result);
  pendingResult = result;
  pendingDetailedAnswers = detailedAnswers;
  navigate('result');
}

function renderMock() {
  var total = mockQuestions.length;
  var question = mockQuestions[mockState.index];
  var answeredCount = mockState.answers.filter(function (a) { return a !== null; }).length;
  var percent = ((mockState.index + 1) / total) * 100;

  var warningHtml = '';
  if (mockState.showWarning && answeredCount < total) {
    warningHtml =
      '<div class="quiz__warning" role="alert">Please answer all questions before submitting. You have answered ' +
      answeredCount +
      ' of ' +
      total +
      ' questions.</div>';
  }

  var optionsHtml = question.options
    .map(function (option, i) {
      var letter = String.fromCharCode(65 + i);
      return renderOptionButton(
        letter,
        option,
        mockState.answers[mockState.index] === i,
        false,
        'neutral',
        'onclick="selectMockOption(' + i + ')"'
      );
    })
    .join('');

  var jumpHtml = mockQuestions
    .map(function (q, i) {
      var classNames = 'quiz__jump-btn';
      if (i === mockState.index) classNames += ' quiz__jump-btn--current';
      else if (mockState.answers[i] !== null) classNames += ' quiz__jump-btn--answered';
      return (
        '<button type="button" class="' +
        classNames +
        '" onclick="gotoMock(' +
        i +
        ')" aria-label="Go to question ' +
        (i + 1) +
        (mockState.answers[i] !== null ? ', answered' : ', not answered') +
        '"' +
        (i === mockState.index ? ' aria-current="true"' : '') +
        '>' +
        (i + 1) +
        '</button>'
      );
    })
    .join('');

  return (
    '<div>' +
    '<div class="quiz__header"><h1 class="quiz__title">Mock Test</h1><span class="quiz__counter">Question ' +
    (mockState.index + 1) +
    ' / ' +
    total +
    '</span></div>' +
    '<div class="quiz__progress-track" role="progressbar" aria-valuenow="' +
    Math.round(percent) +
    '" aria-valuemin="0" aria-valuemax="100" aria-label="Mock test progress"><div class="quiz__progress-fill" style="width:' +
    percent +
    '%"></div></div>' +
    warningHtml +
    '<div class="card">' +
    '<span class="quiz__category-tag">' +
    CATEGORY_LABELS[question.category] +
    '</span><span class="quiz__format-tag">' +
    question.formatLabel +
    '</span>' +
    '<p class="quiz__prompt">' +
    question.prompt +
    '</p>' +
    '<div class="quiz__options" role="group" aria-label="Answer options">' +
    optionsHtml +
    '</div>' +
    '<div class="quiz__nav-actions">' +
    '<button type="button" class="btn btn--ghost" onclick="gotoMock(' +
    (mockState.index - 1) +
    ')" ' +
    (mockState.index === 0 ? 'disabled' : '') +
    '>← Previous</button>' +
    '<button type="button" class="btn btn--primary" onclick="gotoMock(' +
    (mockState.index + 1) +
    ')" ' +
    (mockState.index === total - 1 ? 'disabled' : '') +
    '>Next →</button>' +
    '</div>' +
    '</div>' +
    '<div class="quiz__jump-grid" aria-label="Jump to question">' +
    jumpHtml +
    '</div>' +
    '<div class="quiz__footer-actions"><button type="button" class="btn btn--accent" onclick="submitMock()">Submit Test (' +
    answeredCount +
    '/' +
    total +
    ' answered)</button></div>' +
    '</div>'
  );
}

// ---------------------------------------------------------------------------
// Result
// ---------------------------------------------------------------------------
function renderResult() {
  var result = pendingResult || loadLastResult();
  if (!result) {
    navigate('home');
    return '';
  }
  var detailedAnswers = pendingResult ? pendingDetailedAnswers : undefined;

  var breakdownEntries = Object.keys(result.categoryBreakdown)
    .map(function (category) { return [category, result.categoryBreakdown[category]]; })
    .filter(function (entry) { return entry[1].total > 0 && entry[1].correct / entry[1].total < 1; })
    .sort(function (a, b) { return a[1].correct / a[1].total - b[1].correct / b[1].total; });

  var topicsToReviewHtml;
  if (breakdownEntries.length === 0) {
    topicsToReviewHtml = '<p>Great job! No weak topics this time — every category was answered correctly.</p>';
  } else {
    topicsToReviewHtml =
      '<ul class="result__review-list">' +
      breakdownEntries.map(function (entry) { return '<li>' + CATEGORY_LABELS[entry[0]] + '</li>'; }).join('') +
      '</ul>';
  }

  var answerReviewHtml = '';
  if (detailedAnswers && detailedAnswers.length > 0) {
    answerReviewHtml =
      '<div class="result__answer-review"><h2>Answer Review</h2>' +
      detailedAnswers
        .map(function (item, i) {
          return (
            '<div class="result__answer-item result__answer-item--' +
            (item.isCorrect ? 'right' : 'wrong') +
            '">' +
            '<div class="result__answer-q">' +
            (i + 1) +
            '. ' +
            item.prompt +
            '</div>' +
            '<div class="result__answer-meta">Your answer: <strong>' +
            item.chosenText +
            '</strong>' +
            (item.isCorrect ? '' : ' · Correct answer: <strong>' + item.correctText + '</strong>') +
            '</div>' +
            '<div>' +
            item.explanation +
            '</div>' +
            '</div>'
          );
        })
        .join('') +
      '</div>';
  }

  return (
    '<div>' +
    '<div class="result__summary">' +
    '<div class="result__badge result__badge--' +
    (result.passed ? 'pass' : 'fail') +
    '">' +
    result.percentage +
    '%</div>' +
    '<h1 class="result__status">' +
    (result.passed ? 'Passed! 🎉' : 'Not Passed Yet') +
    '</h1>' +
    '<p class="result__score-line">' +
    (result.mode === 'mock' ? 'Mock Test' : 'Practice Quiz') +
    ' · Passing score is 70%</p>' +
    '</div>' +
    '<div class="result__stats">' +
    '<div class="result__stat"><div class="result__stat-value">' +
    result.totalQuestions +
    '</div><div class="result__stat-label">Total Questions</div></div>' +
    '<div class="result__stat result__stat--mint"><div class="result__stat-value">' +
    result.correctCount +
    '</div><div class="result__stat-label">Correct</div></div>' +
    '<div class="result__stat result__stat--coral"><div class="result__stat-value">' +
    result.incorrectCount +
    '</div><div class="result__stat-label">Incorrect</div></div>' +
    '</div>' +
    '<div class="card"><h2>Topics to Review</h2>' +
    topicsToReviewHtml +
    '</div>' +
    answerReviewHtml +
    '<div class="result__actions">' +
    '<button type="button" class="btn btn--primary" onclick="navigate(\'review\')">Back to Review</button>' +
    '<button type="button" class="btn btn--secondary" onclick="navigate(\'' +
    (result.mode === 'mock' ? 'mock' : 'practice') +
    '\')">Try Again</button>' +
    '<button type="button" class="btn btn--ghost" onclick="navigate(\'home\')">Home</button>' +
    '</div>' +
    '</div>'
  );
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
navigate('home');

</script>
</body>
</html>
