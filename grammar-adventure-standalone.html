<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Grammar Adventure — English Grammar Review</title>
<meta name="description" content="A friendly English grammar review app for primary school students — learn, practise, and get ready for exams.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
<!-- No external fonts or assets: uses the device's own rounded/system fonts so the
     app works fully offline, straight from a double-clicked index.html. -->
<style>
/* ==========================================================================
   Grammar Adventure — Stylesheet
   Warm cream + sky blue / orange / coral / soft green / warm yellow palette.
   No purple, no neon, no heavy gradients or glow.
   ========================================================================== */

:root {
  /* Palette */
  --cream: #FBF4E7;
  --cream-deep: #F4EAD6;
  --paper: #FFFDF8;
  --ink: #33302A;
  --ink-soft: #5B564C;

  --sky: #3F9FD6;
  --sky-deep: #2A7FB0;
  --sky-tint: #E4F3FB;

  --orange: #F0913F;
  --orange-deep: #D5741F;
  --orange-tint: #FDEEDD;

  --coral: #EF6F5E;
  --coral-deep: #D24F3E;
  --coral-tint: #FCE7E2;

  --green: #5FB37C;
  --green-deep: #3E9260;
  --green-tint: #E6F4EA;

  --yellow: #F1BD3D;
  --yellow-deep: #C8931B;
  --yellow-tint: #FDF3DA;

  --border: #E7DBC3;
  --shadow-sm: 0 2px 6px rgba(70, 55, 25, 0.08);
  --shadow-md: 0 6px 18px rgba(70, 55, 25, 0.12);
  --shadow-lg: 0 12px 28px rgba(70, 55, 25, 0.16);

  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 26px;

  /* System-font stacks only — no external font files or network requests,
     so the app renders identically whether opened online or offline. */
  --font-head: ui-rounded, 'SF Pro Rounded', -apple-system, 'Segoe UI', 'Noto Sans Thai UI',
    'Noto Sans Thai', 'Leelawadee UI', Tahoma, Roboto, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai UI',
    'Noto Sans Thai', 'Leelawadee UI', Roboto, Tahoma, Arial, sans-serif;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 8% 12%, rgba(240,145,63,0.07), transparent 40%),
    radial-gradient(circle at 92% 85%, rgba(63,159,214,0.08), transparent 45%),
    var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.5;
  overflow-x: hidden;
}

h1, h2, h3, h4 { font-family: var(--font-head); font-weight: 700; margin: 0 0 0.4em; color: var(--ink); }
p { margin: 0 0 0.75em; }
button { font-family: inherit; }
img, svg { max-width: 100%; display: block; }

.skip-link {
  position: absolute; left: -999px; top: 0;
  background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 0 0 8px 0; z-index: 1000;
}
.skip-link:focus { left: 0; }

/* ==================== Header ==================== */
.site-header {
  position: sticky; top: 0; z-index: 40;
  background: var(--paper);
  border-bottom: 2px solid var(--border);
}
.header-inner {
  max-width: 1080px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  gap: 12px;
}
.brand {
  display: flex; align-items: center; gap: 8px;
  background: none; border: none; cursor: pointer;
  padding: 6px 4px; border-radius: var(--radius-sm);
}
.brand:hover { background: var(--cream-deep); }
.brand-star { font-size: 1.5rem; }
.brand-text {
  font-family: var(--font-head); font-weight: 800; font-size: 1.25rem; color: var(--sky-deep);
}
.top-nav { display: flex; gap: 8px; }
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--cream-deep); border: 2px solid transparent; color: var(--ink);
  font-weight: 700; font-size: 0.95rem;
  padding: 9px 14px; border-radius: 999px; cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
}
.nav-btn:hover { background: var(--sky-tint); border-color: var(--sky); transform: translateY(-1px); }
.nav-btn:focus-visible, button:focus-visible, [tabindex]:focus-visible {
  outline: 3px solid var(--sky-deep); outline-offset: 2px;
}
.nav-btn-reset { background: var(--coral-tint); }
.nav-btn-reset:hover { background: var(--coral-tint); border-color: var(--coral); }
.nav-btn span { display: inline; }

/* ==================== Layout ==================== */
main { max-width: 1080px; margin: 0 auto; padding: 24px 20px 60px; }
.site-footer {
  text-align: center; color: var(--ink-soft); font-size: 0.85rem;
  padding: 18px 20px 34px;
}

.screen { animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ==================== Buttons ==================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-weight: 800; font-size: 1rem; font-family: var(--font-head);
  padding: 14px 22px; border-radius: var(--radius-md);
  border: none; cursor: pointer; min-height: 48px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}
.btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.btn:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-primary { background: var(--sky); color: #fff; }
.btn-primary:hover { background: var(--sky-deep); }
.btn-accent { background: var(--orange); color: #fff; }
.btn-accent:hover { background: var(--orange-deep); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--green-deep); }
.btn-ghost { background: var(--cream-deep); color: var(--ink); }
.btn-ghost:hover { background: var(--border); }
.btn-danger { background: var(--coral); color: #fff; }
.btn-danger:hover { background: var(--coral-deep); }
.btn-block { width: 100%; }
.btn-lg { padding: 18px 28px; font-size: 1.1rem; }

/* ==================== Cards (generic) ==================== */
.card {
  background: var(--paper);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  padding: 22px;
}

/* ==================== Home screen ==================== */
.hero {
  position: relative;
  text-align: center;
  padding: 30px 16px 10px;
}
.hero-deco { position: absolute; font-size: 1.8rem; opacity: 0.85; user-select: none; }
.hero-deco.d1 { top: 4px; left: 6%; transform: rotate(-12deg); color: var(--yellow-deep); }
.hero-deco.d2 { top: 14px; right: 8%; transform: rotate(10deg); color: var(--coral); }
.hero-deco.d3 { bottom: 6px; left: 18%; transform: rotate(6deg); color: var(--green-deep); display: none; }
.hero h1 { font-size: 2.3rem; color: var(--sky-deep); }
.hero .subtitle { font-size: 1.1rem; color: var(--ink-soft); font-weight: 600; }

.progress-summary {
  max-width: 640px; margin: 18px auto 0;
  background: var(--paper); border: 2px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 22px;
  box-shadow: var(--shadow-sm);
}
.progress-summary-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.progress-summary-label { font-weight: 800; font-family: var(--font-head); color: var(--ink); }
.progress-stars { color: var(--yellow-deep); font-weight: 800; }
.progress-bar-track {
  height: 16px; border-radius: 999px; background: var(--cream-deep);
  overflow: hidden; border: 1px solid var(--border);
}
.progress-bar-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--green), var(--sky));
  transition: width 0.5s ease;
}

.home-actions {
  display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
  margin: 20px 0 30px;
}
.home-actions .btn { min-width: 220px; }

.section-title {
  font-size: 1.35rem; margin: 30px 0 14px; color: var(--ink);
  display: flex; align-items: center; gap: 8px;
}

.lesson-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.lesson-card {
  background: var(--paper); border: 2px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px; box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; gap: 8px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.lesson-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.lesson-card-top { display: flex; align-items: center; gap: 10px; }
.lesson-num {
  flex: none; width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; color: #fff;
}
.lesson-card h3 { font-size: 1.08rem; margin: 0; }
.lesson-desc { color: var(--ink-soft); font-size: 0.92rem; flex-grow: 1; }
.lesson-status-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 4px; }
.status-pill {
  font-size: 0.78rem; font-weight: 800; padding: 5px 11px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 4px;
}
.status-not-started { background: var(--cream-deep); color: var(--ink-soft); }
.status-in-progress { background: var(--yellow-tint); color: var(--yellow-deep); }
.status-complete { background: var(--green-tint); color: var(--green-deep); }
.lesson-stars { font-size: 0.85rem; color: var(--yellow-deep); font-weight: 700; }
.lesson-card .btn { margin-top: 4px; }

/* Lesson theme colors applied via inline style variable --theme */
.lesson-num { background: var(--theme, var(--sky)); }

/* ==================== Lesson flow ==================== */
.lesson-header {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  margin-bottom: 14px;
}
.lesson-header-title { display: flex; align-items: center; gap: 12px; }
.lesson-header-badge {
  width: 46px; height: 46px; border-radius: 14px; background: var(--theme, var(--sky));
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 800; font-size: 1.15rem; flex: none;
}
.lesson-header h2 { margin: 0; font-size: 1.4rem; }
.back-link {
  background: none; border: none; color: var(--sky-deep); font-weight: 700; cursor: pointer;
  padding: 8px 6px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px;
}
.back-link:hover { background: var(--sky-tint); }

.stage-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.stage-tab {
  flex: 1; min-width: 100px; text-align: center;
  background: var(--cream-deep); border: 2px solid transparent; border-radius: var(--radius-md);
  padding: 10px 8px; font-weight: 800; color: var(--ink-soft); font-size: 0.92rem;
}
.stage-tab.active { background: var(--sky-tint); border-color: var(--sky); color: var(--sky-deep); }
.stage-tab.done { background: var(--green-tint); color: var(--green-deep); }

/* Learn stage */
.learn-pattern {
  background: var(--sky-tint); border: 2px solid var(--sky); border-radius: var(--radius-lg);
  padding: 18px 20px; margin-bottom: 16px; font-size: 1.05rem; font-weight: 700; color: var(--sky-deep);
}
.example-list { list-style: none; padding: 0; margin: 0 0 16px; display: flex; flex-direction: column; gap: 10px; }
.example-item {
  background: var(--paper); border: 2px solid var(--border); border-radius: var(--radius-md);
  padding: 12px 16px; font-size: 1.02rem;
}
.example-item .hl { color: var(--orange-deep); font-weight: 800; }
.example-item .hl2 { color: var(--coral-deep); font-weight: 800; }
.tip-box {
  background: var(--yellow-tint); border: 2px dashed var(--yellow-deep); border-radius: var(--radius-md);
  padding: 14px 16px; font-weight: 700; color: var(--ink); display: flex; gap: 10px; align-items: flex-start;
}
.tip-box .tip-emoji { font-size: 1.3rem; }

/* Scene illustration for prepositions */
.scene-box {
  position: relative; height: 150px; background: var(--green-tint);
  border: 2px solid var(--border); border-radius: var(--radius-md); margin: 14px 0 18px;
  overflow: hidden;
}
.scene-box .scene-anchor {
  position: absolute; font-size: 2.6rem; left: 50%; top: 50%; transform: translate(-50%, -50%);
}
.scene-box .scene-mover { position: absolute; font-size: 2.3rem; }
.scene-box .scene-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 10px; background: var(--border); }

/* Question card */
.question-card {
  background: var(--paper); border: 2px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; box-shadow: var(--shadow-sm);
}
.question-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.qtag {
  font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 999px;
  background: var(--orange-tint); color: var(--orange-deep);
}
.qdiff { font-size: 0.75rem; font-weight: 800; color: var(--ink-soft); }
.question-progress { font-weight: 800; color: var(--ink-soft); font-size: 0.9rem; }
.question-prompt { font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; line-height: 1.5; }
.question-prompt .blank { display: inline-block; min-width: 70px; border-bottom: 3px solid var(--sky); }

.options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
.option-btn {
  display: flex; align-items: center; gap: 12px; text-align: left;
  background: var(--cream-deep); border: 2px solid transparent; border-radius: var(--radius-md);
  padding: 14px 16px; font-size: 1.02rem; font-weight: 700; cursor: pointer; min-height: 52px;
  transition: background 0.12s ease, border-color 0.12s ease, transform 0.1s ease;
}
.option-btn:hover:not(:disabled) { background: var(--sky-tint); border-color: var(--sky); }
.option-letter {
  flex: none; width: 30px; height: 30px; border-radius: 50%;
  background: var(--paper); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 800;
}
.option-btn.selected { background: var(--sky-tint); border-color: var(--sky-deep); }
.option-btn.selected .option-letter { background: var(--sky); border-color: var(--sky-deep); color: #fff; }
.option-btn.correct { background: var(--green-tint); border-color: var(--green-deep); }
.option-btn.correct .option-letter { background: var(--green); border-color: var(--green-deep); color: #fff; }
.option-btn.incorrect { background: var(--coral-tint); border-color: var(--coral-deep); }
.option-btn.incorrect .option-letter { background: var(--coral); border-color: var(--coral-deep); color: #fff; }
.option-btn:disabled { cursor: default; }
.option-icon { font-size: 1.3rem; }
.result-mark { margin-left: auto; font-size: 1.2rem; }

/* Fill-in-the-blank */
.fill-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.fill-input {
  flex: 1; min-width: 160px; font-size: 1.05rem; font-weight: 700; font-family: var(--font-body);
  padding: 12px 14px; border-radius: var(--radius-md); border: 2px solid var(--border);
  background: var(--paper); color: var(--ink);
}
.fill-input:focus { outline: none; border-color: var(--sky); background: var(--sky-tint); }
.fill-input.correct { border-color: var(--green-deep); background: var(--green-tint); }
.fill-input.incorrect { border-color: var(--coral-deep); background: var(--coral-tint); }

/* Sentence builder (order) */
.word-bank, .answer-slots {
  display: flex; flex-wrap: wrap; gap: 8px; min-height: 52px;
  padding: 10px; border-radius: var(--radius-md);
}
.answer-slots { background: var(--cream-deep); border: 2px dashed var(--border); margin-bottom: 12px; }
.word-bank { background: transparent; }
.word-chip {
  background: var(--sky-tint); border: 2px solid var(--sky); color: var(--sky-deep);
  font-weight: 800; padding: 10px 14px; border-radius: 999px; cursor: pointer; font-size: 0.98rem;
  transition: transform 0.1s ease;
}
.word-chip:hover { transform: translateY(-2px); }
.word-chip.placed { opacity: 0.35; cursor: default; pointer-events: none; }
.answer-slots .word-chip { background: var(--paper); border-color: var(--orange); color: var(--orange-deep); }

/* Matching */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
.match-col { display: flex; flex-direction: column; gap: 10px; }
.match-item {
  background: var(--cream-deep); border: 2px solid transparent; border-radius: var(--radius-md);
  padding: 12px 14px; font-weight: 700; cursor: pointer; text-align: left; min-height: 52px;
}
.match-item:hover { border-color: var(--sky); }
.match-item.selected { border-color: var(--sky-deep); background: var(--sky-tint); }
.match-item.matched-correct { border-color: var(--green-deep); background: var(--green-tint); cursor: default; }
.match-item.matched-wrong { border-color: var(--coral-deep); background: var(--coral-tint); }
@media (max-width: 560px) { .match-grid { grid-template-columns: 1fr; gap: 10px; } }

/* Feedback panel */
.feedback-panel {
  margin-top: 14px; border-radius: var(--radius-md); padding: 14px 16px;
  font-weight: 700; display: none; align-items: flex-start; gap: 10px;
}
.feedback-panel.show { display: flex; animation: popIn 0.28s ease; }
.feedback-panel.correct { background: var(--green-tint); border: 2px solid var(--green-deep); color: var(--green-deep); }
.feedback-panel.incorrect { background: var(--coral-tint); border: 2px solid var(--coral-deep); color: var(--coral-deep); }
.feedback-panel .fb-icon { font-size: 1.4rem; flex: none; }
.feedback-panel .fb-text { color: var(--ink); font-weight: 600; }
.feedback-panel .fb-title { display: block; margin-bottom: 3px; }
@keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.question-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }

/* Check stage results / lesson summary */
.summary-card { text-align: center; padding: 30px 20px; }
.summary-score { font-family: var(--font-head); font-size: 3rem; color: var(--sky-deep); font-weight: 800; margin: 6px 0; }
.summary-sub { color: var(--ink-soft); font-weight: 700; margin-bottom: 20px; }
.summary-stats { display: flex; justify-content: center; gap: 24px; margin: 16px 0 24px; flex-wrap: wrap; }
.stat-pill { background: var(--cream-deep); border-radius: var(--radius-md); padding: 12px 20px; min-width: 110px; }
.stat-pill .num { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; }
.stat-pill.ok .num { color: var(--green-deep); }
.stat-pill.no .num { color: var(--coral-deep); }
.stat-pill .lbl { font-size: 0.82rem; color: var(--ink-soft); font-weight: 700; }
.stars-earned { font-size: 2rem; margin: 10px 0; letter-spacing: 4px; }
.summary-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
.mistake-list { text-align: left; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.mistake-item {
  background: var(--coral-tint); border: 2px solid var(--coral); border-radius: var(--radius-md); padding: 12px 14px;
}
.mistake-item .mi-q { font-weight: 800; margin-bottom: 4px; }
.mistake-item .mi-correct { color: var(--green-deep); font-weight: 700; }
.mistake-item .mi-explain { color: var(--ink-soft); font-size: 0.92rem; margin-top: 4px; }

/* Mixed challenge intro card */
.challenge-intro { text-align: center; padding: 30px 20px; }
.challenge-intro .big-emoji { font-size: 3rem; }

/* Topic breakdown (results) */
.topic-breakdown { display: flex; flex-direction: column; gap: 10px; margin: 14px 0 20px; }
.topic-row { display: flex; align-items: center; gap: 10px; }
.topic-row .topic-name { flex: 0 0 150px; font-weight: 700; font-size: 0.92rem; }
.topic-row .topic-bar-track { flex: 1; height: 12px; border-radius: 999px; background: var(--cream-deep); overflow: hidden; }
.topic-row .topic-bar-fill { height: 100%; border-radius: 999px; }
.topic-row .topic-pct { flex: 0 0 42px; text-align: right; font-weight: 800; font-size: 0.85rem; }

.recommend-box {
  background: var(--yellow-tint); border: 2px solid var(--yellow-deep); border-radius: var(--radius-lg);
  padding: 16px 18px; margin: 16px 0; font-weight: 700; text-align: left;
}

.thai-note { color: var(--ink-soft); font-weight: 600; font-size: 0.92rem; }

/* ==================== Modal & toast ==================== */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(51,48,42,0.45); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-backdrop[hidden] { display: none; }
.modal-card {
  background: var(--paper); border-radius: var(--radius-lg); padding: 26px; max-width: 420px; width: 100%;
  box-shadow: var(--shadow-lg); text-align: center;
}
.modal-actions { display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 14px 22px; border-radius: 999px;
  font-weight: 700; box-shadow: var(--shadow-lg); z-index: 200;
  display: flex; align-items: center; gap: 8px;
}
.toast[hidden] { display: none; }
.toast.celebrate { animation: toastPop 0.4s ease; }
@keyframes toastPop { 0% { transform: translateX(-50%) scale(0.8); opacity: 0; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }

/* ==================== Responsive ==================== */
@media (max-width: 640px) {
  .hero h1 { font-size: 1.7rem; }

<header class="site-header">

<!-- Toast / celebration -->
<div class="toast" id="toast" hidden></div>

<script>
/* ==========================================================================
   Grammar Adventure — Application Script
   Vanilla JS, no build step, no external dependencies.
   Sections:
     1. Storage & state
     2. Content data (intro + 8 lessons + mixed challenge)
     3. Small utilities
     4. Question engine (shared renderer for all question types)
     5. Screen renderers (home, lesson stages, mixed challenge, results)
     6. Navigation, gamification, modal/toast, init
   ========================================================================== */
(function () {
  'use strict';

  /* ============================================================
     1. STORAGE & STATE
     ============================================================ */
  const STORAGE_KEY = 'grammarAdventure.v1';

  function defaultState() {
    return {
      progress: {},          // lessonId -> {status, stars, bestCorrect, bestTotal, completedAt}
      mixed: { attempts: 0, lastResult: null }, // lastResult: {score,total,percent,byTopic,mistakes,date}
      current: { view: 'home' }
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      const d = defaultState();
      return Object.assign(d, parsed, {
        progress: Object.assign({}, parsed.progress || {}),
        mixed: Object.assign({}, d.mixed, parsed.mixed || {})
      });
    } catch (e) {
      return defaultState();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* storage unavailable — app still works, just won't persist */ }
  }

  let state = loadState();

  function getLessonProgress(lessonId) {
    if (!state.progress[lessonId]) {
      state.progress[lessonId] = { status: 'not-started', stars: 0, bestCorrect: 0, bestTotal: 0, completedAt: null };
    }
    return state.progress[lessonId];
  }

  /* ============================================================
     2. CONTENT DATA
     ============================================================ */

  // ---- Scene helper data for preposition illustrations ----
  // type: next-to | on | under | in-front-of | behind | between
  function sceneHTML(scene) {
    const P = {
      'next-to':     [{c: 'a', l: '62%', t: '58%'}, {c: 'm', l: '32%', t: '58%'}],
      'on':          [{c: 'a', l: '50%', t: '72%'}, {c: 'm', l: '50%', t: '26%'}],
      'under':       [{c: 'a', l: '50%', t: '28%'}, {c: 'm', l: '50%', t: '76%'}],
      'in-front-of': [{c: 'a', l: '50%', t: '38%', fade: true}, {c: 'm', l: '50%', t: '70%'}],
      'behind':      [{c: 'a', l: '50%', t: '70%'}, {c: 'm', l: '50%', t: '38%', fade: true}],
      'between':     [{c: 'a', l: '20%', t: '58%'}, {c: 'a2', l: '80%', t: '58%'}, {c: 'm', l: '50%', t: '58%'}]
    };
    const layout = P[scene.type] || [];
    let inner = '<div class="scene-floor"></div>';
    layout.forEach(function (pos) {
      const emoji = pos.c === 'm' ? scene.mover : (pos.c === 'a2' ? (scene.anchor2 || scene.anchor) : scene.anchor);
      const cls = pos.c === 'm' ? 'scene-mover' : 'scene-anchor';
      const fadeStyle = pos.fade ? 'opacity:0.5;font-size:2rem;' : '';
      inner += '<span class="' + cls + '" style="left:' + pos.l + ';top:' + pos.t + ';' + fadeStyle + '">' + emoji + '</span>';
    });
    return '<div class="scene-box">' + inner + '</div>';
  }

  // ---- LESSONS: intro + 8 numbered lessons ----
  const LESSONS = [
    {
      id: 'intro', number: 0, isIntro: true, theme: 'sky', icon: '🧭',
      title: 'Warm-Up: Where Is It? & What Are You Doing?',
      desc: 'Prepositions of place and the Present Continuous tense.',
      learn: {
        pattern: 'Prepositions of place tell us WHERE something is. The Present Continuous (is/am/are + verb-ing) tells us what is happening RIGHT NOW.',
        examples: [
          'The doll is <span class="hl">next to</span> the ball.',
          'The book is <span class="hl">on</span> the floor.',
          'The bike is <span class="hl">in front of</span> the table.',
          'The helicopter is <span class="hl">under</span> the table.',
          'The game is <span class="hl">between</span> the doll and the camera.',
          'The kite is <span class="hl">behind</span> the bike.',
          'What are you doing? — I’m <span class="hl2">riding</span> my bike.',
          'What’s Daisy doing? — She’s <span class="hl2">reading</span>.',
          'Is Pete flying a kite? — Yes, he is. / No, he isn’t.'
        ],
        tip: 'จำง่าย ๆ: is/am/are + กริยาเติม -ing บอกสิ่งที่กำลังทำอยู่ตอนนี้!'
      },
      check: [
        { id: 'intro-c1', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'The cat is sitting ___ the big cardboard box, hidden from view.', options: ['under', 'next to', 'between'], answer: 0, explanation: 'When one thing is hidden below another, we use "under".' },
        { id: 'intro-c2', type: 'mcq', topic: 'present-continuous', difficulty: 'easy', prompt: '___ Daisy reading a book right now?', options: ['Is', 'Are', 'Do'], answer: 0, explanation: '"Daisy" is one person (he/she), so we use "Is" to ask a yes/no question.' }
      ],
      practice: [
        { id: 'intro-p1', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'Where is the doll?', scene: { type: 'next-to', anchor: '⚽', mover: '🧸' }, options: ['It’s next to the ball.', 'It’s under the ball.', 'It’s behind the ball.'], answer: 0, explanation: 'The teddy bear is beside the ball, so we say "next to".' },
        { id: 'intro-p2', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'The book is ___ the floor.', scene: { type: 'on', anchor: '▬▬▬', mover: '📕' }, options: ['in front of', 'on', 'between'], answer: 1, explanation: 'Something resting flat on a surface uses "on".' },
        { id: 'intro-p3', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'The bike is ___ the table.', scene: { type: 'in-front-of', anchor: '🪑', mover: '🚲' }, options: ['in front of', 'behind', 'under'], answer: 0, explanation: 'The bike is closer to us, in front of the table.' },
        { id: 'intro-p4', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'The helicopter is ___ the table.', scene: { type: 'under', anchor: '🪑', mover: '🚁' }, options: ['on', 'under', 'next to'], answer: 1, explanation: 'The helicopter is below the table, so we use "under".' },
        { id: 'intro-p5', type: 'mcq', topic: 'prepositions', difficulty: 'medium', prompt: 'The game is ___ the doll and the camera.', scene: { type: 'between', anchor: '🧸', anchor2: '📷', mover: '🎲' }, options: ['between', 'behind', 'on'], answer: 0, explanation: 'When something has one thing on each side, we use "between".' },
        { id: 'intro-p6', type: 'mcq', topic: 'prepositions', difficulty: 'easy', prompt: 'The kite is ___ the bike.', scene: { type: 'behind', anchor: '🚲', mover: '🪁' }, options: ['behind', 'in front of', 'under'], answer: 0, explanation: 'The kite is hidden behind the bike.' },
        { id: 'intro-p7', type: 'fill', topic: 'present-continuous', difficulty: 'easy', prompt: 'What ___ you doing? — I’m riding my bike.', accept: ['are'], explanation: '"You" always takes "are" in the Present Continuous.' },
        { id: 'intro-p8', type: 'mcq', topic: 'present-continuous', difficulty: 'medium', prompt: 'What’s Daisy doing?', options: ['She’s reading.', 'She reads.', 'She read.'], answer: 0, explanation: 'For actions happening now, we use is/am/are + verb-ing: "She’s reading."' },
        { id: 'intro-p9', type: 'mcq', topic: 'present-continuous', difficulty: 'easy', prompt: 'What’s Peter doing?', options: ['He’s flying a kite.', 'He fly a kite.', 'He flying a kite.'], answer: 0, explanation: 'He/she needs "is" before the -ing verb: "He’s flying".' },
        { id: 'intro-p10', type: 'mcq', topic: 'present-continuous', difficulty: 'medium', prompt: 'What are Paul and Sam doing?', options: ['They’re playing hockey.', 'He’s playing hockey.', 'They plays hockey.'], answer: 0, explanation: 'Paul and Sam = they, so we use "are": "They’re playing".' },
        { id: 'intro-p11', type: 'mcq', topic: 'present-continuous', difficulty: 'easy', prompt: 'Is Pete flying a kite? Yes, he ___.', options: ['is', 'are', 'does'], answer: 0, explanation: 'Short answers match the question word: "Is he...?" → "Yes, he is."' },
        { id: 'intro-p12', type: 'order', topic: 'present-continuous', difficulty: 'medium', prompt: 'Put the words in the correct order.', words: ['kite', 'flying', 'a', 'is', 'He'], answer: 'He is flying a kite', explanation: 'Word order: subject + is/am/are + verb-ing + object.' }
      ]
    },
    {
      id: 'l1', number: 1, theme: 'coral', icon: '👨‍👩‍👧‍👦',
      title: 'People, Likes and Wants',
      desc: 'Ask about family with who’s / who are, and talk about likes, loves, and things you want to do.',
      learn: {
        pattern: 'Use Who’s / Who are to ask about people, and ’s to show who someone belongs to (possession). Use like, love, enjoy to talk about things you (don’t) enjoy, and want to + verb to talk about things you want to do.',
        examples: [
          'Who’s Simon? — He’s Stella’s brother.',
          'Who’s Suzy? — She’s Stella’s sister.',
          'Who are Grandma and Grandpa Star? — They’re Stella’s grandparents.',
          'I <span class="hl">like</span> / <span class="hl">love</span> / <span class="hl">enjoy</span> riding my bike.',
          'He <span class="hl">likes</span> / <span class="hl">loves</span> / <span class="hl">enjoys</span> reading about science.',
          'I don’t like reading. He <span class="hl2">doesn’t</span> like reading.',
          'I want to ride my bike. He wants to read about science.',
          'Does he like playing football? — Yes, he does. / No, he doesn’t.'
        ],
        tip: 'จำง่าย ๆ: He/She + likes, loves, enjoys, wants (เติม -s) ส่วน I/You/We/They ไม่เติม -s'
      },
      check: [
        { id: 'l1-c1', type: 'mcq', topic: 'like-love-enjoy', difficulty: 'easy', prompt: 'She ___ ice cream very much.', options: ['like', 'likes', 'liking'], answer: 1, explanation: 'She = he/she, so the verb takes -s: "likes".' },
        { id: 'l1-c2', type: 'mcq', topic: 'who-possessive', difficulty: 'easy', prompt: 'Who’s Simon? He’s Stella’s ___.', options: ['brother', 'sister', 'friend'], answer: 0, explanation: 'The text tells us Simon is Stella’s brother.' }
      ],
      practice: [
        { id: 'l1-p1', type: 'mcq', topic: 'who-possessive', difficulty: 'easy', prompt: 'Who’s Suzy? She’s Stella’s ___.', options: ['sister', 'brother', 'cousin'], answer: 0, explanation: 'Suzy is Stella’s sister.' },
        { id: 'l1-p2', type: 'match', topic: 'who-possessive', difficulty: 'medium', prompt: 'Match each question to its answer.', pairs: [
            { left: 'Who’s Simon?', right: 'He’s Stella’s brother.' },
            { left: 'Who’s Suzy?', right: 'She’s Stella’s sister.' },
            { left: 'Who are Grandma and Grandpa Star?', right: 'They’re Stella’s grandparents.' }
          ], explanation: 'We use He’s / She’s for one person and They’re for more than one person.' },
        { id: 'l1-p3', type: 'mcq', topic: 'like-love-enjoy', difficulty: 'medium', prompt: 'Find the mistake: "She like reading."', options: ['She likes reading.', 'She liking reading.', 'She is like reading.'], answer: 0, explanation: 'With he/she, the verb "like" needs an -s: "likes".' },
        { id: 'l1-p4', type: 'fill', topic: 'like-love-enjoy', difficulty: 'easy', prompt: 'He ___ (enjoy) playing football every weekend.', accept: ['enjoys'], explanation: 'He/she + enjoy → enjoys.' },
        { id: 'l1-p5', type: 'mcq', topic: 'like-love-enjoy', difficulty: 'easy', prompt: 'I don’t like ___ in the rain.', options: ['walk', 'walking', 'walks'], answer: 1, explanation: 'After like/love/enjoy (and don’t like), we use verb + -ing.' },
        { id: 'l1-p6', type: 'mcq', topic: 'like-love-enjoy', difficulty: 'medium', prompt: 'He ___ like broccoli at all.', options: ['don’t', 'doesn’t', 'isn’t'], answer: 1, explanation: 'He/she uses "doesn’t" in negative sentences.' },
        { id: 'l1-p7', type: 'order', topic: 'want-to', difficulty: 'medium', prompt: 'Put the words in the correct order.', words: ['to', 'want', 'bike', 'I', 'my', 'ride'], answer: 'I want to ride my bike', explanation: 'Pattern: subject + want(s) + to + base verb + object.' },
        { id: 'l1-p8', type: 'mcq', topic: 'want-to', difficulty: 'easy', prompt: 'Does he like playing football? Yes, he ___.', options: ['does', 'do', 'is'], answer: 0, explanation: 'Short answer for "Does he...?" is "Yes, he does."' },
        { id: 'l1-p9', type: 'mcq', topic: 'want-to', difficulty: 'challenge', prompt: 'Does she want to play football? No, she ___.', options: ['doesn’t', 'don’t', 'isn’t'], answer: 0, explanation: 'Negative short answer for "Does she...?" is "No, she doesn’t."' }
      ]
    },
    {
      id: 'l2', number: 2, theme: 'green', icon: '🏠',
      title: 'Have Got / Has Got',
      desc: 'Describe your house, school things, toys, pets and family using have got and has got.',
      learn: {
        pattern: 'Use have got / has got to talk about what people, houses or things possess. I/You/We/They + have got. He/She/It + has got.',
        examples: [
          'Has your house got a basement? — Yes, it has. / No, it hasn’t.',
          'My house <span class="hl2">hasn’t got</span> a basement.',
          'My house <span class="hl">has got</span> three bedrooms.',
          'I’ve got a dog. She’s got two brothers.',
          'They <span class="hl2">haven’t got</span> a garden.',
          'Has your school got a library? — Yes, it has.'
        ],
        tip: 'จำง่าย ๆ: I/You/We/They + have got, He/She/It + has got'
      },
      check: [
        { id: 'l2-c1', type: 'mcq', topic: 'have-got', difficulty: 'easy', prompt: 'He ___ got a new bike.', options: ['have', 'has', 'is'], answer: 1, explanation: 'He/she/it uses "has got".' },
        { id: 'l2-c2', type: 'mcq', topic: 'have-got', difficulty: 'easy', prompt: '___ your house got a garden?', options: ['Has', 'Have', 'Does'], answer: 0, explanation: '"Your house" = it, so the question starts with "Has".' }
      ],
      practice: [
        { id: 'l2-p1', type: 'mcq', topic: 'have-got', difficulty: 'easy', prompt: 'My house ___ got three bedrooms.', options: ['have', 'has', 'is'], answer: 1, explanation: '"House" = it, so we use "has got".' },
        { id: 'l2-p2', type: 'fill', topic: 'have-got', difficulty: 'easy', prompt: 'I ___ got a new pencil case.', accept: ['have', "'ve"], explanation: 'I/you/we/they use "have got".' },
        { id: 'l2-p3', type: 'mcq', topic: 'have-got', difficulty: 'medium', prompt: 'My house ___ a basement.', options: ['hasn’t got', 'haven’t got', 'doesn’t got'], answer: 0, explanation: 'Negative for he/she/it is "hasn’t got".' },
        { id: 'l2-p4', type: 'mcq', topic: 'have-got', difficulty: 'easy', prompt: '___ your school got a library?', options: ['Has', 'Have', 'Is'], answer: 0, explanation: 'Questions with it/he/she start with "Has".' },
        { id: 'l2-p5', type: 'mcq', topic: 'have-got', difficulty: 'easy', prompt: 'Has your house got a basement? No, it ___.', options: ['hasn’t', 'haven’t', 'doesn’t'], answer: 0, explanation: 'Short negative answer: "No, it hasn’t."' },
        { id: 'l2-p6', type: 'order', topic: 'have-got', difficulty: 'medium', prompt: 'Put the words in the correct order.', words: ['got', 'brothers', 'two', 'She’s'], answer: "She’s got two brothers", explanation: 'Pattern: subject + ’s/has got + object.' },
        { id: 'l2-p7', type: 'mcq', topic: 'have-got', difficulty: 'medium', prompt: 'Find the mistake: "They has got a big garden."', options: ['They have got a big garden.', 'They haves got a big garden.', 'They having got a big garden.'], answer: 0, explanation: 'They is plural, so it needs "have got", not "has got".' },
        { id: 'l2-p8', type: 'match', topic: 'have-got', difficulty: 'medium', prompt: 'Match each subject to the correct sentence.', pairs: [
            { left: 'I', right: 'have got a dog.' },
            { left: 'She', right: 'has got a cat.' },
            { left: 'They', right: 'haven’t got a garden.' },
            { left: 'It', right: 'hasn’t got a name yet.' }
          ], explanation: 'I/They use have(n’t) got. She/It use has(n’t) got.' },
        { id: 'l2-p9', type: 'mcq', topic: 'have-got', difficulty: 'challenge', prompt: 'Tom’s bag has a book and a pen, but no ruler. Which sentence is correct?', options: ['He hasn’t got a ruler.', 'He has got a ruler.', 'He haven’t got a ruler.'], answer: 0, explanation: 'Since there is no ruler, the correct negative form is "hasn’t got".' }
      ]
    },
    {
      id: 'l3', number: 3, theme: 'orange', icon: '⏰',
      title: 'Routines and Frequency',
      desc: 'Talk about daily routines and how often you do things: never, sometimes, always, every day.',
      learn: {
        pattern: 'Present Simple describes routines and habits. I/You/We/They use the base verb. He/She/It adds -s (or a special form like has). Adverbs of frequency (never, sometimes, always, every day) tell us how often.',
        examples: [
          'What do you do before school? — I have breakfast.',
          'What does he do before school? — He <span class="hl">has</span> breakfast.',
          'I <span class="hl2">never</span> play in the park. He <span class="hl2">never</span> plays in the park.',
          'I <span class="hl2">sometimes</span> play in the park. She <span class="hl2">sometimes</span> plays in the park.',
          'I <span class="hl2">always</span> play in the park. He <span class="hl2">always</span> plays in the park.',
          'I play in the park <span class="hl2">every day</span>.',
          'How often do you play in the park? How often does he play in the park?'
        ],
        tip: 'จำง่าย ๆ: He/She/It ในประโยค Present Simple ต้องเติม -s หรือเปลี่ยนเป็น has'
      },
      check: [
        { id: 'l3-c1', type: 'mcq', topic: 'routines', difficulty: 'easy', prompt: 'He ___ breakfast every morning.', options: ['have', 'has', 'having'], answer: 1, explanation: 'He/she/it uses "has" (not "haves").' },
        { id: 'l3-c2', type: 'mcq', topic: 'frequency', difficulty: 'easy', prompt: 'She always ___ in the park after school.', options: ['play', 'plays', 'playing'], answer: 1, explanation: 'He/she/it verbs add -s in the Present Simple, even after "always".' }
      ],
      practice: [
        { id: 'l3-p1', type: 'mcq', topic: 'routines', difficulty: 'easy', prompt: 'What ___ you do before school?', options: ['do', 'does', 'is'], answer: 0, explanation: '"You" uses "do" in Present Simple questions.' },
        { id: 'l3-p2', type: 'mcq', topic: 'routines', difficulty: 'easy', prompt: 'What does he do before school? He ___ breakfast.', options: ['have', 'has', 'haves'], answer: 1, explanation: '"Have" becomes "has" for he/she/it.' },
        { id: 'l3-p3', type: 'fill', topic: 'routines', difficulty: 'easy', prompt: 'She ___ (have) a shower every morning.', accept: ['has'], explanation: 'He/she/it: have → has.' },
        { id: 'l3-p4', type: 'mcq', topic: 'frequency', difficulty: 'easy', prompt: 'I ___ play in the park. (0% of the time — I am never there!)', options: ['never', 'always', 'every day'], answer: 0, explanation: '"Never" means 0% of the time.' },
        { id: 'l3-p5', type: 'mcq', topic: 'frequency', difficulty: 'medium', prompt: 'Find the mistake: "She always play in the park."', options: ['She always plays in the park.', 'She always playing in the park.', 'She always played in the park.'], answer: 0, explanation: 'He/she/it needs the -s form: "plays", even with "always".' },
        { id: 'l3-p6', type: 'mcq', topic: 'frequency', difficulty: 'easy', prompt: 'They play in the park ___. (this happens 100% of days)', options: ['every day', 'never', 'sometime'], answer: 0, explanation: '"Every day" usually goes at the end of the sentence.' },
        { id: 'l3-p7', type: 'order', topic: 'frequency', difficulty: 'medium', prompt: 'Put the words in the correct order.', words: ['does', 'How', 'he', 'often', 'park', 'the', 'play', 'in'], answer: 'How often does he play in the park', explanation: 'Question pattern: How often + does/do + subject + base verb + ...?' },
        { id: 'l3-p8', type: 'mcq', topic: 'frequency', difficulty: 'easy', prompt: 'How often do you play in the park? I play ___.', options: ['sometimes', 'plays sometimes', 'sometime'], answer: 0, explanation: '"Sometimes" (with an -s) is the adverb of frequency.' },
        { id: 'l3-p9', type: 'mcq', topic: 'routines', difficulty: 'easy', prompt: 'Tom plays football every single day. How often does he play football?', options: ['Every day.', 'Never.', 'Sometimes.'], answer: 0, explanation: '"Every single day" means the answer is "Every day."' },
        { id: 'l3-p10', type: 'mcq', topic: 'routines', difficulty: 'medium', prompt: '___ she do before school?', options: ['What does', 'What do', 'What is'], answer: 0, explanation: '"She" uses "does" in Present Simple questions.' }
      ]
    },
    {
      id: 'l4', number: 4, theme: 'yellow', icon: '📍',
      title: 'Go to … to … and Must',
      desc: 'Say where you go to do things, and use must for rules and obligations.',
      learn: {
        pattern: 'Use go to + place + to + verb to explain the purpose of going somewhere. Use must to talk about rules and things that are necessary — it stays the same for every subject.',
        examples: [
          'Where do you go to play basketball? — You go to the sports centre to play basketball.',
          'Where do you go to read books? — You go to the library to read books.',
          'Where do you go to swim? — You go to the swimming pool to swim.',
