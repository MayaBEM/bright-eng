    { id: 'mc21', type: 'mcq', topic: 'health', difficulty: 'easy', prompt: 'My throat hurts. I’ve got a ___.', options: ['sore throat', 'headache', 'cold'], answer: 0, explanation: 'A hurting throat is a "sore throat".' },
    { id: 'mc22', type: 'mcq', topic: 'health', difficulty: 'medium', prompt: 'She ___ got a temperature, so she’s staying home.', options: ['have', 'has', 'is'], answer: 1, explanation: 'He/she/it uses "has got".' },
    { id: 'mc23', type: 'mcq', topic: 'must-mustnt', difficulty: 'medium', prompt: 'We ___ run near the swimming pool. It’s dangerous.', options: ['mustn’t', 'must', 'don’t'], answer: 0, explanation: 'This is forbidden for safety, so we use "mustn’t".' },
    { id: 'mc24', type: 'mcq', topic: 'must-mustnt', difficulty: 'challenge', prompt: '"You mustn’t shout in class" means:', options: ['It is not allowed.', 'It is not necessary.', 'It is a good idea.'], answer: 0, explanation: 'Mustn’t always means "not allowed", never "not necessary".' },
    { id: 'mc25', type: 'mcq', topic: 'shall-offers', difficulty: 'easy', prompt: 'You look tired. ___ I get you a chair?', options: ['Shall', 'Must', 'Do'], answer: 0, explanation: '"Shall I...?" offers help.' },
    { id: 'mc26', type: 'fill', topic: 'shall-offers', difficulty: 'medium', prompt: 'It’s raining. Shall I ___ (give) you an umbrella?', accept: ['give'], explanation: 'After "Shall I", we use the base verb: "give".' },
    { id: 'mc27', type: 'mcq', topic: 'comparatives', difficulty: 'easy', prompt: 'A giraffe is ___ than a horse.', options: ['taller', 'tallest', 'more tall'], answer: 0, explanation: 'tall → taller (just add -er).' },
    { id: 'mc28', type: 'mcq', topic: 'comparatives', difficulty: 'medium', prompt: 'hot → ___', options: ['hoter', 'hotter', 'more hot'], answer: 1, explanation: 'Short vowel + consonant: double the letter, then add -er.' },
    { id: 'mc29', type: 'mcq', topic: 'was-were', difficulty: 'easy', prompt: '___ you at the party on Friday?', options: ['Were', 'Was', 'Are'], answer: 0, explanation: '"You" always uses "were".' },
    { id: 'mc30', type: 'mcq', topic: 'was-were', difficulty: 'medium', prompt: 'There ___ a lot of rain last night.', options: ['was', 'were', 'is'], answer: 0, explanation: '"Rain" is uncountable, so we use "was".' }
  ];

  const TOPIC_LABELS = {
    'prepositions': 'Prepositions of Place', 'present-continuous': 'Present Continuous',
    'who-possessive': 'Who’s / Possessive ’s', 'like-love-enjoy': 'Like, Love, Enjoy',
    'want-to': 'Want to', 'have-got': 'Have Got / Has Got', 'routines': 'Daily Routines',
    'frequency': 'Adverbs of Frequency', 'go-to-purpose': 'Go to … to …', 'must-rules': 'Must (Rules)',
    'health': 'Health Vocabulary', 'must-mustnt': 'Must / Mustn’t', 'shall-offers': 'Shall (Offers)',
    'comparatives': 'Comparatives', 'was-were': 'Was / Were'
  };

  const ENCOURAGE_CORRECT = ['Great job! 🎉', 'Excellent work! ⭐', 'You’ve got it! 💪', 'Nailed it!', 'เก่งมาก! ทำถูกต้อง!', 'Awesome! 🌟'];
  const ENCOURAGE_RETRY = ['One more try! 🙂', 'เกือบถูกแล้ว ลองอีกครั้งนะ', 'So close — look again!', 'ลองดูอีกครั้ง คุณทำได้!'];
  const ENCOURAGE_REVEAL = ['Good try! Here’s the answer:', 'ไม่เป็นไร มาดูคำตอบที่ถูกต้องกันนะ:', 'Nice effort — let’s learn from this one:'];

  /* ============================================================
     3. SMALL UTILITIES
     ============================================================ */
  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }
  function normalizeAnswer(str) {
    return String(str).trim().toLowerCase().replace(/[.!?]+$/, '').replace(/\s+/g, ' ');
  }
  function findLesson(id) {
    for (let i = 0; i < LESSONS.length; i++) { if (LESSONS[i].id === id) return LESSONS[i]; }
    return null;
  }
  function app() { return $('#app'); }
  function setCurrent(view) {
    state.current = view;
    saveState();
  }
  function showToast(message, celebrate) {
    const t = $('#toast');
    t.textContent = message;
    t.hidden = false;
    t.classList.toggle('celebrate', !!celebrate);
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(function () { t.hidden = true; }, 2600);
  }

  /* ============================================================
     4. QUESTION ENGINE
     Renders one question into a container and reports the result.
     opts: { attemptsAllowed (default 2), showTag (default true) }
     Calls opts.onResult(isCorrect) exactly once when the question
     is finally resolved (correct, or attempts exhausted).
     ============================================================ */
  function renderQuestionInto(container, q, opts) {
    opts = opts || {};
    const attemptsAllowed = opts.attemptsAllowed || 2;
    let attempts = 0;
    let resolved = false;

    const card = document.createElement('div');
    card.className = 'question-card';

    const diffLabel = { easy: 'Easy', medium: 'Medium', challenge: 'Challenge' }[q.difficulty] || '';
    let metaHtml = '<div class="question-meta">';
    if (opts.progressLabel) metaHtml += '<span class="question-progress">' + escapeHtml(opts.progressLabel) + '</span>';
    metaHtml += '<span class="qtag">' + escapeHtml(TOPIC_LABELS[q.topic] || q.topic) + '</span>';
    if (diffLabel) metaHtml += '<span class="qdiff">' + diffLabel + '</span>';
    metaHtml += '</div>';

    let bodyHtml = metaHtml;
    bodyHtml += '<div class="question-prompt">' + q.prompt.replace(/___/g, '<span class="blank">&nbsp;</span>') + '</div>';
    if (q.scene) bodyHtml += sceneHTML(q.scene);

    card.innerHTML = bodyHtml;

    const feedback = document.createElement('div');
    feedback.className = 'feedback-panel';
    feedback.innerHTML = '<span class="fb-icon"></span><span class="fb-text"></span>';

    const actions = document.createElement('div');
    actions.className = 'question-actions';

    function finish(isCorrect) {
      if (resolved) return;
      resolved = true;
      if (opts.onResult) opts.onResult(isCorrect);
    }

    function showFeedback(isCorrect, isFinal) {
      feedback.classList.remove('correct', 'incorrect');
      feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');
      const icon = feedback.querySelector('.fb-icon');
      const text = feedback.querySelector('.fb-text');
      if (isCorrect) {
        icon.textContent = '✅';
        text.innerHTML = '<span class="fb-title">' + escapeHtml(pick(ENCOURAGE_CORRECT)) + '</span>' + escapeHtml(q.explanation || '');
      } else if (!isFinal) {
        icon.textContent = '🤔';
        text.innerHTML = '<span class="fb-title">' + escapeHtml(pick(ENCOURAGE_RETRY)) + '</span>';
      } else {
        icon.textContent = '💡';
        text.innerHTML = '<span class="fb-title">' + escapeHtml(pick(ENCOURAGE_REVEAL)) + '</span>' + escapeHtml(q.explanation || '');
      }
    }

    function addNextButton(isCorrect) {
      actions.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn btn-primary';
      btn.textContent = opts.nextLabel || 'Next →';
      btn.addEventListener('click', function () { finish(isCorrect); });
      actions.appendChild(btn);
    }

    function addRetryButton(retryFn) {
      actions.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn btn-accent';
      btn.textContent = 'Try Again';
      btn.addEventListener('click', retryFn);
      actions.appendChild(btn);
    }

    // ---- Type: MCQ ----
    if (q.type === 'mcq') {
      const letters = ['A', 'B', 'C', 'D'];
      const order = shuffle(q.options.map(function (opt, i) { return i; }));
      const list = document.createElement('div');
      list.className = 'options-list';
      order.forEach(function (origIdx, pos) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.innerHTML = '<span class="option-letter">' + letters[pos] + '</span><span>' + escapeHtml(q.options[origIdx]) + '</span><span class="result-mark"></span>';
        btn.addEventListener('click', function onClick() {
          attempts++;
          const isCorrect = origIdx === q.answer;
          $all('.option-btn', list).forEach(function (b) { b.disabled = true; });
          if (isCorrect) {
            btn.classList.add('correct');
            btn.querySelector('.result-mark').textContent = '✅';
            showFeedback(true);
            addNextButton(true);
          } else if (attempts < attemptsAllowed) {
            btn.classList.add('incorrect');
            btn.querySelector('.result-mark').textContent = '❌';
            showFeedback(false, false);
            addRetryButton(function () {
              feedback.classList.remove('show');
              actions.innerHTML = '';
              $all('.option-btn', list).forEach(function (b) {
                b.disabled = false; b.classList.remove('incorrect', 'correct');
                b.querySelector('.result-mark').textContent = '';
              });
            });
          } else {
            btn.classList.add('incorrect');
            btn.querySelector('.result-mark').textContent = '❌';
            const correctBtn = list.children[order.indexOf(q.answer)];
            correctBtn.classList.add('correct');
            correctBtn.querySelector('.result-mark').textContent = '✅';
            showFeedback(false, true);
            addNextButton(false);
          }
        });
        list.appendChild(btn);
      });
      card.appendChild(list);
    }

    // ---- Type: FILL ----
    else if (q.type === 'fill') {
      const row = document.createElement('div');
      row.className = 'fill-row';
      row.innerHTML = '<input type="text" class="fill-input" autocomplete="off" spellcheck="false" placeholder="Type your answer…">' +
        '<button type="button" class="btn btn-primary fill-submit">Check</button>';
      card.appendChild(row);
      const input = row.querySelector('.fill-input');
      const submitBtn = row.querySelector('.fill-submit');

      function submit() {
        if (submitBtn.disabled) return;
        attempts++;
        const val = normalizeAnswer(input.value);
        const isCorrect = q.accept.some(function (a) { return normalizeAnswer(a) === val; }) && val.length > 0;
        if (isCorrect) {
          input.classList.add('correct');
          input.disabled = true; submitBtn.disabled = true;
          showFeedback(true);
          addNextButton(true);
        } else if (attempts < attemptsAllowed) {
          input.classList.add('incorrect');
          input.disabled = true; submitBtn.disabled = true; // freeze until "Try Again"
          showFeedback(false, false);
          addRetryButton(function () {
            feedback.classList.remove('show');
            actions.innerHTML = '';
            input.classList.remove('incorrect');
            input.disabled = false; submitBtn.disabled = false;
            input.value = '';
            input.focus();
          });
        } else {
          input.classList.add('incorrect');
          input.disabled = true; submitBtn.disabled = true;
          const correctAnswerText = q.accept[0];
          feedback.classList.add('show', 'incorrect');
          feedback.querySelector('.fb-icon').textContent = '💡';
          feedback.querySelector('.fb-text').innerHTML = '<span class="fb-title">' + escapeHtml(pick(ENCOURAGE_REVEAL)) + ' “' + escapeHtml(correctAnswerText) + '”</span>' + escapeHtml(q.explanation || '');
          addNextButton(false);
        }
      }
      submitBtn.addEventListener('click', submit);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    }

    // ---- Type: ORDER (sentence builder) ----
    else if (q.type === 'order') {
      const slots = document.createElement('div');
      slots.className = 'answer-slots';
      const bank = document.createElement('div');
      bank.className = 'word-bank';
      const shuffled = shuffle(q.words.map(function (w, i) { return { w: w, id: i }; }));
      const placed = [];
      let locked = false; // true only once the question is finally resolved

      function renderBank() {
        bank.innerHTML = '';
        shuffled.forEach(function (item) {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'word-chip' + (placed.indexOf(item.id) > -1 ? ' placed' : '');
          chip.textContent = item.w;
          chip.disabled = placed.indexOf(item.id) > -1 || locked;
          chip.addEventListener('click', function () {
            placed.push(item.id);
            renderBank(); renderSlots();
          });
          bank.appendChild(chip);
        });
      }
      function renderSlots() {
        slots.innerHTML = '';
        if (placed.length === 0) {
          const hint = document.createElement('span');
          hint.className = 'thai-note';
          hint.textContent = 'Tap the words below to build the sentence — แตะคำด้านล่างเพื่อเรียงประโยค';
          slots.appendChild(hint);
        }
        placed.forEach(function (id) {
          const item = shuffled.filter(function (s) { return s.id === id; })[0];
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'word-chip';
          chip.textContent = item.w;
          chip.disabled = locked;
          chip.addEventListener('click', function () {
            placed.splice(placed.indexOf(id), 1);
            renderBank(); renderSlots();
          });
          slots.appendChild(chip);
        });
        checkBtn.disabled = locked || placed.length !== q.words.length;
      }

      const checkRow = document.createElement('div');
      checkRow.style.marginTop = '10px';
      const checkBtn = document.createElement('button');
      checkBtn.type = 'button';
      checkBtn.className = 'btn btn-primary';
      checkBtn.textContent = 'Check My Sentence';
      checkBtn.disabled = true;
      checkRow.appendChild(checkBtn);

      checkBtn.addEventListener('click', function () {
        if (checkBtn.disabled) return; // guard against double-submission
        attempts++;
        const sentence = placed.map(function (id) { return shuffled.filter(function (s) { return s.id === id; })[0].w; }).join(' ');
        const isCorrect = normalizeAnswer(sentence) === normalizeAnswer(q.answer);
        if (isCorrect) {
          locked = true;
          renderBank(); renderSlots();
          showFeedback(true);
          addNextButton(true);
        } else if (attempts < attemptsAllowed) {
          locked = true; // freeze the chips/button until "Try Again" is pressed
          renderBank(); renderSlots();
          showFeedback(false, false);
          addRetryButton(function () {
            feedback.classList.remove('show');
            actions.innerHTML = '';
            placed.length = 0;
            locked = false;
            renderBank(); renderSlots();
          });
        } else {
          locked = true;
          renderBank(); renderSlots();
          feedback.classList.add('show', 'incorrect');
          feedback.querySelector('.fb-icon').textContent = '💡';
          feedback.querySelector('.fb-text').innerHTML = '<span class="fb-title">' + escapeHtml(pick(ENCOURAGE_REVEAL)) + ' “' + escapeHtml(q.answer) + '.”</span>' + escapeHtml(q.explanation || '');
          addNextButton(false);
        }
      });

      card.appendChild(slots);
      card.appendChild(bank);
      card.appendChild(checkRow);
      renderBank(); renderSlots();
    }

    // ---- Type: MATCH ----
    else if (q.type === 'match') {
      const grid = document.createElement('div');
      grid.className = 'match-grid';
      const leftCol = document.createElement('div'); leftCol.className = 'match-col';
      const rightCol = document.createElement('div'); rightCol.className = 'match-col';
      const leftItems = q.pairs.map(function (p, i) { return { text: p.left, id: i }; });
      const rightItems = shuffle(q.pairs.map(function (p, i) { return { text: p.right, id: i }; }));
      let selectedLeft = null;
      let matchedCount = 0;
      let wrongAttempt = false;

      function makeItem(item, col) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'match-item';
        btn.textContent = item.text;
        btn.dataset.id = item.id;
        btn.addEventListener('click', function () {
          if (btn.classList.contains('matched-correct')) return;
          if (col === 'left') {
            $all('.match-item', leftCol).forEach(function (b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            selectedLeft = item.id;
          } else {
            if (selectedLeft === null) return;
            if (selectedLeft === item.id) {
              btn.classList.add('matched-correct');
              const leftBtn = leftCol.querySelector('[data-id="' + selectedLeft + '"]');
              leftBtn.classList.remove('selected');
              leftBtn.classList.add('matched-correct');
              matchedCount++;
              selectedLeft = null;
              if (matchedCount === q.pairs.length) {
                showFeedback(true);
                addNextButton(true);
              }
            } else {
              wrongAttempt = true;
              btn.classList.add('matched-wrong');
              setTimeout(function () { btn.classList.remove('matched-wrong'); }, 500);
            }
          }
        });
        return btn;
      }
      leftItems.forEach(function (item) { leftCol.appendChild(makeItem(item, 'left')); });
      rightItems.forEach(function (item) { rightCol.appendChild(makeItem(item, 'right')); });
      grid.appendChild(leftCol); grid.appendChild(rightCol);
      card.appendChild(grid);
      const hint = document.createElement('p');
      hint.className = 'thai-note';
      hint.textContent = 'Tap one card on the left, then its match on the right. — แตะซ้ายแล้วแตะขวาที่คู่กัน';
      card.appendChild(hint);
    }

    card.appendChild(feedback);
    card.appendChild(actions);
    container.innerHTML = '';
    container.appendChild(card);
    return card;
  }

  /* ============================================================
     5. SCREEN RENDERERS
     ============================================================ */

  // ---------- HOME ----------
  function renderHome() {
    setCurrent({ view: 'home' });
    const completedCount = NUMBERED_LESSONS.filter(function (l) { return getLessonProgress(l.id).status === 'complete'; }).length;
    const pct = Math.round((completedCount / NUMBERED_LESSONS.length) * 100);
    const totalStars = NUMBERED_LESSONS.reduce(function (sum, l) { return sum + getLessonProgress(l.id).stars; }, 0);

    let html = '<section class="screen">';
    html += '<div class="hero">' +
      '<span class="hero-deco d1">⭐</span><span class="hero-deco d2">🖊️</span>' +
      '<h1>Grammar Adventure</h1>' +
      '<p class="subtitle">ทบทวน Grammar ให้เข้าใจ ก่อนลงมือทำข้อสอบ</p>' +
      '</div>';

    html += '<div class="progress-summary">' +
      '<div class="progress-summary-top"><span class="progress-summary-label">Completed ' + completedCount + ' of ' + NUMBERED_LESSONS.length + ' lessons</span>' +
      '<span class="progress-stars">⭐ ' + totalStars + ' / ' + (NUMBERED_LESSONS.length * 3) + ' stars</span></div>' +
      '<div class="progress-bar-track"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
      '</div>';

    html += '<div class="home-actions">' +
      '<button class="btn btn-primary btn-lg" id="btn-continue" type="button">▶️ Continue Learning</button>' +
      '<button class="btn btn-accent btn-lg" id="btn-mixed-start" type="button">🎯 Start Mixed Challenge</button>' +
      '</div>';

    // Intro / warm-up card
    const introLesson = findLesson('intro');
    const introProg = getLessonProgress('intro');
    html += '<h2 class="section-title">🧭 Warm-Up</h2>';
    html += '<div class="lesson-grid">' + lessonCardHTML(introLesson, introProg) + '</div>';

    html += '<h2 class="section-title">📚 Lessons</h2>';
    html += '<div class="lesson-grid">';
    NUMBERED_LESSONS.forEach(function (l) {
      html += lessonCardHTML(l, getLessonProgress(l.id));
    });
    html += '</div>';
    html += '</section>';

    app().innerHTML = html;

    $('#btn-continue').addEventListener('click', function () {
      const target = pickContinueTarget();
      goToLesson(target, 'learn');
    });
    $('#btn-mixed-start').addEventListener('click', renderMixedIntro);
    $all('.lesson-start-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { goToLesson(btn.dataset.lessonId, 'learn'); });
    });
  }

  function lessonCardHTML(lesson, prog) {
    const statusInfo = {
      'not-started': { cls: 'status-not-started', label: 'Not started', btn: 'Start' },
      'in-progress': { cls: 'status-in-progress', label: 'In progress', btn: 'Continue' },
      'complete': { cls: 'status-complete', label: 'Complete', btn: 'Review' }
    }[prog.status];
    const numLabel = lesson.isIntro ? '★' : lesson.number;
    let html = '<div class="lesson-card">' +
      '<div class="lesson-card-top"><span class="lesson-num" style="--theme:var(--' + lesson.theme + ')">' + numLabel + '</span>' +
      '<h3>' + escapeHtml(lesson.title) + '</h3></div>' +
      '<p class="lesson-desc">' + escapeHtml(lesson.desc) + '</p>' +
      '<div class="lesson-status-row"><span class="status-pill ' + statusInfo.cls + '">' + statusInfo.label + '</span>';
    if (prog.stars > 0) html += '<span class="lesson-stars">' + '⭐'.repeat(prog.stars) + '</span>';
    html += '</div>' +
      '<button class="btn btn-primary lesson-start-btn" type="button" data-lesson-id="' + lesson.id + '">' + statusInfo.btn + '</button>' +
      '</div>';
    return html;
  }

  function pickContinueTarget() {
    if (getLessonProgress('intro').status !== 'complete') return 'intro';
    const next = NUMBERED_LESSONS.filter(function (l) { return getLessonProgress(l.id).status !== 'complete'; })[0];
    return next ? next.id : NUMBERED_LESSONS[0].id;
  }

  // ---------- LESSON FLOW ----------
  function goToLesson(lessonId, stage) {
    setCurrent({ view: 'lesson', lessonId: lessonId, stage: stage });
    const prog = getLessonProgress(lessonId);
    if (prog.status === 'not-started') { prog.status = 'in-progress'; saveState(); }
    renderLessonStage(lessonId, stage);
  }

  function lessonHeaderHTML(lesson, activeStage) {
    let html = '<div class="lesson-header">' +
      '<div class="lesson-header-title"><span class="lesson-header-badge" style="--theme:var(--' + lesson.theme + ')">' + (lesson.isIntro ? '★' : lesson.number) + '</span>' +
      '<h2>' + escapeHtml(lesson.title) + '</h2></div>' +
      '<button class="back-link" id="btn-back-home" type="button">← Home</button>' +
      '</div>';
    const stages = [['learn', '1. Learn'], ['check', '2. Check'], ['practice', '3. Practice']];
    html += '<div class="stage-tabs">';
    stages.forEach(function (s) {
      const cls = s[0] === activeStage ? 'active' : '';
      html += '<div class="stage-tab ' + cls + '">' + s[1] + '</div>';
    });
    html += '</div>';
    return html;
  }

  function wireBackHome() {
    const b = $('#btn-back-home');
    if (b) b.addEventListener('click', renderHome);
  }

  function renderLessonStage(lessonId, stage) {
    const lesson = findLesson(lessonId);
    if (stage === 'learn') renderLearnStage(lesson);
    else if (stage === 'check') renderCheckStage(lesson);
    else if (stage === 'practice') renderPracticeStage(lesson);
  }

  function renderLearnStage(lesson) {
    let html = '<section class="screen">' + lessonHeaderHTML(lesson, 'learn');
    html += '<div class="learn-pattern">' + lesson.learn.pattern + '</div>';
    html += '<ul class="example-list">';
    lesson.learn.examples.forEach(function (ex) { html += '<li class="example-item">' + ex + '</li>'; });
    html += '</ul>';
    html += '<div class="tip-box"><span class="tip-emoji">💡</span><span>' + escapeHtml(lesson.learn.tip) + '</span></div>';
    html += '<div class="question-actions" style="justify-content:center;margin-top:22px;">' +
      '<button class="btn btn-primary btn-lg" id="btn-to-check" type="button">Let’s Check! →</button></div>';
    html += '</section>';
    app().innerHTML = html;
    wireBackHome();
    $('#btn-to-check').addEventListener('click', function () { goToLesson(lesson.id, 'check'); });
  }

  function renderCheckStage(lesson) {
    let idx = 0;
    let correctCount = 0;
    const questions = lesson.check;

    function renderQ() {
      let html = '<section class="screen">' + lessonHeaderHTML(lesson, 'check');
      html += '<p class="thai-note" style="margin-bottom:12px;">Quick check — 2 questions before you practise.</p>';
      html += '<div id="q-slot"></div></section>';
      app().innerHTML = html;
      wireBackHome();
      renderQuestionInto($('#q-slot'), questions[idx], {
        progressLabel: 'Question ' + (idx + 1) + ' of ' + questions.length,
        attemptsAllowed: 2,
        nextLabel: idx === questions.length - 1 ? 'Continue to Practice →' : 'Next →',
        onResult: function (isCorrect) {
          if (isCorrect) correctCount++;
          idx++;
          if (idx < questions.length) renderQ();
          else {
            showToast('Nice! Ready for practice 📝');
            goToLesson(lesson.id, 'practice');
          }
        }
      });
    }
    renderQ();
  }

  function renderPracticeStage(lesson) {
    const order = shuffle(lesson.practice);
    let idx = 0;
    const results = []; // {q, correct}

    function renderQ() {
      let html = '<section class="screen">' + lessonHeaderHTML(lesson, 'practice') + '<div id="q-slot"></div></section>';
      app().innerHTML = html;
      wireBackHome();
      renderQuestionInto($('#q-slot'), order[idx], {
        progressLabel: 'Question ' + (idx + 1) + ' of ' + order.length,
        attemptsAllowed: 2,
        nextLabel: idx === order.length - 1 ? 'See My Results 🏁' : 'Next →',
        onResult: function (isCorrect) {
          results.push({ q: order[idx], correct: isCorrect });
          idx++;
          if (idx < order.length) renderQ();
          else finishPractice();
        }
      });
    }

    function finishPractice() {
      const correct = results.filter(function (r) { return r.correct; }).length;
      const total = results.length;
      const pct = Math.round((correct / total) * 100);
      const stars = pct === 100 ? 3 : pct >= 80 ? 2 : pct >= 50 ? 1 : 0;
      const prog = getLessonProgress(lesson.id);
      const improved = correct > prog.bestCorrect || prog.bestTotal === 0;
      if (improved) { prog.bestCorrect = correct; prog.bestTotal = total; prog.stars = Math.max(prog.stars, stars); }
      prog.status = 'complete';
      prog.completedAt = Date.now ? Date.now() : 0;
      saveState();
      showToast('🎉 Lesson complete! ' + stars + ' star' + (stars === 1 ? '' : 's') + ' earned!', true);
      renderLessonSummary(lesson, results, correct, total, stars);
    }
    renderQ();
  }

  function renderLessonSummary(lesson, results, correct, total, stars) {
    const mistakes = results.filter(function (r) { return !r.correct; });
    let html = '<section class="screen">' + lessonHeaderHTML(lesson, 'practice');
    html += '<div class="card summary-card">';
    html += '<div class="stars-earned">' + (stars > 0 ? '⭐'.repeat(stars) + '☆'.repeat(3 - stars) : '☆☆☆') + '</div>';
    html += '<div class="summary-score">' + correct + ' / ' + total + '</div>';
    html += '<p class="summary-sub">' + Math.round((correct / total) * 100) + '% correct — ' + escapeHtml(lesson.title) + '</p>';
    html += '<div class="summary-stats">' +
      '<div class="stat-pill ok"><div class="num">' + correct + '</div><div class="lbl">Correct</div></div>' +
      '<div class="stat-pill no"><div class="num">' + mistakes.length + '</div><div class="lbl">Incorrect</div></div>' +
      '</div>';
    if (mistakes.length) {
      html += '<div class="mistake-list">';
      mistakes.forEach(function (m) {
        html += '<div class="mistake-item"><div class="mi-q">' + m.q.prompt.replace(/___/g, '…') + '</div>' +
          '<div class="mi-correct">' + correctAnswerText(m.q) + '</div>' +
          '<div class="mi-explain">' + escapeHtml(m.q.explanation || '') + '</div></div>';
      });
      html += '</div>';
    }
    html += '<div class="summary-actions">';
    if (mistakes.length) html += '<button class="btn btn-ghost" id="btn-retry-mistakes" type="button">Review Mistakes</button>';
    const nextLesson = nextNumberedLesson(lesson.id);
    if (nextLesson) html += '<button class="btn btn-primary" id="btn-next-lesson" type="button">Next Lesson →</button>';
    html += '<button class="btn btn-accent" id="btn-back-home2" type="button">Back to Home</button>';
    html += '</div></div></section>';
    app().innerHTML = html;

    const backBtn = $('#btn-back-home2');
    if (backBtn) backBtn.addEventListener('click', renderHome);
    const nextBtn = $('#btn-next-lesson');
    if (nextBtn) nextBtn.addEventListener('click', function () { goToLesson(nextLesson.id, 'learn'); });
    const retryBtn = $('#btn-retry-mistakes');
    if (retryBtn) retryBtn.addEventListener('click', function () { renderMistakeReview(lesson, mistakes); });
  }

  function correctAnswerText(q) {
    let text = '';
    if (q.type === 'mcq') text = q.options[q.answer];
    else if (q.type === 'fill') text = q.accept[0];
    else if (q.type === 'order') text = q.answer + '.';
    else if (q.type === 'match') text = q.pairs.map(function (p) { return p.left + ' → ' + p.right; }).join(' · ');
    return '✅ ' + escapeHtml(text);
  }

  function renderMistakeReview(lesson, mistakes) {
    let idx = 0;
    function renderQ() {
      let html = '<section class="screen">' + lessonHeaderHTML(lesson, 'practice');
      html += '<p class="thai-note" style="margin-bottom:12px;">Review Mistakes — give it another go!</p>';
      html += '<div id="q-slot"></div></section>';
      app().innerHTML = html;
      wireBackHome();
      renderQuestionInto($('#q-slot'), mistakes[idx].q, {
        progressLabel: 'Mistake ' + (idx + 1) + ' of ' + mistakes.length,
        attemptsAllowed: 2,
        nextLabel: idx === mistakes.length - 1 ? 'Done ✓' : 'Next →',
        onResult: function () {
          idx++;
          if (idx < mistakes.length) renderQ();
          else renderHome();
        }
      });
    }
    renderQ();
  }

  function nextNumberedLesson(currentId) {
    if (currentId === 'intro') return NUMBERED_LESSONS[0];
    const i = NUMBERED_LESSONS.findIndex(function (l) { return l.id === currentId; });
    return i > -1 && i < NUMBERED_LESSONS.length - 1 ? NUMBERED_LESSONS[i + 1] : null;
  }

  // ---------- MIXED CHALLENGE ----------
  function renderMixedIntro() {
    setCurrent({ view: 'mixed-intro' });
    const last = state.mixed.lastResult;
    let html = '<section class="screen"><div class="card challenge-intro">' +
      '<div class="big-emoji">🎯</div>' +
      '<h2>Mixed Challenge</h2>' +
      '<p>30 questions from every topic — a great way to check you’re ready for your exam!</p>';
    if (last) {
      html += '<p class="thai-note">Last score: ' + last.score + ' / ' + last.total + ' (' + last.percent + '%) — ' + last.levelLabel + '</p>';
    }
    html += '<div class="summary-actions">' +
      '<button class="btn btn-primary btn-lg" id="btn-start-mixed" type="button">Start Challenge ▶️</button>' +
      '<button class="btn btn-ghost" id="btn-back-home3" type="button">Back to Home</button>' +
      '</div></div></section>';
    app().innerHTML = html;
    $('#btn-back-home3').addEventListener('click', renderHome);
    $('#btn-start-mixed').addEventListener('click', startMixedChallenge);
  }

  function startMixedChallenge() {
    const order = shuffle(MIXED_CHALLENGE);
    const results = [];
    let idx = 0;
    setCurrent({ view: 'mixed-quiz' });

    function renderQ() {
      let html = '<section class="screen">';
      html += '<div class="progress-bar-track" style="margin-bottom:16px;"><div class="progress-bar-fill" style="width:' + Math.round((idx / order.length) * 100) + '%"></div></div>';
      html += '<div id="q-slot"></div></section>';
      app().innerHTML = html;
      renderQuestionInto($('#q-slot'), order[idx], {
        progressLabel: 'Question ' + (idx + 1) + ' of ' + order.length,
        attemptsAllowed: 1,
        nextLabel: idx === order.length - 1 ? 'See My Score 🏁' : 'Continue →',
        onResult: function (isCorrect) {
          results.push({ q: order[idx], correct: isCorrect });
          idx++;
          if (idx < order.length) renderQ();
          else finishMixed(results);
        }
      });
    }
    renderQ();
  }

  function finishMixed(results) {
    const total = results.length;
    const correct = results.filter(function (r) { return r.correct; }).length;
    const percent = Math.round((correct / total) * 100);
    let levelLabel, thaiMsg;
    if (percent >= 90) { levelLabel = 'Grammar Star ⭐'; thaiMsg = 'สุดยอดมาก! เธอคือ Grammar Star ตัวจริง!'; }
    else if (percent >= 75) { levelLabel = 'Great Progress 🌟'; thaiMsg = 'ทำได้ดีมาก! ลองทบทวนจุดที่ยังพลาดอีกนิดนะ'; }
    else if (percent >= 60) { levelLabel = 'Keep Practising 💪'; thaiMsg = 'เก่งขึ้นแล้ว! ฝึกอีกหน่อยแล้วลองใหม่นะ'; }
    else { levelLabel = 'Let’s Review Again 📖'; thaiMsg = 'ไม่เป็นไรนะ ลองกลับไปทบทวนบทเรียน แล้วค่อยทำ Challenge ใหม่'; }

    // topic breakdown
    const byTopic = {};
    results.forEach(function (r) {
      const t = r.q.topic;
      if (!byTopic[t]) byTopic[t] = { correct: 0, total: 0 };
      byTopic[t].total++;
      if (r.correct) byTopic[t].correct++;
    });
    const topicRows = Object.keys(byTopic).map(function (t) {
      return { topic: t, pct: Math.round((byTopic[t].correct / byTopic[t].total) * 100) };
    }).sort(function (a, b) { return b.pct - a.pct; });
    const strongest = topicRows.slice(0, 3).filter(function (t) { return t.pct >= 70; });
    const weakest = topicRows.slice().sort(function (a, b) { return a.pct - b.pct; }).slice(0, 3).filter(function (t) { return t.pct < 70; });

    const mistakes = results.filter(function (r) { return !r.correct; });

    state.mixed.attempts++;
    state.mixed.lastResult = {
      score: correct, total: total, percent: percent, levelLabel: levelLabel,
      date: Date.now ? Date.now() : 0,
      mistakeTopics: mistakes.map(function (m) { return m.q.topic; })
    };
    saveState();
    showToast(percent >= 75 ? '🎉 Amazing work!' : 'Challenge complete!', percent >= 75);

    renderMixedResult({ correct: correct, total: total, percent: percent, levelLabel: levelLabel, thaiMsg: thaiMsg, topicRows: topicRows, strongest: strongest, weakest: weakest, mistakes: mistakes, results: results });
  }

  function topicBarColor(pct) {
    if (pct >= 80) return 'var(--green)';
    if (pct >= 50) return 'var(--yellow)';
    return 'var(--coral)';
  }

  function renderMixedResult(data) {
    setCurrent({ view: 'mixed-result' });
    let html = '<section class="screen"><div class="card summary-card">';
    html += '<h2>' + data.levelLabel + '</h2>';
    html += '<div class="summary-score">' + data.correct + ' / ' + data.total + '</div>';
    html += '<p class="summary-sub">' + data.percent + '% correct</p>';
    html += '<div class="summary-stats">' +
      '<div class="stat-pill ok"><div class="num">' + data.correct + '</div><div class="lbl">Correct</div></div>' +
      '<div class="stat-pill no"><div class="num">' + data.mistakes.length + '</div><div class="lbl">Incorrect</div></div>' +
      '</div>';
    html += '<div class="recommend-box">' + escapeHtml(data.thaiMsg) + '</div>';

    if (data.topicRows.length) {
      html += '<h3 style="text-align:left;">Topic Breakdown</h3><div class="topic-breakdown">';
      data.topicRows.forEach(function (t) {
        html += '<div class="topic-row"><span class="topic-name">' + escapeHtml(TOPIC_LABELS[t.topic] || t.topic) + '</span>' +
          '<span class="topic-bar-track"><span class="topic-bar-fill" style="width:' + t.pct + '%;background:' + topicBarColor(t.pct) + '"></span></span>' +
          '<span class="topic-pct">' + t.pct + '%</span></div>';
      });
      html += '</div>';
    }

    if (data.mistakes.length) {
      html += '<h3 style="text-align:left;">Questions to Review</h3><div class="mistake-list">';
      data.mistakes.forEach(function (m) {
        html += '<div class="mistake-item"><div class="mi-q">' + m.q.prompt.replace(/___/g, '…') + '</div>' +
          '<div class="mi-correct">' + correctAnswerText(m.q) + '</div>' +
          '<div class="mi-explain">' + escapeHtml(m.q.explanation || '') + '</div></div>';
      });
      html += '</div>';
    }

    html += '<div class="summary-actions">';
    if (data.mistakes.length) html += '<button class="btn btn-ghost" id="btn-retry-incorrect" type="button">Retry Incorrect Questions</button>';
    html += '<button class="btn btn-accent" id="btn-restart-challenge" type="button">Restart Challenge</button>';
    html += '<button class="btn btn-primary" id="btn-back-lessons" type="button">Back to Lessons</button>';
    html += '</div></div></section>';
    app().innerHTML = html;

    $('#btn-back-lessons').addEventListener('click', renderHome);
    $('#btn-restart-challenge').addEventListener('click', startMixedChallenge);
    const retryBtn = $('#btn-retry-incorrect');
    if (retryBtn) retryBtn.addEventListener('click', function () { retryMixedMistakes(data.mistakes); });
  }

  function retryMixedMistakes(mistakes) {
    let idx = 0;
    const qs = mistakes.map(function (m) { return m.q; });
    function renderQ() {
      let html = '<section class="screen"><div id="q-slot"></div></section>';
      app().innerHTML = html;
      renderQuestionInto($('#q-slot'), qs[idx], {
        progressLabel: 'Retry ' + (idx + 1) + ' of ' + qs.length,
        attemptsAllowed: 2,
        nextLabel: idx === qs.length - 1 ? 'Done ✓' : 'Next →',
        onResult: function () {
          idx++;
          if (idx < qs.length) renderQ();
          else renderHome();
        }
      });
    }
    renderQ();
  }

  /* ============================================================
     6. NAVIGATION, MODAL, INIT
     ============================================================ */
  function wireGlobalNav() {
    $('#btn-home').addEventListener('click', renderHome);
    $all('.nav-btn').forEach(function (btn) {
      const nav = btn.dataset.nav;
      if (nav === 'home') btn.addEventListener('click', renderHome);
      if (nav === 'mixed') btn.addEventListener('click', renderMixedIntro);
    });
    $('#btn-reset').addEventListener('click', function () { $('#reset-modal').hidden = false; });
    $('#reset-cancel').addEventListener('click', function () { $('#reset-modal').hidden = true; });
    $('#reset-confirm').addEventListener('click', function () {
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      $('#reset-modal').hidden = true;
      showToast('Progress reset. Fresh start! 🌱');
      renderHome();
    });
  }

  function resumeOrHome() {
    const cur = state.current;
    if (cur && cur.view === 'lesson' && findLesson(cur.lessonId)) {
      renderLessonStage(cur.lessonId, cur.stage || 'learn');
    } else if (cur && (cur.view === 'mixed-intro' || cur.view === 'mixed-quiz' || cur.view === 'mixed-result')) {
      renderMixedIntro();
    } else {
      renderHome();
    }
  }

  function init() {
    wireGlobalNav();
    resumeOrHome();
  }

  document.addEventListener('DOMContentLoaded', init);
})();

</script>
</body>
</html>
