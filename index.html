<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#22314C" />
  <meta name="description" content="Sound Garden Studio — an interactive phonics teaching studio by Bright EngMath. Seven learning areas, sound lessons, class games, projector mode and printables." />
  <link rel="manifest" href="manifest.json" />
  <title>Sound Garden Studio · Bright EngMath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Andika:wght@400;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-in">
        <button class="brand" id="brand" aria-label="Sound Garden Studio — home"></button>
        <nav class="top-nav" aria-label="Main">
          <button data-nav="home">Home</button>
          <button data-nav="journey">Journey</button>
          <button data-nav="library">Word Library</button>
          <button data-nav="toolkit">Teacher Tools</button>
          <button data-nav="guide">Guide</button>
          <button data-nav="progress">Progress</button>
        </nav>
        <div class="top-actions">
          <button class="icon-btn" id="printTop" type="button" aria-label="Print" title="Print">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2M6 14h12v7H6z"/></svg>
          </button>
          <button class="icon-btn" id="soundToggle" type="button" aria-label="Toggle sound"></button>
          <button class="icon-btn" id="fsToggle" type="button" aria-label="Fullscreen"></button>
        </div>
      </div>
    </header>

    <main>
      <div id="root"></div>
    </main>

    <footer>
      <div class="footer-in">
        <span>Bright EngMath · Interactive Phonics Teaching Studio</span>
        <strong class="cr">Cr. Bright EngMath</strong>
      </div>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="src/data.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/app.js"></script>
  <script src="src/activities.js"></script>
  <script src="src/present.js"></script>
  <script src="src/toolkit.js"></script>
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
  </script>
</body>
</html>
