 neck?`,choices:[`A necklace`,`A bracelet`,`A belt`],correctIndex:0,explanation:`A necklace goes around the neck. A bracelet goes around the wrist and a belt around the waist.`},{id:`u1-s1`,unit:1,category:`story`,question:`What are Ben and Lucy searching for in the museum?`,choices:[`The first line of a rhyme`,`A lost dog`,`Tickets for the museum`],correctIndex:0,explanation:`Ben and Lucy are looking for the first line of a treasure rhyme.`},{id:`u1-s2`,unit:1,category:`story`,question:`What suddenly gives Ben and Lucy a fright near the display?`,choices:[`An arrow flies close to them`,`The lights turn off`,`Buster runs away`],correctIndex:0,explanation:`An arrow flies close to them, and they realise someone is trying to hurt them.`},{id:`u1-s3`,unit:1,category:`story`,question:`Why do Ben and Lucy hide?`,choices:[`A knight with a sword is coming after them`,`They want to play a game`,`They are tired`],correctIndex:0,explanation:`They hide because a knight with a sword is coming after them and they feel scared.`},{id:`u1-s4`,unit:1,category:`story`,question:`How does Lucy stop the knight?`,choices:[`She shouts loudly`,`She uses Buster's lead`,`She hides behind a wall`],correctIndex:1,explanation:`Lucy has an idea and uses Buster's lead to make the knight fall.`},{id:`u1-s5`,unit:1,category:`story`,question:`Where do Ben and Lucy find the first symbol and the rhyme line?`,choices:[`On the queen's crown`,`On the knight's shield`,`Under the stairs`],correctIndex:1,explanation:`They find the symbol on the knight's shield, with the line: 'Behind the picture in the frame.'`},{id:`u1-e1`,unit:1,category:`expression`,question:`Which sentence would you say if you wanted everyone to escape quickly?`,choices:[`Let's run.`,`Let's look for...`,`I was very scared.`],correctIndex:0,explanation:`'Let's run' is used to tell someone to escape quickly.`},{id:`u1-e2`,unit:1,category:`expression`,question:`Which sentence means the children must stay very quiet?`,choices:[`I've got an i
