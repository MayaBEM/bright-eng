<html lang="en">
<head>

<style>
/* =====================================================================
   GRAMMAR GALAXY — Present Simple (S • ES • IES)
   A premium interactive teaching app for Grade 3 ESL learners.
   Single file. No dependencies. Offline ready.
   ===================================================================== */

/* ---------- Design Tokens ---------- */
:root{
  --font: 'Baloo 2','Fredoka',"Comic Sans MS",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;

  --c-s:#3fbf7f;      --c-s-dk:#2a9c63;   --c-s-soft:#e5f9ef;
  --c-es:#ff8a4c;     --c-es-dk:#e96c2b;  --c-es-soft:#fff0e6;
  --c-ies:#7c5cff;    --c-ies-dk:#5f3fe0; --c-ies-soft:#efeaff;
  --c-pink:#ff6fae;   --c-blue:#40b7ff;   --c-yellow:#ffd23f;
  --c-red:#ff5d6c;    --c-teal:#2fd9c9;

  --ink:#2a2350;      --ink-soft:#655e8c;  --muted:#9a95bb;
  --paper:#ffffff;    --paper-2:#f7f5ff;
  --line:#ece8ff;

  --grad-sky:linear-gradient(160deg,#a6e1ff 0%,#c8b6ff 45%,#ffc8ec 100%);
  --grad-sun:linear-gradient(135deg,#ffe259,#ffa751);
  --grad-grape:linear-gradient(135deg,#7c5cff,#b06bff);
  --grad-mint:linear-gradient(135deg,#3fbf7f,#2fd9c9);
  --grad-candy:linear-gradient(135deg,#ff6fae,#ff8a4c);

  --shadow-s:0 4px 12px rgba(84,60,180,.10);
  --shadow-m:0 12px 28px rgba(84,60,180,.16);
  --shadow-l:0 24px 60px rgba(84,60,180,.24);
  --shadow-btn:0 6px 0 rgba(0,0,0,.14);

  --r-s:14px; --r-m:22px; --r-l:32px; --r-xl:42px;
  --glass:rgba(255,255,255,.55);
  --glass-brd:rgba(255,255,255,.75);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--grad-sky);
  background-attachment:fixed;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
}
button{font-family:inherit}
img{max-width:100%}
:focus-visible{outline:3px solid var(--c-ies);outline-offset:2px}

/* ---------- Floating background decorations ---------- */
#sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.deco{position:absolute;opacity:.9;animation:floaty linear infinite}
@keyframes floaty{
  0%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-26px) rotate(8deg)}
  100%{transform:translateY(0) rotate(0deg)}
}
@keyframes drift{
  0%{transform:translateX(0)}
  100%{transform:translateX(40px)}
}

/* ---------- Layout ---------- */
#app{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 16px 120px}

/* ---------- Top Bar (HUD) ---------- */
#hud{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;margin:0 -16px 8px;
  background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,.55));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:2px solid var(--glass-brd);
  box-shadow:var(--shadow-s);
}
#hud .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1.05rem;cursor:pointer;color:var(--ink)}
#hud .brand .logo{width:38px;height:38px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.15))}
#hud .spacer{flex:1}
.hud-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:2px solid var(--line);
  padding:6px 12px;border-radius:999px;font-weight:800;font-size:.95rem;
  box-shadow:var(--shadow-s);white-space:nowrap;
}
.hud-chip svg{width:20px;height:20px}
.hud-chip.pop{animation:chipPop .5s cubic-bezier(.2,1.6,.4,1)}
@keyframes chipPop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.hud-btn{
  border:none;background:var(--grad-grape);color:#fff;font-weight:800;
  padding:8px 14px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow-s);
  display:inline-flex;align-items:center;gap:6px;transition:transform .15s;
}
.hud-btn:active{transform:scale(.94)}
.hud-btn.ghost{background:#fff;color:var(--ink);border:2px solid var(--line)}
@media(max-width:640px){
  #hud .brand span{display:none}
  .hud-chip{padding:6px 9px;font-size:.85rem}
  .hud-chip .lbl{display:none}
}

/* ---------- Screens ---------- */
.screen{display:none;animation:screenIn .5s cubic-bezier(.2,.9,.3,1.2)}
.screen.active{display:block}
@keyframes screenIn{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);border-radius:var(--r-l);
  box-shadow:var(--shadow-m);padding:22px;border:2px solid #fff;
}
.glass{
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:2px solid var(--glass-brd);border-radius:var(--r-l);box-shadow:var(--shadow-m);
}

/* ---------- Buttons ---------- */
.btn{
  border:none;border-radius:var(--r-m);cursor:pointer;font-weight:800;
  padding:16px 26px;font-size:1.1rem;color:#fff;background:var(--grad-grape);
  box-shadow:var(--shadow-btn);position:relative;transition:transform .12s ease, filter .2s;
  display:inline-flex;align-items:center;gap:10px;justify-content:center;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.14)}
.btn.big{font-size:1.4rem;padding:20px 40px;border-radius:var(--r-l)}
.btn.bounce{animation:btnBounce 2.4s ease-in-out infinite}
@keyframes btnBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.btn.s{background:linear-gradient(135deg,var(--c-s),var(--c-s-dk))}
.btn.es{background:linear-gradient(135deg,var(--c-es),var(--c-es-dk))}
.btn.ies{background:linear-gradient(135deg,var(--c-ies),var(--c-ies-dk))}
.btn.sun{background:var(--grad-sun);color:#7a4b00}
.btn.mint{background:var(--grad-mint)}
.btn.candy{background:var(--grad-candy)}
.btn.ghost{background:#fff;color:var(--ink);border:2.5px solid var(--line);box-shadow:0 5px 0 var(--line)}
.btn.ghost:active{box-shadow:0 1px 0 var(--line)}
.btn.sm{padding:10px 16px;font-size:.95rem;border-radius:var(--r-s);box-shadow:0 4px 0 rgba(0,0,0,.12)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* ---------- Home ---------- */
.hero{text-align:center;padding:26px 10px 6px}
.hero .kicker{display:inline-block;background:#fff;border:2px solid var(--line);color:var(--c-ies);
  font-weight:800;padding:6px 16px;border-radius:999px;box-shadow:var(--shadow-s);margin-bottom:14px;letter-spacing:.5px}
.title-3d{
  font-size:clamp(2.6rem,9vw,5.2rem);font-weight:800;line-height:.95;margin:6px 0;
  color:#fff;
  text-shadow:
    -2px -2px 0 #7c5cff, 2px -2px 0 #7c5cff, -2px 2px 0 #7c5cff, 2px 2px 0 #7c5cff,
    0 5px 0 #5f3fe0, 0 6px 0 #5f3fe0, 0 12px 22px rgba(60,40,140,.35);
  animation:titlePop .8s cubic-bezier(.2,1.7,.4,1) both;
  letter-spacing:1px;
}
@keyframes titlePop{from{transform:scale(.6) rotate(-4deg);opacity:0}to{transform:none;opacity:1}}
.badges-line{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0 4px}
.pill-tag{font-weight:800;color:#fff;padding:10px 22px;border-radius:999px;font-size:1.3rem;box-shadow:var(--shadow-m);animation:floaty 3s ease-in-out infinite}
.pill-tag.s{background:linear-gradient(135deg,var(--c-s),var(--c-s-dk));animation-delay:0s}
.pill-tag.es{background:linear-gradient(135deg,var(--c-es),var(--c-es-dk));animation-delay:.3s}
.pill-tag.ies{background:linear-gradient(135deg,var(--c-ies),var(--c-ies-dk));animation-delay:.6s}

.mascot-wrap{position:relative;display:inline-block;margin:6px auto}
.mascot{width:min(230px,54vw);animation:bobble 3.2s ease-in-out infinite;transform-origin:bottom center;filter:drop-shadow(0 14px 16px rgba(84,60,180,.28))}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-12px) rotate(1.5deg)}}
.speech{
  position:absolute;top:-6px;right:-30px;background:#fff;border:3px solid var(--c-ies);
  border-radius:20px;padding:10px 14px;font-weight:800;box-shadow:var(--shadow-m);max-width:200px;
  animation:floaty 4s ease-in-out infinite;
}
.speech:after{content:"";position:absolute;left:14px;bottom:-14px;border:8px solid transparent;border-top-color:var(--c-ies)}
@media(max-width:560px){.speech{position:static;margin:10px auto 0;max-width:none;display:inline-block}.speech:after{display:none}}

/* ---------- Stat dashboard ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:8px}
.stat{background:#fff;border-radius:var(--r-m);padding:16px;text-align:center;box-shadow:var(--shadow-s);border:2px solid var(--line);position:relative;overflow:hidden}
.stat .big{font-size:2rem;font-weight:800;line-height:1}
.stat .lbl{color:var(--ink-soft);font-weight:700;font-size:.9rem;margin-top:2px}
.stat .ic{font-size:1.6rem}

/* ---------- Progress bar ---------- */
.progress-shell{background:#eae5ff;border-radius:999px;height:20px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.1);border:2px solid #fff}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--c-s),var(--c-teal),var(--c-blue));border-radius:999px;width:0;transition:width 1s cubic-bezier(.2,.9,.3,1.2);box-shadow:0 0 10px rgba(63,191,127,.6)}

/* ---------- Menu grid (lessons / games) ---------- */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;margin-top:18px}
.tile{
  background:#fff;border-radius:var(--r-l);padding:20px 18px;cursor:pointer;position:relative;
  box-shadow:var(--shadow-m);border:2px solid #fff;transition:transform .2s cubic-bezier(.2,1.4,.4,1),box-shadow .2s;
  text-align:center;overflow:hidden;
}
.tile:hover{transform:translateY(-8px) rotate(-.6deg);box-shadow:var(--shadow-l)}
.tile:active{transform:translateY(-2px) scale(.98)}
.tile .emoji{font-size:2.8rem;display:block;filter:drop-shadow(0 4px 4px rgba(0,0,0,.15))}
.tile h3{margin:8px 0 4px;font-size:1.15rem}
.tile p{margin:0;color:var(--ink-soft);font-size:.86rem;font-weight:600}
.tile .num{position:absolute;top:10px;left:12px;background:var(--c-ies);color:#fff;width:28px;height:28px;border-radius:50%;
  display:grid;place-items:center;font-weight:800;font-size:.9rem;box-shadow:var(--shadow-s)}
.tile .check{position:absolute;top:8px;right:10px;color:var(--c-s);font-size:1.4rem;opacity:0;transform:scale(0)}
.tile.done .check{opacity:1;transform:scale(1);transition:.4s cubic-bezier(.2,1.7,.4,1)}
.tile .glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.6),transparent 60%);pointer-events:none}
.tile.locked{filter:grayscale(.5) opacity(.7);cursor:not-allowed}
.tile.locked:hover{transform:none}
.tile .stars-mini{margin-top:6px;font-size:.9rem;letter-spacing:2px;color:var(--c-yellow)}

/* ---------- Section headers ---------- */
.sec-head{display:flex;align-items:center;gap:12px;margin:26px 4px 6px}
.sec-head h2{font-size:1.7rem;margin:0}
.sec-head .em{font-size:2rem}
.subtle{color:var(--ink-soft);font-weight:600;margin:2px 4px 0}

.back-btn{background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 16px;font-weight:800;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-s);display:inline-flex;gap:6px;align-items:center;transition:transform .12s}
.back-btn:active{transform:scale(.93)}

/* ---------- Lesson content ---------- */
.lesson{max-width:820px;margin:0 auto}
.lesson-head{text-align:center;margin-bottom:14px}
.lesson-head .em{font-size:3.4rem;display:block;animation:bobble 3s ease-in-out infinite}
.lesson-head h1{font-size:2rem;margin:6px 0}
.slide{background:#fff;border-radius:var(--r-l);padding:26px;box-shadow:var(--shadow-m);border:2px solid #fff;margin-bottom:16px;animation:screenIn .45s}
.slide h2{margin-top:0;font-size:1.5rem;display:flex;align-items:center;gap:10px}
.big-word{font-size:1.3rem;font-weight:700}
.rule-box{background:var(--paper-2);border:2px dashed var(--c-ies);border-radius:var(--r-m);padding:16px;margin:12px 0;font-weight:700}

/* verb transform chips */
.transform{display:inline-flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 16px;margin:6px;font-size:1.2rem;font-weight:800;box-shadow:var(--shadow-s)}
.transform .base{color:var(--ink)}
.transform .arrow{color:var(--muted);font-size:1.1rem}
.transform .end.s{color:var(--c-s-dk)}
.transform .end.es{color:var(--c-es-dk)}
.transform .end.ies{color:var(--c-ies-dk)}
.transform .add{background:var(--c-s-soft);color:var(--c-s-dk);border-radius:8px;padding:0 6px;animation:pulseAdd 1.6s infinite}
.transform.esC .add{background:var(--c-es-soft);color:var(--c-es-dk)}
.transform.iesC .add{background:var(--c-ies-soft);color:var(--c-ies-dk)}
@keyframes pulseAdd{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

.compare2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:14px 0}
@media(max-width:560px){.compare2{grid-template-columns:1fr}}
.compare-card{border-radius:var(--r-l);padding:20px;text-align:center;color:#fff;box-shadow:var(--shadow-m)}
.compare-card.no{background:linear-gradient(150deg,#8b9bff,#6f7bff)}
.compare-card.yes{background:linear-gradient(150deg,var(--c-s),var(--c-s-dk))}
.compare-card h3{font-size:1.5rem;margin:0 0 8px}
.compare-card .pronouns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
.compare-card .pronouns span{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);border-radius:12px;padding:6px 14px;font-weight:800;font-size:1.2rem}
.compare-card .verb-demo{background:rgba(255,255,255,.9);color:var(--ink);border-radius:14px;padding:10px;margin-top:8px;font-weight:800;font-size:1.15rem}

table.grammar{width:100%;border-collapse:separate;border-spacing:0;margin:14px 0;background:#fff;border-radius:var(--r-m);overflow:hidden;box-shadow:var(--shadow-s)}
table.grammar th{background:var(--c-ies);color:#fff;padding:12px;font-size:1.05rem}
table.grammar td{padding:12px;text-align:center;border-bottom:1px solid var(--line);font-weight:700}
table.grammar tr:last-child td{border-bottom:none}
table.grammar tr:nth-child(even) td{background:var(--paper-2)}

/* slide dots + nav */
.slide-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px}
.dots{display:flex;gap:8px;justify-content:center;flex:1}
.dot{width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--c-ies);opacity:.5;transition:.3s;cursor:pointer}
.dot.active{opacity:1;background:var(--c-ies);transform:scale(1.3)}
.dot.seen{opacity:.85}

/* ---------- Game area ---------- */
.game-stage{background:#fff;border-radius:var(--r-l);padding:22px;box-shadow:var(--shadow-m);border:2px solid #fff;min-height:340px}
.prompt-verb{font-size:2.6rem;font-weight:800;text-align:center;margin:10px 0;color:var(--c-ies)}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:12px}
.opt{background:#fff;border:3px solid var(--line);border-radius:var(--r-m);padding:16px;font-weight:800;font-size:1.15rem;cursor:pointer;transition:transform .12s,border-color .2s,background .2s;box-shadow:var(--shadow-s);text-align:center}
.opt:hover{transform:translateY(-3px);border-color:var(--c-ies)}
.opt:active{transform:scale(.96)}
.opt.correct{background:var(--c-s-soft);border-color:var(--c-s);animation:goodShake .5s}
.opt.wrong{background:#ffe6e9;border-color:var(--c-red);animation:badShake .4s}
.opt.disabled{pointer-events:none;opacity:.65}
@keyframes goodShake{0%,100%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(.96)}}
@keyframes badShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.feedback{text-align:center;font-weight:800;font-size:1.15rem;margin-top:14px;min-height:28px}
.feedback.good{color:var(--c-s-dk)}
.feedback.bad{color:var(--c-red)}
.hint-box{background:var(--c-yellow);color:#7a5a00;border-radius:var(--r-m);padding:12px 16px;font-weight:800;margin-top:12px;animation:screenIn .4s;box-shadow:var(--shadow-s)}

/* Drag & drop bins */
.bins{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
@media(max-width:560px){.bins{grid-template-columns:1fr}}
.bin{border-radius:var(--r-m);padding:14px;min-height:130px;border:3px dashed;transition:.2s;text-align:center}
.bin.s{border-color:var(--c-s);background:var(--c-s-soft)}
.bin.es{border-color:var(--c-es);background:var(--c-es-soft)}
.bin.ies{border-color:var(--c-ies);background:var(--c-ies-soft)}
.bin.over{transform:scale(1.04);box-shadow:var(--shadow-m)}
.bin h4{margin:0 0 8px;font-size:1.3rem}
.bin.s h4{color:var(--c-s-dk)}.bin.es h4{color:var(--c-es-dk)}.bin.ies h4{color:var(--c-ies-dk)}
.bin-items{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.tokens{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:14px;min-height:60px}
.token{background:#fff;border:3px solid var(--c-ies);border-radius:14px;padding:10px 18px;font-weight:800;font-size:1.15rem;cursor:grab;box-shadow:var(--shadow-s);transition:transform .12s;touch-action:none;user-select:none}
.token:active{cursor:grabbing;transform:scale(1.08)}
.token.placed{border-color:var(--c-s);background:var(--c-s-soft);cursor:default}
.token.dragging{opacity:.5}
.token.tapped{outline:3px solid var(--c-ies);outline-offset:2px}

/* memory grid */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
@media(max-width:560px){.mem-grid{grid-template-columns:repeat(3,1fr);gap:8px}}
.mem-card{aspect-ratio:3/4;border-radius:var(--r-m);cursor:pointer;position:relative;perspective:800px}
.mem-inner{position:absolute;inset:0;transition:transform .5s;transform-style:preserve-3d}
.mem-card.flip .mem-inner,.mem-card.matched .mem-inner{transform:rotateY(180deg)}
.mem-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-m);display:grid;place-items:center;font-weight:800;box-shadow:var(--shadow-s);padding:6px;text-align:center;font-size:1.05rem}
.mem-front{background:var(--grad-grape);color:#fff;font-size:2rem}
.mem-back{background:#fff;border:3px solid var(--c-ies);transform:rotateY(180deg);color:var(--ink)}
.mem-card.matched .mem-back{border-color:var(--c-s);background:var(--c-s-soft);animation:goodShake .5s}

/* spin wheel */
.wheel-wrap{position:relative;width:min(320px,80vw);margin:16px auto;aspect-ratio:1}
.wheel{width:100%;height:100%;border-radius:50%;transition:transform 4s cubic-bezier(.15,.9,.25,1);box-shadow:var(--shadow-l),inset 0 0 0 10px #fff;position:relative}
.wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:2.4rem;z-index:3;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))}
.wheel-hub{position:absolute;inset:0;margin:auto;width:56px;height:56px;background:#fff;border-radius:50%;box-shadow:var(--shadow-m);display:grid;place-items:center;font-size:1.6rem;z-index:2}

/* balloons */
.balloon-field{position:relative;height:420px;border-radius:var(--r-l);overflow:hidden;background:linear-gradient(180deg,#dff3ff,#eafff3);border:2px solid #fff;margin-top:12px}
.balloon{position:absolute;bottom:-120px;width:74px;text-align:center;cursor:pointer;transition:transform .1s}
.balloon .body{font-size:3.6rem;line-height:1;filter:drop-shadow(0 4px 4px rgba(0,0,0,.15))}
.balloon .word{position:absolute;top:26%;left:0;right:0;color:#fff;font-weight:800;font-size:.95rem;text-shadow:0 1px 2px rgba(0,0,0,.3);pointer-events:none}
.balloon.pop-anim{animation:balloonPop .3s forwards}
@keyframes balloonPop{to{transform:scale(1.6);opacity:0}}

/* treasure hunt */
.map{position:relative;border-radius:var(--r-l);overflow:hidden;border:2px solid #fff;box-shadow:var(--shadow-m);margin-top:12px;background:linear-gradient(160deg,#bff0d0,#ffeeb0);min-height:360px}
.chest{position:absolute;font-size:2.4rem;cursor:pointer;transition:transform .2s;animation:floaty 3s ease-in-out infinite;filter:drop-shadow(0 4px 4px rgba(0,0,0,.2))}
.chest:hover{transform:scale(1.2)}
.chest.found{opacity:.3;pointer-events:none;filter:grayscale(1)}

/* sentence builder */
.sb-target{min-height:70px;background:var(--paper-2);border:3px dashed var(--c-ies);border-radius:var(--r-m);padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0}
.sb-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.word-chip{background:#fff;border:2.5px solid var(--c-ies);border-radius:12px;padding:8px 14px;font-weight:800;font-size:1.1rem;cursor:pointer;box-shadow:var(--shadow-s);transition:transform .12s}
.word-chip:active{transform:scale(.92)}
.word-chip.used{opacity:.3;pointer-events:none}

/* speaking practice */
.read-sentence{font-size:1.8rem;font-weight:800;text-align:center;line-height:1.6;margin:18px 0;padding:20px;background:var(--paper-2);border-radius:var(--r-l)}
.read-word{display:inline-block;padding:2px 4px;border-radius:8px;transition:.2s;margin:0 2px}
.read-word.on{background:var(--c-yellow);transform:scale(1.15)}
.read-word.done{color:var(--c-s-dk)}

/* quiz specific */
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.qcount{font-weight:800;color:var(--ink-soft)}
.q-progress{flex:1;min-width:120px}
.q-image{font-size:4rem;text-align:center;margin:6px 0}
.pic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
.pic-opt{background:#fff;border:3px solid var(--line);border-radius:var(--r-m);padding:18px;text-align:center;cursor:pointer;font-size:3rem;transition:.15s;box-shadow:var(--shadow-s)}
.pic-opt:hover{border-color:var(--c-ies);transform:translateY(-3px)}
.type-input{width:100%;font-family:inherit;font-size:1.5rem;font-weight:800;text-align:center;padding:14px;border:3px solid var(--c-ies);border-radius:var(--r-m);color:var(--ink)}
.type-input:focus{outline:none;box-shadow:0 0 0 4px var(--c-ies-soft)}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(42,35,80,.55);backdrop-filter:blur(4px);z-index:100;display:none;place-items:center;padding:18px;animation:fadeIn .3s}
.modal-back.show{display:grid}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r-xl);padding:30px;max-width:460px;width:100%;text-align:center;box-shadow:var(--shadow-l);animation:modalPop .5s cubic-bezier(.2,1.6,.4,1);position:relative;max-height:90vh;overflow:auto}
@keyframes modalPop{from{transform:scale(.6) translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal .em{font-size:4rem;display:block;animation:bobble 2s ease-in-out infinite}
.modal h2{margin:8px 0}
.modal .close-x{position:absolute;top:12px;right:14px;background:var(--line);border:none;width:34px;height:34px;border-radius:50%;font-weight:800;cursor:pointer;font-size:1.1rem;color:var(--ink)}

/* toast */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(140px);z-index:120;background:var(--ink);color:#fff;padding:14px 22px;border-radius:999px;font-weight:800;box-shadow:var(--shadow-l);transition:transform .4s cubic-bezier(.2,1.5,.4,1);display:flex;align-items:center;gap:8px;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}

/* confetti + fx layer */
#fx{position:fixed;inset:0;pointer-events:none;z-index:110;overflow:hidden}
.confetti{position:absolute;width:12px;height:12px;will-change:transform,opacity}
.spark{position:absolute;font-size:1.4rem;animation:sparkUp .9s ease-out forwards;pointer-events:none}
@keyframes sparkUp{0%{transform:translateY(0) scale(.4);opacity:1}100%{transform:translateY(-90px) scale(1.3);opacity:0}}
.coinfly{position:fixed;font-size:1.6rem;z-index:115;pointer-events:none;transition:all .8s cubic-bezier(.4,0,.6,1)}

/* achievement badges */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;margin-top:14px}
.badge{background:#fff;border-radius:var(--r-m);padding:16px 10px;text-align:center;box-shadow:var(--shadow-s);border:2px solid var(--line);position:relative;transition:.3s}
.badge.locked{filter:grayscale(1) opacity(.45)}
.badge.unlocked{border-color:var(--c-yellow);box-shadow:0 0 0 3px var(--c-yellow),var(--shadow-m)}
.badge .em{font-size:2.6rem}
.badge h4{margin:6px 0 2px;font-size:.95rem}
.badge p{margin:0;font-size:.72rem;color:var(--ink-soft);font-weight:600}
.badge.unlocked .em{animation:bobble 2.5s ease-in-out infinite}

/* certificate */
.certificate{background:linear-gradient(160deg,#fffdf5,#fff7e0);border:8px double var(--c-yellow);border-radius:var(--r-l);padding:34px;text-align:center;position:relative;box-shadow:var(--shadow-l);max-width:640px;margin:0 auto}
.certificate:before{content:"";position:absolute;inset:10px;border:2px solid var(--c-es);border-radius:var(--r-m);pointer-events:none}
.certificate h1{font-size:2.2rem;color:var(--c-ies-dk);margin:6px 0}
.certificate .seal{font-size:3.6rem}
.cert-name{font-size:2rem;font-weight:800;color:var(--c-es-dk);border-bottom:3px dashed var(--muted);display:inline-block;padding:4px 30px;margin:12px 0}

/* teacher panel */
.teacher-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:16px}
.t-card{background:#fff;border-radius:var(--r-m);padding:18px;box-shadow:var(--shadow-s);border:2px solid var(--line)}
.t-card h3{margin:0 0 8px;display:flex;gap:8px;align-items:center}
.answer-key-row{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:700}
.answer-key-row:nth-child(even){background:var(--paper-2)}
.hidden{display:none!important}

/* switch */
.switch{display:inline-flex;align-items:center;gap:8px;font-weight:800;cursor:pointer}
.switch input{display:none}
.switch .track{width:52px;height:30px;background:var(--line);border-radius:999px;position:relative;transition:.3s}
.switch .track:after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;background:#fff;border-radius:50%;transition:.3s;box-shadow:var(--shadow-s)}
.switch input:checked+.track{background:var(--c-s)}
.switch input:checked+.track:after{transform:translateX(22px)}

/* worksheet print */
@media print{
  body{background:#fff}
  #hud,#sky,#fx,.no-print,.back-btn,.btn{display:none!important}
  #app{max-width:100%;padding:0}
  .worksheet-page{page-break-after:always;box-shadow:none;border:none}
  .print-answer{color:#000!important}
}
.worksheet-page{background:#fff;border-radius:var(--r-m);padding:30px;box-shadow:var(--shadow-m);margin-bottom:20px;border:1px solid var(--line)}
.ws-head{text-align:center;border-bottom:3px solid var(--c-ies);padding-bottom:10px;margin-bottom:16px}
.ws-item{margin:12px 0;font-size:1.05rem;font-weight:600;display:flex;gap:8px;align-items:baseline}
.ws-item .n{font-weight:800;color:var(--c-ies);min-width:26px}
.ws-blank{border-bottom:2px solid var(--ink);min-width:90px;display:inline-block;text-align:center;font-weight:800}
.print-answer{color:var(--c-red)}

/* misc helpers */
.center{text-align:center}
.mt{margin-top:16px}.mb{margin-bottom:16px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tag{display:inline-block;background:var(--c-ies-soft);color:var(--c-ies-dk);font-weight:800;padding:4px 12px;border-radius:999px;font-size:.85rem}
.wrong-yes{color:var(--c-red);font-weight:800}
.right-yes{color:var(--c-s-dk);font-weight:800}
.mistake-card{background:#fff;border-radius:var(--r-m);padding:18px;box-shadow:var(--shadow-s);margin:12px 0;border-left:6px solid var(--c-red);transition:.3s}
.mistake-card.revealed{border-left-color:var(--c-s)}
.mistake-line{font-size:1.25rem;font-weight:800;margin:4px 0}
.why-box{background:var(--c-ies-soft);border-radius:14px;padding:10px 14px;margin-top:8px;font-weight:700;color:var(--c-ies-dk);animation:screenIn .4s}
.confetti-emoji{position:absolute;pointer-events:none;font-size:1.4rem}
</style>
</head>
<body>
<div id="sky"></div>
<div id="fx"></div>

<!-- HUD -->
<header id="hud">
  <div class="brand" onclick="go('home')">
    <svg class="logo" viewBox="0 0 48 48" fill="none"><rect x="4" y="6" width="40" height="36" rx="10" fill="#7c5cff"/><circle cx="17" cy="20" r="4" fill="#fff"/><circle cx="31" cy="20" r="4" fill="#fff"/><circle cx="17" cy="20" r="2" fill="#2a2350"/><circle cx="31" cy="20" r="2" fill="#2a2350"/><path d="M16 30c3 4 13 4 16 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
    <span>Grammar Galaxy</span>
  </div>
  <div class="spacer"></div>
  <div class="hud-chip" id="chipStars"><svg viewBox="0 0 24 24" fill="#ffd23f"><path d="M12 2l3 6 6 .8-4.5 4.2 1.2 6L12 22l-5.9-3 1.2-6L2.8 8.8 9 8z"/></svg><span id="starCount">0</span></div>
  <div class="hud-chip" id="chipCoins"><svg viewBox="0 0 24 24" fill="#ffb020"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="7" fill="#ffd23f"/></svg><span id="coinCount">0</span></div>
  <div class="hud-chip" id="chipLevel"><span class="lbl">Lv</span> <span id="levelCount">1</span></div>
  <button class="hud-btn ghost" onclick="go('rewards')" title="My Rewards">🏆</button>
</header>

<main id="app"></main>

<!-- Modal -->
<div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<div id="toast"></div>

<script>
/* =====================================================================
   DATA — verbs, rules, lessons, games, quizzes, worksheets
   ===================================================================== */

// Master verb bank. rule: 's' | 'es' | 'ies' | 'ies'(vowel->s) | 'irregular'
// For y+vowel we mark rule 's' (plays) but keep group 'y' for teaching.
const VERBS = {
  s:[ // most verbs: just add s
    {b:'eat',t:'eats',em:'🍎'},{b:'play',t:'plays',em:'⚽'},{b:'read',t:'reads',em:'📖'},
    {b:'sleep',t:'sleeps',em:'😴'},{b:'drink',t:'drinks',em:'🥤'},{b:'walk',t:'walks',em:'🚶'},
    {b:'run',t:'runs',em:'🏃'},{b:'jump',t:'jumps',em:'🤸'},{b:'sing',t:'sings',em:'🎤'},
    {b:'swim',t:'swims',em:'🏊'},{b:'cook',t:'cooks',em:'🍳'},{b:'draw',t:'draws',em:'🎨'},
    {b:'help',t:'helps',em:'🤝'},{b:'like',t:'likes',em:'❤️'},{b:'work',t:'works',em:'💼'},
    {b:'ride',t:'rides',em:'🚲'},{b:'clean',t:'cleans',em:'🧹'},{b:'open',t:'opens',em:'🚪'},
    {b:'talk',t:'talks',em:'💬'},{b:'jump',t:'jumps',em:'⭐'}
  ],
  es:[ // ends in sh, ch, x, s, z, o -> add es
    {b:'wash',t:'washes',em:'🧼',end:'sh'},{b:'watch',t:'watches',em:'📺',end:'ch'},
    {b:'fix',t:'fixes',em:'🔧',end:'x'},{b:'kiss',t:'kisses',em:'💋',end:'s'},
    {b:'go',t:'goes',em:'🚗',end:'o'},{b:'buzz',t:'buzzes',em:'🐝',end:'z'},
    {b:'brush',t:'brushes',em:'🪥',end:'sh'},{b:'catch',t:'catches',em:'⚾',end:'ch'},
    {b:'mix',t:'mixes',em:'🥣',end:'x'},{b:'push',t:'pushes',em:'🛒',end:'sh'},
    {b:'teach',t:'teaches',em:'🍎',end:'ch'},{b:'do',t:'does',em:'✅',end:'o'},
    {b:'pass',t:'passes',em:'🏈',end:'s'},{b:'miss',t:'misses',em:'🎯',end:'s'},
    {b:'fizz',t:'fizzes',em:'🥤',end:'z'}
  ],
  ies:[ // consonant + y -> ies
    {b:'carry',t:'carries',em:'🎒'},{b:'study',t:'studies',em:'📚'},{b:'cry',t:'cries',em:'😢'},
    {b:'fly',t:'flies',em:'🦋'},{b:'try',t:'tries',em:'💪'},{b:'copy',t:'copies',em:'📄'},
    {b:'hurry',t:'hurries',em:'⏰'},{b:'dry',t:'dries',em:'🌬️'},{b:'worry',t:'worries',em:'😟'},
    {b:'marry',t:'marries',em:'💍'}
  ],
  yvowel:[ // vowel + y -> just add s (tricky exceptions to IES)
    {b:'play',t:'plays',em:'🎮'},{b:'enjoy',t:'enjoys',em:'🎉'},{b:'stay',t:'stays',em:'🏠'},
    {b:'say',t:'says',em:'🗣️'},{b:'buy',t:'buys',em:'🛍️'},{b:'pray',t:'prays',em:'🙏'}
  ]
};

// Flatten helper: get pool of {b,t,rule,em}
function verbPool(rules){
  let out=[];
  (rules||['s','es','ies']).forEach(r=>{
    (VERBS[r==='yvowel'?'yvowel':r]||[]).forEach(v=>out.push({...v,rule:(r==='yvowel'?'s':r),group:r}));
  });
  return out;
}

// LESSONS — each is an array of slides (rendered as HTML strings via functions)
const LESSONS = [
  {id:1, icon:'🌞', title:'What is Present Simple?', color:'--c-blue', desc:'Daily routines, facts & habits'},
  {id:2, icon:'🦸', title:'Who Needs an S?', color:'--c-pink', desc:'He, She, It vs I, You, We, They'},
  {id:3, icon:'✨', title:'Adding S', color:'--c-s', desc:'Most verbs just add s'},
  {id:4, icon:'🚪', title:'Adding ES', color:'--c-es', desc:'sh, ch, x, s, z, o'},
  {id:5, icon:'🧚', title:'Changing Y to IES', color:'--c-ies', desc:'The Y Fairy trick'},
  {id:6, icon:'🧠', title:'Memory Tricks', color:'--c-yellow', desc:'Never forget the rules!'}
];

// PRACTICE GAMES
const GAMES = [
  {id:'guided', icon:'🎯', title:'Guided Practice', desc:'Hints & unlimited tries'},
  {id:'sort', icon:'🗂️', title:'Drag & Drop Sort', desc:'Put verbs in S, ES, IES'},
  {id:'memory', icon:'🃏', title:'Memory Match', desc:'Match verb to its form'},
  {id:'wheel', icon:'🎡', title:'Spin the Wheel', desc:'Answer a random verb'},
  {id:'treasure', icon:'🗺️', title:'Treasure Hunt', desc:'Collect verbs on the map'},
  {id:'balloon', icon:'🎈', title:'Balloon Pop', desc:'Pop the correct spelling'},
  {id:'builder', icon:'🧩', title:'Sentence Builder', desc:'Arrange the words'},
  {id:'speak', icon:'🎤', title:'Speaking Practice', desc:'Read aloud, follow along'}
];

// BADGES
const BADGES = [
  {id:'first_lesson', em:'🎓', name:'First Steps', desc:'Finish a lesson'},
  {id:'all_lessons', em:'📚', name:'Bookworm', desc:'Finish all 6 lessons'},
  {id:'first_star', em:'⭐', name:'Star Catcher', desc:'Earn your 1st star'},
  {id:'star25', em:'🌟', name:'Star Collector', desc:'Earn 25 stars'},
  {id:'coin50', em:'💰', name:'Coin Master', desc:'Collect 50 coins'},
  {id:'game_win', em:'🎮', name:'Game On', desc:'Win a practice game'},
  {id:'quiz_pass', em:'✅', name:'Quiz Whiz', desc:'Pass any quiz'},
  {id:'perfect', em:'🏆', name:'Perfect Score', desc:'100% on a quiz'},
  {id:'level5', em:'🚀', name:'High Flyer', desc:'Reach Level 5'},
  {id:'champion', em:'👑', name:'Grammar Champion', desc:'Beat the Final Challenge'}
];

// COMMON MISTAKES
const MISTAKES = [
  {wrong:'He play football.', right:'He plays football.', why:'“He” needs an S! Add s → plays.'},
  {wrong:'She study English.', right:'She studies English.', why:'Consonant + y → change y to ies → studies.'},
  {wrong:'It go fast.', right:'It goes fast.', why:'Verbs ending in o add ES → goes.'},
  {wrong:'My mom watch TV.', right:'My mom watches TV.', why:'“Mom” = she. Ends in ch → add ES → watches.'},
  {wrong:'The baby cry.', right:'The baby cries.', why:'Consonant + y → cry becomes cries.'},
  {wrong:'He haves a dog.', right:'He has a dog.', why:'“Have” is special! He/she/it → has.'},
  {wrong:'She plaies outside.', right:'She plays outside.', why:'Vowel + y (a + y) → just add S → plays. No ies!'},
  {wrong:'He brushs his teeth.', right:'He brushes his teeth.', why:'Ends in sh → add ES → brushes.'},
  {wrong:'She dos her homework.', right:'She does her homework.', why:'“Do” ends in o → does.'},
  {wrong:'The cat catchs mice.', right:'The cat catches mice.', why:'Ends in ch → add ES → catches.'}
];

/* =====================================================================
   STATE
   ===================================================================== */
const DEFAULT_STATE = {
  name:'Super Student', stars:0, coins:0, xp:0, level:1,
  lessons:{}, games:{}, quizzes:{}, badges:[], finalBest:0, teacher:false
};
let S = load();

function load(){
  try{
    const raw = localStorage.getItem('gg_save');
    if(raw) return Object.assign({}, DEFAULT_STATE, JSON.parse(raw));
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function save(){ try{ localStorage.setItem('gg_save', JSON.stringify(S)); }catch(e){} }

function levelFor(xp){ return Math.max(1, Math.floor(xp/100)+1); }
function xpIntoLevel(){ return S.xp % 100; }

/* =====================================================================
   ENGINE — rewards, effects, sound, toast, modal
   ===================================================================== */
function addStars(n){ S.stars+=n; bump('chipStars'); check('first_star'); if(S.stars>=25)unlock('star25'); refreshHUD(); save(); }
function addCoins(n, fromEl){ S.coins+=n; bump('chipCoins'); if(fromEl)flyCoin(fromEl); if(S.coins>=50)unlock('coin50'); refreshHUD(); save(); }
function addXP(n){
  const before=S.level; S.xp+=n; S.level=levelFor(S.xp);
  if(S.level>before){ if(S.level>=5)unlock('level5'); levelUp(S.level); }
  refreshHUD(); save();
}
function bump(id){ const el=document.getElementById(id)?.parentElement; if(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');} }

function refreshHUD(){
  document.getElementById('starCount').textContent=S.stars;
  document.getElementById('coinCount').textContent=S.coins;
  document.getElementById('levelCount').textContent=S.level;
}

function unlock(id){
  if(S.badges.includes(id))return;
  S.badges.push(id); save();
  const b=BADGES.find(x=>x.id===id); if(!b)return;
  toast(`${b.em} Badge unlocked: ${b.name}!`);
  confetti(24);
}
function check(id){ unlock(id); }

// --- Sound (WebAudio, optional & offline) ---
let AC=null, soundOn=true;
function beep(freq,dur=0.12,type='sine',vol=0.15){
  if(!soundOn)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;o.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function sGood(){ beep(660,.09,'triangle');setTimeout(()=>beep(880,.12,'triangle'),90); }
function sBad(){ beep(200,.18,'sawtooth',.12); }
function sPop(){ beep(520,.06,'square',.12); }
function sWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,'triangle'),i*110)); }
function sClick(){ beep(440,.04,'sine',.08); }

// --- Toast ---
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

// --- Confetti ---
const CONF_COLORS=['#ff6fae','#ffd23f','#3fbf7f','#40b7ff','#7c5cff','#ff8a4c'];
function confetti(n=40){
  const fx=document.getElementById('fx');
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    const size=6+Math.random()*10;
    c.style.width=size+'px';c.style.height=(size*0.5)+'px';
    c.style.background=CONF_COLORS[i%CONF_COLORS.length];
    c.style.left=Math.random()*100+'vw';c.style.top='-20px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    const x=(Math.random()-.5)*260, rot=Math.random()*720, dur=1600+Math.random()*1400;
    fx.appendChild(c);
    c.animate([
      {transform:`translate(0,0) rotate(0deg)`,opacity:1},
      {transform:`translate(${x}px,${window.innerHeight+80}px) rotate(${rot}deg)`,opacity:.9}
    ],{duration:dur,easing:'cubic-bezier(.3,.6,.4,1)'}).onfinish=()=>c.remove();
  }
}
function sparkle(el){
  if(!el)return;
  const r=el.getBoundingClientRect();
  const fx=document.getElementById('fx');
  const em=['✨','⭐','💫','🌟'];
  for(let i=0;i<7;i++){
    const s=document.createElement('div');
    s.className='spark';s.textContent=em[i%em.length];
    s.style.left=(r.left+Math.random()*r.width)+'px';
    s.style.top=(r.top+r.height*0.4)+'px';
    s.style.setProperty('--x',(Math.random()-.5)*60+'px');
    fx.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}
function starBurst(cx,cy){
  const fx=document.getElementById('fx');
  for(let i=0;i<14;i++){
    const s=document.createElement('div');s.className='confetti';s.textContent='';
    s.style.background=i%2?'#ffd23f':'#fff';s.style.width='10px';s.style.height='10px';s.style.borderRadius='50%';
    s.style.left=cx+'px';s.style.top=cy+'px';
    const a=(i/14)*Math.PI*2,d=60+Math.random()*60;
    fx.appendChild(s);
    s.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`,opacity:0}],{duration:700,easing:'ease-out'}).onfinish=()=>s.remove();
  }
}
function flyCoin(fromEl){
  const r=fromEl.getBoundingClientRect();
  const target=document.getElementById('chipCoins').getBoundingClientRect();
  const c=document.createElement('div');c.className='coinfly';c.textContent='🪙';
  c.style.left=(r.left+r.width/2)+'px';c.style.top=(r.top)+'px';
  document.body.appendChild(c);
  requestAnimationFrame(()=>{c.style.left=target.left+'px';c.style.top=target.top+'px';c.style.transform='scale(.5)';c.style.opacity='0';});
  setTimeout(()=>c.remove(),820);
}

/* small helper to render a verb transform chip */
function chip(b,t,rule){
  const cls=rule==='es'?'esC':rule==='ies'?'iesC':'';
  // compute added part
  let base=b, add=t.slice(b.length);
  if(rule==='ies'){ base=b.slice(0,-1); add='ies'; }
  return `<span class="transform ${cls}"><span class="base">${base}</span><span class="add">${add==='ies'?'ies':add}</span><span class="arrow">=</span><span class="end ${rule}">${t}</span></span>`;
}

  const L=LESSONS.find(l=>l.id===id);
  return `
  <button class="back-btn" onclick="go('lessons')">← Lessons</button>
  <div class="lesson">
    <div class="lesson-head">
      <span class="em">${L.icon}</span>
      <h1>Lesson ${id}: ${L.title}</h1>
    </div>
    <div id="slideArea"></div>
    <div class="slide-nav">
      <button class="btn ghost sm" id="prevBtn" onclick="lessonMove(-1)">← Back</button>
      <div class="dots" id="dots"></div>
      <button class="btn ies sm" id="nextBtn" onclick="lessonMove(1)">Next →</button>
    </div>
  </div>`;
};
ROUTES.lesson._after=function(){ renderSlide(); };

function renderSlide(){
  const {slides,idx,id}=LSTATE;
  document.getElementById('slideArea').innerHTML=`<div class="slide">${slides[idx]}</div>`;
  const dots=slides.map((_,i)=>`<span class="dot ${i===idx?'active':''} ${i<idx?'seen':''}" onclick="lessonJump(${i})"></span>`).join('');
  document.getElementById('dots').innerHTML=dots;
  document.getElementById('prevBtn').style.visibility=idx===0?'hidden':'visible';
  const last=idx===slides.length-1;
  document.getElementById('nextBtn').innerHTML=last?'Finish ✅':'Next →';
  document.getElementById('nextBtn').className='btn sm '+(last?'s':'ies');
}
function lessonMove(dir){
  const {slides,idx}=LSTATE;
  if(dir>0 && idx===slides.length-1){ finishLesson(); return; }
  LSTATE.idx=Math.max(0,Math.min(slides.length-1,idx+dir));
  sClick(); renderSlide();
}
function lessonJump(i){ LSTATE.idx=i; sClick(); renderSlide(); }
function finishLesson(){
  const first=!S.lessons[LSTATE.id];
  S.lessons[LSTATE.id]=true; save();
  addStars(3); addCoins(5); addXP(30);
  if(first){ unlock('first_lesson'); }
  if(LESSONS.every(l=>S.lessons[l.id])) unlock('all_lessons');
  sWin(); confetti(50);
  const next=LESSONS.find(l=>l.id===LSTATE.id+1);
  modal(`<button class="close-x" onclick="closeModal()">✕</button>
    <span class="em">🎉</span><h2>Lesson Complete!</h2>
    <p class="big-word">You earned <span class="right-yes">⭐×3</span> and <span class="right-yes">🪙×5</span>!</p>
    <p class="subtle">Great job finishing Lesson ${LSTATE.id}!</p>
    <div class="btn-row mt">
      ${next?`<button class="btn ies" onclick="closeModal();go('lesson',${next.id})">Next Lesson →</button>`:`<button class="btn s" onclick="closeModal();go('practice')">Play Games 🎮</button>`}
      <button class="btn ghost sm" onclick="closeModal();go('lessons')">Lessons</button>
    </div>`);
}

/* helper: pick n random items */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(arr,n){ return shuffle(arr).slice(0,n); }

/* build distractor forms for a verb (wrong spellings) */
function distractors(v){
  const b=v.b, forms=new Set([v.t]);
  forms.add(b+'s'); forms.add(b+'es');
  if(b.endsWith('y')) forms.add(b.slice(0,-1)+'ies');
  forms.add(b+'ies');
  return shuffle([...forms]).slice(0,3);
}

/* ---------- GUIDED PRACTICE ---------- */
let GP={};
function gameGuided(host){
  GP={pool:shuffle(verbPool(['s','es','ies','yvowel'])), i:0, right:0, need:8};
  host.innerHTML=`<div class="game-stage">
    <div class="quiz-top"><span class="qcount">Question <span id="gpN">1</span> / ${GP.need}</span>
      <div class="q-progress progress-shell"><div class="progress-fill" id="gpBar"></div></div></div>
    <div id="gpBody"></div>
  </div>`;
  gpNext();
}
function gpNext(){
  if(GP.right>=GP.need){ gameWin('guided',`You got ${GP.right} correct! ⭐`); addStars(3);addCoins(8);addXP(25); return; }
  const v=GP.pool[GP.i%GP.pool.length]; GP.i++; GP.cur=v; GP.tries=0;
  document.getElementById('gpN').textContent=GP.right+1;
  document.getElementById('gpBar').style.width=Math.round(GP.right/GP.need*100)+'%';
  const opts=shuffle([v.t, v.b+'s', v.b+'es', v.b.endsWith('y')?v.b.slice(0,-1)+'ies':v.b+'ies']
    .filter((x,i,a)=>a.indexOf(x)===i)).slice(0,4);
  if(!opts.includes(v.t)) opts[0]=v.t;
  document.getElementById('gpBody').innerHTML=`
    <p class="center subtle">He / She / It ...</p>
    <div class="prompt-verb">${v.em} ${v.b}</div>
    <p class="center">Choose the correct form:</p>
    <div class="opt-grid">${shuffle(opts).map(o=>`<div class="opt" onclick="gpAnswer(this,'${o}')">${o}</div>`).join('')}</div>
    <div class="feedback" id="gpFb"></div>`;
}
function gpAnswer(el,val){
  const v=GP.cur, fb=document.getElementById('gpFb');
  if(val===v.t){
    el.classList.add('correct'); sparkle(el); sGood();
    fb.className='feedback good'; fb.textContent='✅ Perfect!';
    GP.right++; addCoins(1,el);
    setTimeout(gpNext,850);
  }else{
    el.classList.add('wrong'); sBad(); GP.tries++;
    fb.className='feedback bad'; fb.textContent='❌ Try again — you can do it!';
    setTimeout(()=>el.classList.remove('wrong'),500);
    if(GP.tries>=1){
      const hint = ruleHint(v);
      fb.innerHTML=`<div class="hint-box">💡 Hint: ${hint}</div>`;
    }
  }
}
function ruleHint(v){
  if(v.rule==='es') return `“${v.b}” ends in <b>${v.end}</b> → add <b>ES</b> → ${v.t}`;
  if(v.rule==='ies') return `consonant + y → change y to <b>ies</b> → ${v.t}`;
  if(v.group==='yvowel') return `vowel + y → just add <b>S</b> → ${v.t}`;
  return `most verbs just add <b>S</b> → ${v.t}`;
}

/* ---------- DRAG & DROP SORT ---------- */
let SORT={};
function gameSort(host){
  const items=pick(verbPool(['s','es','ies']),9);
  SORT={items, placed:0, correct:0};
  host.innerHTML=`<div class="game-stage">
    <p class="center">Drag each verb to the right box — or <b>tap a verb then tap a box</b>! 👆</p>
    <div class="tokens" id="sortTokens">
      ${items.map((v,i)=>`<div class="token" draggable="true" data-i="${i}" data-rule="${v.rule}">${v.b}</div>`).join('')}
    </div>
    <div class="bins">
      <div class="bin s" data-rule="s"><h4>+ S</h4><div class="bin-items"></div></div>
      <div class="bin es" data-rule="es"><h4>+ ES</h4><div class="bin-items"></div></div>
      <div class="bin ies" data-rule="ies"><h4>Y → IES</h4><div class="bin-items"></div></div>
    </div>
    <div class="feedback" id="sortFb"></div>
  </div>`;
  wireSort();
}
function wireSort(){
  let dragged=null, tapped=null;
  document.querySelectorAll('#sortTokens .token').forEach(t=>{
    t.addEventListener('dragstart',e=>{dragged=t;t.classList.add('dragging');});
    t.addEventListener('dragend',()=>{t.classList.remove('dragging');dragged=null;});
    t.addEventListener('click',()=>{
      if(t.classList.contains('placed'))return;
      document.querySelectorAll('.token.tapped').forEach(x=>x.classList.remove('tapped'));
      if(tapped===t){tapped=null;return;}
      tapped=t; t.classList.add('tapped'); sClick();
    });
  });
  document.querySelectorAll('.bin').forEach(bin=>{
    bin.addEventListener('dragover',e=>{e.preventDefault();bin.classList.add('over');});
    bin.addEventListener('dragleave',()=>bin.classList.remove('over'));
    bin.addEventListener('drop',e=>{e.preventDefault();bin.classList.remove('over');if(dragged)placeToken(dragged,bin);});
    bin.addEventListener('click',()=>{ if(tapped){placeToken(tapped,bin);tapped=null;} });
  });
}
function placeToken(token,bin){
  if(token.classList.contains('placed'))return;
  const ok = token.dataset.rule===bin.dataset.rule;
  token.classList.remove('tapped');
  if(ok){
    token.classList.add('placed'); sparkle(token); sGood();
    bin.querySelector('.bin-items').appendChild(token);
    SORT.correct++;
  }else{
    token.classList.add('wrong'); sBad();
    setTimeout(()=>token.classList.remove('wrong'),500);
    document.getElementById('sortFb').innerHTML=`<span class="bad">Not quite — try another box! 🤔</span>`;
    return;
  }
  SORT.placed++;
  addCoins(1,token);
  document.getElementById('sortFb').innerHTML=`<span class="good">Great! ${SORT.correct}/${SORT.items.length} sorted ✅</span>`;
  if(SORT.correct===SORT.items.length){ addStars(3);addXP(25); gameWin('sort','You sorted every verb! 🗂️'); }
}

/* ---------- MEMORY MATCH ---------- */
let MEM={};
function gameMemory(host){
  const verbs=pick(verbPool(['s','es','ies']),6);
  let cards=[];
  verbs.forEach(v=>{ cards.push({key:v.b,face:v.b,type:'base',em:v.em}); cards.push({key:v.b,face:v.t,type:'form'}); });
  cards=shuffle(cards);
  MEM={cards, flipped:[], matched:0, total:verbs.length, lock:false, moves:0};
  host.innerHTML=`<div class="game-stage">
    <p class="center">Match each verb 🧩 with its correct <b>He/She/It</b> form!</p>
    <div class="mem-grid" id="memGrid">
      ${cards.map((c,i)=>`<div class="mem-card" data-i="${i}" onclick="memFlip(${i})">
        <div class="mem-inner">
          <div class="mem-face mem-front">?</div>
          <div class="mem-face mem-back">${c.type==='base'?(c.em+'<br>'):''}${c.face}</div>
        </div></div>`).join('')}
    </div>
    <div class="feedback" id="memFb">Moves: 0</div>
  </div>`;
}
function memFlip(i){
  if(MEM.lock)return;
  const card=document.querySelector(`.mem-card[data-i="${i}"]`);
  if(card.classList.contains('flip')||card.classList.contains('matched'))return;
  card.classList.add('flip'); sPop();
  MEM.flipped.push(i);
  if(MEM.flipped.length===2){
    MEM.lock=true; MEM.moves++;
    document.getElementById('memFb').textContent='Moves: '+MEM.moves;
    const [a,b]=MEM.flipped;
    const ca=MEM.cards[a], cb=MEM.cards[b];
    if(ca.key===cb.key && ca.type!==cb.type){
      setTimeout(()=>{
        const ca2=document.querySelector(`.mem-card[data-i="${a}"]`), cb2=document.querySelector(`.mem-card[data-i="${b}"]`);
        if(!ca2||!cb2){ MEM.flipped=[]; MEM.lock=false; return; }
        ca2.classList.add('matched'); cb2.classList.add('matched');
        sGood(); MEM.matched++; addCoins(1);
        MEM.flipped=[]; MEM.lock=false;
        if(MEM.matched===MEM.total){ addStars(3);addXP(25); gameWin('memory',`Solved in ${MEM.moves} moves! 🃏`); }
      },500);
    }else{
      sBad();
      setTimeout(()=>{
        document.querySelector(`.mem-card[data-i="${a}"]`)?.classList.remove('flip');
        document.querySelector(`.mem-card[data-i="${b}"]`)?.classList.remove('flip');
        MEM.flipped=[]; MEM.lock=false;
      },850);
    }
  }
}

/* ---------- SPIN THE WHEEL ---------- */
let WHEEL={};
function gameWheel(host){
  const pool=pick(verbPool(['s','es','ies','yvowel']),8);
  WHEEL={pool, angle:0, right:0, need:6, spinning:false};
  const seg=360/pool.length;
  const cols=['#ff6fae','#ffd23f','#3fbf7f','#40b7ff','#7c5cff','#ff8a4c','#2fd9c9','#ff5d6c'];
  const grad=pool.map((v,i)=>`${cols[i%cols.length]} ${i*seg}deg ${(i+1)*seg}deg`).join(',');
  host.innerHTML=`<div class="game-stage center">
    <p>Spin the wheel, then spell the <b>He/She/It</b> form! 🎡</p>
    <p class="subtle">Correct answers: <b id="whR">0</b> / ${WHEEL.need}</p>
    <div class="wheel-wrap">
      <div class="wheel-pointer">🔻</div>
      <div class="wheel" id="wheel" style="background:conic-gradient(${grad})">
        ${pool.map((v,i)=>`<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(${i*seg+seg/2}deg) translateY(-95px) rotate(90deg);font-weight:800;color:#fff;font-size:1rem;text-shadow:0 1px 2px rgba(0,0,0,.4)">${v.b}</div>`).join('')}
      </div>
      <div class="wheel-hub">🎯</div>
    </div>
    <button class="btn ies" id="spinBtn" onclick="doSpin()">🎡 SPIN!</button>
    <div id="whBody" class="mt"></div>
  </div>`;
}
function doSpin(){
  if(WHEEL.spinning)return; WHEEL.spinning=true; sPop();
  document.getElementById('whBody').innerHTML='';
  const n=WHEEL.pool.length, seg=360/n;
  const idx=Math.floor(Math.random()*n);
  const spins=5*360;
  const target=spins + (360 - (idx*seg+seg/2));
  WHEEL.angle+=target;
  const w=document.getElementById('wheel');
  w.style.transform=`rotate(${WHEEL.angle}deg)`;
  setTimeout(()=>{ WHEEL.spinning=false; wheelAsk(WHEEL.pool[idx]); }, 4100);
}
function wheelAsk(v){
  const opts=shuffle([v.t, v.b+'s', v.b+'es', v.b.endsWith('y')?v.b.slice(0,-1)+'ies':v.b+'ies']
    .filter((x,i,a)=>a.indexOf(x)===i)).slice(0,4);
  if(!opts.includes(v.t))opts[0]=v.t;
  document.getElementById('whBody').innerHTML=`
    <div class="prompt-verb">${v.em} ${v.b} → ?</div>
    <div class="opt-grid">${shuffle(opts).map(o=>`<div class="opt" onclick="wheelAnswer(this,'${o}','${v.t}')">${o}</div>`).join('')}</div>
    <div class="feedback" id="whFb"></div>`;
}
function wheelAnswer(el,val,correct){
  const fb=document.getElementById('whFb');
  document.querySelectorAll('#whBody .opt').forEach(o=>o.classList.add('disabled'));
  if(val===correct){
    el.classList.add('correct'); sparkle(el); sGood(); addCoins(2,el);
    WHEEL.right++; document.getElementById('whR').textContent=WHEEL.right;
    fb.className='feedback good'; fb.textContent='✅ Correct! Spin again!';
    if(WHEEL.right>=WHEEL.need){ addStars(3);addXP(25); gameWin('wheel','You spun to victory! 🎡'); }
  }else{
    el.classList.add('wrong'); sBad();
    fb.className='feedback bad'; fb.innerHTML=`❌ It's <b>${correct}</b>. ${ruleHint(WHEEL.pool.find(x=>x.t===correct)||{rule:'s'})}`;
  }
}

/* ---------- BALLOON POP ---------- */
let BAL={};
function gameBalloon(host){
  BAL={score:0, need:8, pool:shuffle(verbPool(['s','es','ies','yvowel'])), i:0, timer:null, balloons:[]};
  host.innerHTML=`<div class="game-stage">
    <div class="center"><p>Pop the balloon with the <b>correct</b> spelling! 🎈</p>
    <p class="subtle">Score: <b id="balScore">0</b> / ${BAL.need}</p>
    <div class="prompt-verb" id="balPrompt"></div></div>
    <div class="balloon-field" id="balField"></div>
    <div class="feedback" id="balFb"></div>
  </div>`;
  balRound();
}
function balRound(){
  const field=document.getElementById('balField');
  field.innerHTML=''; BAL.balloons=[];
  const v=BAL.pool[BAL.i%BAL.pool.length]; BAL.i++; BAL.cur=v;
  document.getElementById('balPrompt').textContent=`${v.em} ${v.b} →  ?`;
  let forms=new Set([v.t, v.b+'s', v.b+'es']);
  if(v.b.endsWith('y')) forms.add(v.b.slice(0,-1)+'ies');
  forms=[...forms].slice(0,4); if(!forms.includes(v.t))forms[0]=v.t;
  forms=shuffle(forms);
  const cols=['🎈','🩷','💙','💛','💚','🧡','💜'];
  forms.forEach((f,idx)=>{
    const b=document.createElement('div');
    b.className='balloon';
    b.style.left=(8+idx*(84/forms.length)+Math.random()*6)+'%';
    const color=['#ff6fae','#40b7ff','#ffd23f','#3fbf7f','#ff8a4c','#7c5cff'][idx%6];
    b.innerHTML=`<div class="body" style="color:${color}">🎈</div><div class="word">${f}</div>`;
    b.onclick=()=>balPop(b,f);
    field.appendChild(b);
    const dur=6000+Math.random()*3000;
    b._anim=b.animate([{transform:'translateY(0)'},{transform:`translateY(-${field.offsetHeight+140}px)`}],{duration:dur,easing:'linear'});
    b._anim.onfinish=()=>{ if(b.parentElement){ /* floated away */ b.remove(); if(BAL.balloons.every(x=>!x.parentElement)) balRound(); } };
    BAL.balloons.push(b);
  });
}
function balPop(b,f){
  const fb=document.getElementById('balFb');

    if(BAL.score>=BAL.need){ addStars(3);addXP(25); gameWin('balloon','You popped them all! 🎈'); return; }

    sBad();
    fb.className='feedback bad'; fb.textContent='❌ Wrong balloon — look again!';
  }
}

    sBad(); fb.className='feedback bad'; fb.textContent='❌ Word order is off — try again! (Start with who does it.)';

/* =====================================================================
   QUESTION GENERATOR
   ===================================================================== */
const SUBJECTS_SHE=[['He','👦'],['She','👧'],['It','🐶'],['My mom','👩'],['The dog','🐕'],['My friend','🧒'],['The bird','🐦'],['My teacher','🍎']];
const SUBJECTS_PLURAL=[['I','🙋'],['You','🫵'],['We','👨‍👩‍👧'],['They','👥']];

function correctForm(v){ return v.t; }
function wrongForms(v){
  const set=new Set();
  set.add(v.b+'s'); set.add(v.b+'es'); set.add(v.b);
  if(v.b.endsWith('y')){ set.add(v.b.slice(0,-1)+'ies'); }
  else set.add(v.b+'ies');
  set.delete(v.t);
  return shuffle([...set]);
}
function mcOptions(v){
  const opts=[v.t, ...wrongForms(v).slice(0,3)];
  return shuffle([...new Set(opts)].slice(0,4));
}
function whyText(v){
  if(v.rule==='es') return `“${v.b}” ends in <b>${v.end}</b>, so add <b>ES</b> → <b>${v.t}</b>.`;
  if(v.rule==='ies') return `“${v.b}” is consonant + y, so change <b>y → ies</b> → <b>${v.t}</b>.`;
  if(v.group==='yvowel') return `“${v.b}” is vowel + y, so just add <b>S</b> → <b>${v.t}</b> (no ies!).`;
  return `Most verbs just add <b>S</b> → <b>${v.t}</b>.`;
}

// build a single question of given type
function makeQ(type,v,difficulty){
  const subj=SUBJECTS_SHE[Math.floor(Math.random()*SUBJECTS_SHE.length)];
  const base={type, v, why:whyText(v)};
  if(type==='mc'){
    return {...base, prompt:`${subj[1]} ${subj[0]} ___ .`, sub:`Choose the correct form of “${v.b}”.`, options:mcOptions(v), answer:v.t};
  }
  if(type==='type'){
    return {...base, prompt:`${subj[1]} ${subj[0]} ______ .`, sub:`Type the correct form of “<b>${v.b}</b>”.`, answer:v.t, input:true};
  }
  if(type==='complete'){
    return {...base, prompt:`${subj[1]} ${subj[0]} <span class="ws-blank">?</span> to school.`, sub:`Complete the sentence with “${v.b}”.`, options:mcOptions(v), answer:v.t};
  }
  if(type==='picture'){
    return {...base, pic:v.em, prompt:`${subj[0]} ___ .`, sub:`Look at the picture ${v.em}. Which word is right?`, options:mcOptions(v), answer:v.t};
  }
  if(type==='listening'){
    return {...base, listen:v.t, prompt:`🔊 Listen and choose.`, sub:`Tap the speaker, then pick what you hear.`, options:mcOptions(v), answer:v.t};
  }
  if(type==='error'){
    // present sentences, pick the CORRECT one
    const wrongOpt = v.b.endsWith('y')&&v.group==='yvowel' ? v.b.slice(0,-1)+'ies' : (v.rule==='es'?v.b+'s':(v.rule==='ies'?v.b+'s':v.b));
    const correctS=`${subj[0]} ${v.t} every day.`;
    const wrongS=`${subj[0]} ${wrongOpt===v.t?v.b:wrongOpt} every day.`;
    const opts=shuffle([{t:correctS,ok:true},{t:wrongS,ok:false}]);
    return {...base, prompt:`Which sentence is <b>correct</b>? ✅`, sub:`Find the sentence with no mistake.`, sentenceChoices:opts, answer:correctS};
  }
  if(type==='rule'){
    const map={s:'Add S',es:'Add ES',ies:'Y → IES'};
    const key = v.group==='yvowel'?'s':v.rule;
    return {...base, prompt:`${v.em} <b>${v.b}</b>`, sub:`Which rule does this verb use for He/She/It?`, options:shuffle(['Add S','Add ES','Y → IES']), answer:map[key]};
  }
  return makeQ('mc',v,difficulty);
}

// build a matching question (4 pairs)
function makeMatch(pool){
  const vs=pick(pool,4);
  return {type:'match', pairs:vs.map(v=>({b:v.b,t:v.t,em:v.em})), why:'Match each verb with its He/She/It form.'};
}

// Generate a quiz set of N questions
function genQuiz(difficulty,N){
  let pool, types;
  if(difficulty==='easy'){ pool=verbPool(['s','es']); types=['mc','picture','complete','mc','rule']; }
  else if(difficulty==='medium'){ pool=verbPool(['s','es','ies']); types=['mc','type','complete','listening','error','picture','rule']; }
  else { pool=verbPool(['s','es','ies','yvowel']); types=['type','error','mc','rule','listening','complete']; }
  const qs=[]; const shuffledPool=shuffle(pool);
  for(let i=0;i<N;i++){
    const t=types[i%types.length];
    if(difficulty==='hard' && i%6===5){ qs.push(makeMatch(pool)); continue; }
    if(difficulty==='medium' && i%7===6){ qs.push(makeMatch(pool)); continue; }
    const v=shuffledPool[i%shuffledPool.length];
    qs.push(makeQ(t,v,difficulty));
  }
  return qs.slice(0,N);
}

function renderQ(){

  const typeLabel={mc:'Multiple Choice',type:'Type the Answer',complete:'Complete the Sentence',picture:'Picture Choice',listening:'Listening',error:'Error Correction',rule:'Choose the Rule',match:'Matching'}[q.type]||'Question';

  if(q.type==='match'){

  }else if(q.input){
    body=`<div class="q-image">${q.pic||'✍️'}</div>
      <p class="prompt-verb" style="font-size:1.6rem">${q.prompt}</p>
      <p class="center">${q.sub}</p>

      <div class="btn-row mt"><button class="btn s" onclick="checkType()">Check ✅</button></div>
      <div class="feedback" id="qFb"></div>`;
  }else if(q.sentenceChoices){
    body=`<p class="prompt-verb" style="font-size:1.5rem">${q.prompt}</p><p class="center">${q.sub}</p>
      <div class="opt-grid" style="grid-template-columns:1fr">
        ${q.sentenceChoices.map(c=>`<div class="opt" onclick="answerMC(this,${c.ok})">${c.t}</div>`).join('')}</div>
      <div class="feedback" id="qFb"></div>`;
  }else{
    const img = q.pic?`<div class="q-image">${q.pic}</div>`:(q.listen?`<div class="center"><button class="btn ies" onclick="speak('${q.listen}')">🔊 Play Sound</button></div>`:'');
    body=`${img}<p class="prompt-verb" style="font-size:1.5rem">${q.prompt}</p><p class="center">${q.sub}</p>
      <div class="opt-grid">${q.options.map(o=>`<div class="opt" onclick="answerMC(this,${o===q.answer})" data-v="${o}">${o}</div>`).join('')}</div>
      <div class="feedback" id="qFb"></div>`;
  }
  host.innerHTML=`<div class="game-stage">
    <div class="quiz-top">
      <span class="qcount">Q ${QZ.i+1}/${QZ.total}</span>

  </div>`;
}

/* ----- Matching question ----- */
let MQ={};
function matchBody(q){
  MQ={sel:null, matched:0, total:q.pairs.length, q};
  const left=q.pairs.map((p,i)=>`<div class="opt mq-l" data-i="${i}" onclick="mqPick('l',${i})">${p.em||''} ${p.b}</div>`).join('');
  const right=shuffle(q.pairs.map((p,i)=>({t:p.t,i}))).map(o=>`<div class="opt mq-r" data-i="${o.i}" onclick="mqPick('r',${o.i})">${o.t}</div>`).join('');
  return `<p class="center">${q.why}</p>
    <div class="compare2">
      <div><h4 class="center">Verb</h4>${left}</div>
      <div><h4 class="center">He/She/It form</h4>${right}</div>
    </div>
    <div class="feedback" id="qFb">Matched 0/${q.pairs.length}</div>`;
}
function mqPick(side,i){
  const el=document.querySelector(`.mq-${side}[data-i="${i}"]`);
  if(el.classList.contains('correct'))return;
  if(!MQ.sel){ MQ.sel={side,i,el}; el.style.borderColor='var(--c-ies)'; sClick(); return; }
  if(MQ.sel.side===side){ MQ.sel.el.style.borderColor=''; MQ.sel={side,i,el}; el.style.borderColor='var(--c-ies)'; return; }
  // one left one right
  if(MQ.sel.i===i){
    // match!
    const a=MQ.sel.el; a.classList.add('correct'); el.classList.add('correct'); a.style.borderColor='';
    sparkle(el); sGood(); MQ.matched++; addCoins(1);
    document.getElementById('qFb').textContent=`Matched ${MQ.matched}/${MQ.total}`;
    MQ.sel=null;
    if(MQ.matched===MQ.total){ QZ.score++; document.getElementById('qFb').innerHTML='✅ All matched!'; nextBtn(); }
  }else{
    sBad(); MQ.sel.el.style.borderColor=''; const bad=el; bad.classList.add('wrong'); setTimeout(()=>bad.classList.remove('wrong'),400); MQ.sel=null;
  }
}

function quizDone(){
  const pct=Math.round(QZ.score/QZ.total*100);
  const stars = pct>=90?3:pct>=70?2:pct>=50?1:0;
  // save best
  if(!QZ.isFinal){
    const prev=S.quizzes[QZ.id]||0;
    if(QZ.score>prev){ S.quizzes[QZ.id]=QZ.score; }
    if(pct>=60)unlock('quiz_pass');
    if(pct===100)unlock('perfect');
  }
  addStars(stars); addCoins(QZ.score); addXP(QZ.score*2); save();
  if(stars>=2){ confetti(60); sWin(); } else sPop();
  const host=document.getElementById('quizHost');
  const reviewCards = QZ.wrong.length? `
    <div class="sec-head" style="margin-top:20px"><span class="em">🔁</span><h2 style="font-size:1.3rem">Review Cards</h2></div>
    <p class="subtle">Study these — you'll get them next time! 💪</p>
    ${QZ.wrong.map(q=>`<div class="mistake-card revealed"><div class="mistake-line right-yes">✅ ${q.answer}</div><div class="why-box">${q.why}</div></div>`).join('')}`:
    `<div class="card center mt"><span style="font-size:2.4rem">🌟</span><p class="big-word">Perfect! No mistakes to review!</p></div>`;

  host.innerHTML=`<div class="card center">
    <span style="font-size:4rem;display:block" class="${stars>0?'':''}">${pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪'}</span>
    <h2>Quiz Complete!</h2>
    <p class="prompt-verb" style="font-size:2.2rem">${QZ.score} / ${QZ.total}</p>
    <div style="font-size:2rem">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p class="subtle">${pct>=90?'Outstanding! You are a grammar star!':pct>=70?'Great job! Keep practising!':pct>=50?'Good effort! Review and try again!':'Nice try! Let\'s review together!'}</p>
    <div class="btn-row mt">
      <button class="btn ies" onclick="startQuiz('${QZ.id}',${QZ.total},${QZ.isFinal})">Try Again 🔁</button>
      <button class="btn ghost sm" onclick="go('${QZ.isFinal?'home':'quizzes'}')">${QZ.isFinal?'Home':'More Quizzes'}</button>
    </div>
  </div>${reviewCards}`;
  window.scrollTo({top:0,behavior:'smooth'});
}

      <div class="mistake-line wrong-yes">❌ ${m.wrong}</div>

        <div class="mistake-line right-yes">✅ ${m.right}</div>
        <div class="why-box">💡 ${m.why}</div>
      </div>
      <button class="btn ghost sm mt no-print" id="mkBtn${i}" onclick="fixMistake(${i})">🔧 Fix it!</button>
    </div>`).join('');
  return `<button class="back-btn" onclick="go('home')">← Home</button>
    <div class="sec-head"><span class="em">🔍</span><div><h2>Common Mistakes</h2><p class="subtle">Spot the mistake, then tap “Fix it!” to see why.</p></div></div>
    ${cards}
    <div class="btn-row mt"><button class="btn s" onclick="go('quizzes')">Test Yourself 📝</button></div>`;
};
function fixMistake(i){
  document.getElementById('mkFix'+i).classList.remove('hidden');
  document.getElementById('mk'+i).classList.add('revealed');
  document.getElementById('mkBtn'+i).classList.add('hidden');
  sGood(); sparkle(document.getElementById('mk'+i));
  addCoins(1);
}

function startFinal(){
  QZ={id:'final', isFinal:true, qs:genFinal(), i:0, score:0, wrong:[], total:50};
  go('quizrun');
}
function genFinal(){
  const parts=[...genQuiz('easy',16),...genQuiz('medium',18),...genQuiz('hard',16)];
  return shuffle(parts).slice(0,50);
}
// override quizDone for final champion badge
const _quizDone=quizDone;
quizDone=function(){
  if(QZ.isFinal){
    const pct=Math.round(QZ.score/QZ.total*100);
    if(QZ.score>(S.finalBest||0)){ S.finalBest=QZ.score; save(); }
    if(pct>=70) unlock('champion');
    if(pct===100) unlock('perfect');
  }
  _quizDone();
};

  document.getElementById('randQ').innerHTML=`<div class="card" style="padding:14px">

/* Answer key page */
ROUTES.answerkey=function(){
  const section=(title,rule,note)=>{
    const rows=(VERBS[rule]||[]).map(v=>`<div class="answer-key-row"><span>${v.em||''} ${v.b}</span><span class="right-yes">${v.t}</span></div>`).join('');
    return `<div class="t-card"><h3>${title}</h3><p class="subtle">${note}</p>${rows}</div>`;
  };
  return `<button class="back-btn" onclick="go('teacher')">← Teacher Zone</button>
   <div class="sec-head"><span class="em">🔑</span><div><h2>Answer Key</h2><p class="subtle">He / She / It forms for every verb.</p></div></div>
   <div class="teacher-grid">
     ${section('➕ Add S','s','Most verbs — just add s')}
     ${section('🚪 Add ES','es','Ends in sh, ch, x, s, z, o')}
     ${section('🧚 Y → IES','ies','Consonant + y → ies')}
     ${section('⚠️ Vowel + Y (add S)','yvowel','Vowel + y → just add s (tricky!)')}
   </div>`;
};

/* =====================================================================
   WORKSHEETS (printable)
   ===================================================================== */
function genWorksheet(letter, seed){
  // 20 fill-in items mixing rules
  const pool=shuffle(verbPool(['s','es','ies','yvowel']));
  const items=[];
  for(let i=0;i<20;i++){
    const v=pool[i%pool.length];
    const subj=SUBJECTS_SHE[(i+seed)%SUBJECTS_SHE.length];
    items.push({n:i+1, subj:subj[0], em:subj[1], base:v.b, ans:v.t, why:whyText(v)});
  }
  return items;
}
let WS_CACHE={};
ROUTES.worksheets=function(){
  if(!WS_CACHE.A){ WS_CACHE={A:genWorksheet('A',0), B:genWorksheet('B',3), C:genWorksheet('C',5)}; }
  return `<button class="back-btn no-print" onclick="go('home')">← Home</button>
   <div class="sec-head no-print"><span class="em">🖨️</span><div><h2>Printable Worksheets</h2><p class="subtle">3 worksheets • 20 questions each • answer keys included.</p></div></div>
   <div class="btn-row no-print mb">
     <button class="btn sun" onclick="window.print()">🖨️ Print All</button>
     <button class="btn ghost sm" onclick="WS_CACHE={};go('worksheets')">🎲 New Questions</button>
     <label class="switch" style="margin-left:8px"><input type="checkbox" id="showKey" onchange="document.querySelectorAll('.print-answer').forEach(a=>a.style.display=this.checked?'inline':'none')"><span class="track"></span><span>Show Answer Key</span></label>
   </div>
   <div id="wsArea">
     ${worksheetHTML('A',WS_CACHE.A)}
     ${worksheetHTML('B',WS_CACHE.B)}
     ${worksheetHTML('C',WS_CACHE.C)}
   </div>`;
};
function worksheetHTML(letter,items){
  const rows=items.map(it=>`<div class="ws-item"><span class="n">${it.n}.</span>
    <span>${it.em} ${it.subj} <span class="ws-blank"><span class="print-answer" style="display:none">${it.ans}</span></span> ( ${it.base} )</span></div>`).join('');
  const key=items.map(it=>`<span style="display:inline-block;min-width:120px">${it.n}. <b>${it.ans}</b></span>`).join(' ');
  return `<div class="worksheet-page">
    <div class="ws-head">
      <h2 style="margin:2px">🌟 Present Simple • Worksheet ${letter}</h2>
      <p class="subtle">Add S, ES or change Y→IES for He / She / It</p>
      <div class="row" style="justify-content:space-between;font-weight:700;margin-top:6px">
        <span>Name: _______________</span><span>Date: _________</span><span>Score: ___/20</span>
      </div>
    </div>
    <p style="font-weight:700">Fill in the correct form of the verb in brackets.</p>
    ${rows}
    <div class="why-box print-answer" style="display:none;margin-top:16px"><b>🔑 Answer Key (Worksheet ${letter}):</b><br>${key}</div>
  </div>`;
}

  document.addEventListener('pointerdown',resume);

  document.addEventListener('keydown',e=>{
    if(CURRENT==='lesson'){ if(e.key==='ArrowRight')lessonMove(1); if(e.key==='ArrowLeft')lessonMove(-1); }

});
