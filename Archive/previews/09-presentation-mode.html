<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Presentation Mode · Sound Garden Studio</title><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Andika:wght@400;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet"><style>/* =========================================================================
   Sound Garden Studio — Design system
   "Modern Storybook Learning Studio"
   Two type families: Baloo 2 (display) + Andika (body & reading, literacy
   letterforms with single-story a/g). Noto Sans Thai for Thai fallback.
   ========================================================================= */

:root {
  /* Core palette (tuned for AA contrast on ivory) */
  --ivory:      #FFF9EF;
  --paper:      #FFFDF8;
  --white:      #FFFFFF;
  --ink:        #22314C;   /* deep navy — primary text */
  --ink-2:      #4E5E77;   /* soft navy — secondary text */
  --brown:      #6E5648;   /* soft brown — alt text */
  --coral:      #EE6F63;
  --coral-ink:  #B84539;   /* accessible coral for text/marks */
  --sky:        #7FB9E6;
  --sky-deep:   #3E7FB8;
  --butter:     #F4C24E;
  --butter-ink: #9A6C10;
  --leaf:       #6BB08C;
  --leaf-deep:  #3E7E5C;
  --violet:     #A98BC9;
  --teal:       #4FB0A5;

  --line:       #EAE1D0;
  --line-2:     #DED3BE;

  --shadow-sm: 0 6px 16px rgba(34,49,76,.07);
  --shadow:    0 16px 34px rgba(34,49,76,.10);
  --shadow-lg: 0 28px 60px rgba(34,49,76,.16);

  --r-xl: 28px;
  --r-lg: 20px;
  --r-md: 14px;
  --r-sm: 10px;

  --display: "Baloo 2", "Fredoka", ui-rounded, "Arial Rounded MT Bold", "Trebuchet MS", system-ui, sans-serif;
  --body: "Andika", "Nunito", "Noto Sans Thai", system-ui, -apple-system, "Segoe UI", sans-serif;
  --reading: "Andika", "Nunito", system-ui, sans-serif;

  --maxw: 1200px;
  --dur: .22s;
  --ease: cubic-bezier(.22,.61,.36,1);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  color: var(--ink);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  background-color: var(--ivory);
  background-image:
    radial-gradient(circle at 12% 8%, rgba(127,185,230,.10), transparent 42%),
    radial-gradient(circle at 88% 4%, rgba(244,194,78,.12), transparent 40%),
    radial-gradient(circle at 78% 92%, rgba(107,176,140,.10), transparent 45%);
  background-attachment: fixed;
}
h1, h2, h3, h4 { font-family: var(--display); letter-spacing: -.01em; color: var(--ink); margin: 0; font-weight: 700; }
p { margin: 0; }
button, input, select { font: inherit; color: inherit; }
img, svg { max-width: 100%; }
a { color: var(--sky-deep); }

/* ---- Focus + reduced motion ---- */
:focus-visible { outline: 3px solid var(--sky-deep); outline-offset: 3px; border-radius: 6px; }
button:focus:not(:focus-visible) { outline: none; }
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 46px; padding: 0 18px; border-radius: var(--r-md);
  border: 1px solid transparent; cursor: pointer; font-family: var(--display);
  font-weight: 600; font-size: 15px; text-decoration: none;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
}
.btn svg { width: 20px; height: 20px; }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn--primary { background: var(--ink); color: #fff; box-shadow: 0 10px 22px rgba(34,49,76,.20); }
.btn--accent  { background: var(--butter); color: var(--ink); box-shadow: 0 10px 22px rgba(244,194,78,.32); }
.btn--coral   { background: var(--coral); color: #fff; box-shadow: 0 10px 22px rgba(238,111,99,.30); }
.btn--soft    { background: #fff; color: var(--ink); border-color: var(--line-2); box-shadow: var(--shadow-sm); }
.btn--ghost   { background: transparent; color: var(--ink); border-color: var(--line-2); }
.btn--sm { min-height: 38px; padding: 0 13px; font-size: 14px; }
.btn--lg { min-height: 54px; padding: 0 24px; font-size: 17px; }
.btn--block { width: 100%; }
.btn[disabled] { opacity: .5; cursor: not-allowed; transform: none; }
.icon-btn {
  width: 46px; height: 46px; min-height: 46px; padding: 0; border-radius: var(--r-md);
  display: inline-grid; place-items: center; background: #fff; border: 1px solid var(--line-2);
  cursor: pointer; box-shadow: var(--shadow-sm);
  transition: transform var(--dur) var(--ease), background var(--dur) var(--ease);
}
.icon-btn:hover { transform: translateY(-2px); }
.icon-btn svg { width: 21px; height: 21px; }
.icon-btn[aria-pressed="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ---- Layout ---- */
.app { min-height: 100vh; display: flex; flex-direction: column; }
main { flex: 1; width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 26px 22px 80px; }
.hidden { display: none !important; }
.view { animation: rise var(--dur) var(--ease) both; }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } }

/* ---- Top bar ---- */
.topbar { position: sticky; top: 0; z-index: 50; background: rgba(255,249,239,.86); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
.topbar-in { max-width: var(--maxw); margin: 0 auto; padding: 11px 22px; display: flex; align-items: center; gap: 16px; }
.brand { display: flex; align-items: center; gap: 11px; cursor: pointer; background: none; border: 0; padding: 4px; border-radius: var(--r-md); }
.brand-mark { width: 46px; height: 46px; flex: 0 0 auto; }
.brand-copy strong { display: block; font-family: var(--display); font-size: 18px; line-height: 1; }
.brand-copy span { display: block; color: var(--ink-2); font-size: 11.5px; margin-top: 2px; }
.top-nav { display: flex; gap: 4px; margin-left: 8px; }
.top-nav button { background: none; border: 0; padding: 9px 13px; border-radius: var(--r-md); cursor: pointer; font-family: var(--display); font-weight: 600; font-size: 14.5px; color: var(--ink-2); }
.top-nav button:hover { background: rgba(34,49,76,.06); color: var(--ink); }
.top-nav button.active { background: var(--ink); color: #fff; }
.top-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }

/* ---- Hero ---- */
.hero { position: relative; overflow: hidden; border-radius: var(--r-xl); background: var(--ink); color: #fff; display: grid; grid-template-columns: 1.06fr .94fr; min-height: 430px; box-shadow: var(--shadow-lg); }
.hero-copy { padding: 52px 48px; position: relative; z-index: 2; align-self: center; }
.eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 7px 13px; border-radius: 999px; background: rgba(255,255,255,.12); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; font-family: var(--display); }
.eyebrow::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--butter); }
.hero h1 { font-size: clamp(40px, 6vw, 66px); line-height: .98; margin: 20px 0 16px; color: #fff; max-width: 12ch; }
.hero h1 em { font-style: normal; color: var(--butter); }
.hero p { max-width: 46ch; font-size: 17px; line-height: 1.6; color: rgba(255,255,255,.82); margin-bottom: 24px; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 10px; }
.hero-art { position: relative; }
.hero-art svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.hero-chips { display: flex; gap: 20px; margin-top: 26px; }
.hero-chips b { display: block; font-family: var(--display); font-size: 26px; line-height: 1; }
.hero-chips span { color: rgba(255,255,255,.66); font-size: 12.5px; }

/* ---- Section heads ---- */
.section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin: 40px 0 16px; }
.section-head h2 { font-size: 30px; }
.section-head p { color: var(--ink-2); margin-top: 6px; max-width: 62ch; line-height: 1.55; }
.eyebrow-mini { font-family: var(--display); font-weight: 700; font-size: 12.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--coral-ink); }

/* ---- Continue / progress strip ---- */
.resume { display: grid; grid-template-columns: auto 1fr auto; gap: 22px; align-items: center; margin-top: 20px; padding: 22px; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl); box-shadow: var(--shadow-sm); }
.ring { --p: 0; width: 84px; height: 84px; border-radius: 50%; display: grid; place-items: center; position: relative; flex: 0 0 auto; background: conic-gradient(var(--coral) calc(var(--p) * 1deg), #EFE7D6 0); }
.ring::after { content: ""; position: absolute; inset: 9px; border-radius: 50%; background: var(--paper); }
.ring b { position: relative; z-index: 1; font-family: var(--display); font-size: 19px; }
.resume-copy strong { font-family: var(--display); font-size: 18px; display: block; }
.resume-copy p { color: var(--ink-2); margin-top: 4px; font-size: 14.5px; }
.bar { height: 9px; background: #EFE7D6; border-radius: 999px; margin-top: 11px; overflow: hidden; }
.bar > i { display: block; height: 100%; background: var(--coral); border-radius: inherit; transition: width .6s var(--ease); }

/* ---- Stage journey grid ---- */
.journey { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.stage { position: relative; overflow: hidden; text-align: left; cursor: pointer; border: 1px solid var(--line); background: var(--paper); border-radius: var(--r-xl); padding: 20px; min-height: 260px; display: flex; flex-direction: column; box-shadow: var(--shadow-sm); transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
.stage:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
.stage-top { display: flex; align-items: center; justify-content: space-between; }
.stage-badge { width: 52px; height: 52px; }
.stage-no { font-family: var(--display); font-weight: 700; font-size: 13px; color: var(--ink-2); background: #fff; border: 1px solid var(--line-2); padding: 4px 10px; border-radius: 999px; }
.stage h3 { font-size: 21px; margin: 16px 0 4px; }
.stage .area-th { color: var(--ink-2); font-size: 13px; }
.stage-sounds { display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0 auto; }
.chip { font-family: var(--reading); font-weight: 700; font-size: 14px; padding: 4px 9px; border-radius: 9px; background: #fff; border: 1px solid var(--line-2); }
.stage-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
.status { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; font-family: var(--display); color: var(--ink-2); }
.status::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--line-2); }
.status.done { color: var(--leaf-deep); }
.status.done::before { background: var(--leaf); }
.status.progress { color: var(--butter-ink); }
.status.progress::before { background: var(--butter); }
.go { width: 34px; height: 34px; border-radius: 11px; background: var(--ink); color: #fff; display: grid; place-items: center; }
.go svg { width: 18px; height: 18px; }

/* Feature tiles (home teacher tools + library) */
.tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.tile { text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: var(--r-xl); padding: 22px; min-height: 168px; box-shadow: var(--shadow-sm); transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease); display: flex; flex-direction: column; }
.tile:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.tile-ic { width: 46px; height: 46px; border-radius: var(--r-md); display: grid; place-items: center; background: rgba(255,255,255,.6); }
.tile-ic svg { width: 24px; height: 24px; }
.tile h3 { font-size: 19px; margin: 16px 0 5px; }
.tile p { color: var(--ink-2); font-size: 14px; line-height: 1.5; margin-top: auto; }

/* ---- Panels & cards ---- */
.panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 22px; box-shadow: var(--shadow-sm); }
.panel > h2, .panel > h3 { margin-bottom: 6px; }
.muted { color: var(--ink-2); }
.grid-2 { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(260px,.5fr); gap: 16px; }
.grid-side { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 16px; }

/* ---- Breadcrumb / back ---- */
.crumb { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.back { background: none; border: 0; cursor: pointer; font-family: var(--display); font-weight: 600; display: inline-flex; align-items: center; gap: 6px; padding: 6px 4px; color: var(--ink); }
.back:hover { color: var(--coral-ink); }

/* ---- Stage overview header ---- */
.stage-hero { position: relative; overflow: hidden; border-radius: var(--r-xl); padding: 26px 28px; color: var(--ink); box-shadow: var(--shadow); }
.stage-hero::after { content: ""; position: absolute; right: -70px; bottom: -90px; width: 240px; height: 240px; border: 3px solid rgba(34,49,76,.12); border-radius: 50%; }
.stage-hero .kicker { font-family: var(--display); font-weight: 700; font-size: 12.5px; letter-spacing: .08em; text-transform: uppercase; background: rgba(255,255,255,.6); padding: 6px 11px; border-radius: 999px; display: inline-block; }
.stage-hero h1 { font-size: clamp(30px, 5vw, 46px); margin: 12px 0 8px; }
.stage-hero p { max-width: 58ch; color: rgba(34,49,76,.82); line-height: 1.55; }
.stage-facts { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.fact { background: rgba(255,255,255,.66); border-radius: 999px; padding: 7px 14px; font-size: 13.5px; font-weight: 700; font-family: var(--display); }

/* ---- Tabs ---- */
.tabs { position: sticky; top: 66px; z-index: 30; display: flex; gap: 6px; margin: 16px 0; padding: 6px; background: rgba(255,249,239,.9); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: var(--r-lg); overflow-x: auto; }
.tab { flex: 0 0 auto; border: 0; background: transparent; padding: 11px 16px; border-radius: var(--r-md); cursor: pointer; font-family: var(--display); font-weight: 600; white-space: nowrap; color: var(--ink-2); }
.tab.active { background: var(--ink); color: #fff; }
.tab:hover:not(.active) { background: rgba(34,49,76,.06); color: var(--ink); }

/* ---- Lesson stepper ---- */
.stepper { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
.step { flex: 1 1 0; min-width: 120px; display: flex; align-items: center; gap: 9px; padding: 11px 13px; border-radius: var(--r-md); background: #fff; border: 1px solid var(--line-2); cursor: pointer; text-align: left; transition: background var(--dur) var(--ease); }
.step:hover { background: var(--ivory); }
.step.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.step.done .step-n { background: var(--leaf); color: #fff; }
.step-n { width: 26px; height: 26px; flex: 0 0 auto; border-radius: 50%; display: grid; place-items: center; background: #EFE7D6; font-family: var(--display); font-weight: 700; font-size: 13px; }
.step.active .step-n { background: var(--butter); color: var(--ink); }
.step b { display: block; font-family: var(--display); font-size: 14px; line-height: 1.1; }
.step small { font-size: 11.5px; opacity: .8; }

/* ---- Sound board ---- */
.sound-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sound-card { text-align: left; cursor: pointer; border: 1px solid var(--line-2); border-radius: var(--r-lg); padding: 15px; background: #fff; transition: transform var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.sound-card:hover { transform: translateY(-3px); }
.sound-card.active { border-color: var(--coral); box-shadow: 0 0 0 2px rgba(238,111,99,.2); }
.grapheme { display: grid; place-items: center; width: 58px; height: 58px; border-radius: var(--r-md); font-family: var(--reading); font-weight: 700; font-size: 28px; color: var(--ink); }
.sound-card .ph { display: block; margin-top: 11px; font-family: var(--display); font-weight: 700; font-size: 16px; }
.sound-card .note { display: block; color: var(--ink-2); font-size: 12.5px; margin-top: 3px; line-height: 1.4; }
.listen-tag { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; font-weight: 700; font-family: var(--display); color: var(--sky-deep); }
.listen-tag svg { width: 16px; height: 16px; }

/* Big teacher display box */
.display-box { background: var(--ink); color: #fff; border-radius: var(--r-xl); padding: 24px; }
.display-box small { color: rgba(255,255,255,.6); font-weight: 700; font-family: var(--display); letter-spacing: .06em; font-size: 11px; text-transform: uppercase; }
.display-word { font-family: var(--reading); font-weight: 700; font-size: clamp(44px, 8vw, 70px); line-height: 1.05; margin: 10px 0; letter-spacing: .01em; }
.display-word mark { background: transparent; color: var(--butter); }
.display-box p { color: rgba(255,255,255,.74); margin-bottom: 16px; font-size: 14px; }
.display-actions { display: flex; flex-wrap: wrap; gap: 8px; }

/* honest note about isolated sounds */
.note-callout { display: flex; gap: 10px; align-items: flex-start; background: #FFF7E6; border: 1px solid #F1E2B8; border-radius: var(--r-md); padding: 12px 14px; margin-top: 12px; font-size: 13.5px; color: var(--brown); }
.note-callout svg { width: 20px; height: 20px; flex: 0 0 auto; color: var(--butter-ink); }
.mouth-tip { background: var(--ivory); border: 1px dashed var(--line-2); border-radius: var(--r-md); padding: 12px 14px; margin-top: 12px; font-size: 14px; }
.mouth-tip b { font-family: var(--display); }

/* Sound wave (animated while audio plays) */
.wave { display: inline-flex; align-items: flex-end; gap: 3px; height: 20px; }
.wave i { width: 3px; height: 6px; background: currentColor; border-radius: 2px; }
.wave.on i { animation: wv .9s var(--ease) infinite; }
.wave.on i:nth-child(2){ animation-delay:.1s } .wave.on i:nth-child(3){ animation-delay:.2s } .wave.on i:nth-child(4){ animation-delay:.3s } .wave.on i:nth-child(5){ animation-delay:.15s }
@keyframes wv { 0%,100%{ height:6px } 50%{ height:18px } }

/* ---- Word wall / cards ---- */
.word-wall { display: flex; flex-wrap: wrap; gap: 9px; }
.word-chip { min-height: 46px; padding: 0 16px; border-radius: var(--r-md); border: 1px solid var(--line-2); background: #fff; cursor: pointer; font-family: var(--reading); font-weight: 700; font-size: 18px; transition: transform var(--dur) var(--ease), background var(--dur) var(--ease); position: relative; }
.word-chip:hover { transform: translateY(-2px); background: var(--ivory); }
.word-chip.master { background: #E7F3EC; border-color: var(--leaf); }
.word-chip mark { background: transparent; color: var(--coral-ink); }
.word-chip.big { font-size: 26px; min-height: 62px; padding: 0 22px; }

/* Reading (Step D) card deck */
.read-stage { text-align: center; padding: 22px; }
.read-word { font-family: var(--reading); font-weight: 700; font-size: clamp(52px, 12vw, 108px); line-height: 1; margin: 18px 0; letter-spacing: .01em; }
.read-word mark { background: transparent; color: var(--coral-ink); }
.read-controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
.read-count { color: var(--ink-2); font-weight: 700; font-family: var(--display); }

/* ---- Blending lab ---- */
.blend-lab { text-align: center; }
.blend-track { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; min-height: 96px; align-items: center; margin: 20px 0; }
.blend-track.blended { gap: 0; }
.gtile { display: grid; place-items: center; min-width: 68px; height: 84px; padding: 0 14px; border-radius: var(--r-md); background: #fff; border: 2px solid var(--line-2); font-family: var(--reading); font-weight: 700; font-size: 40px; box-shadow: var(--shadow-sm); transition: transform .3s var(--ease), opacity .3s var(--ease), border-color var(--dur) var(--ease); cursor: pointer; }
.gtile.revealed { border-color: var(--coral); }
.gtile.hidden-tile { opacity: 0; transform: translateY(8px); }
.blend-track.blended .gtile { border-radius: 0; box-shadow: none; border-color: transparent; background: transparent; min-width: auto; padding: 0 1px; }
.blend-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

/* ---- Activities ---- */
.act-wrap { max-width: 860px; margin: 0 auto; }
.act-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.act-progress { height: 8px; background: #EFE7D6; border-radius: 999px; overflow: hidden; margin-bottom: 22px; }
.act-progress > i { display: block; height: 100%; background: var(--coral); transition: width .3s var(--ease); }
.count-pill { font-family: var(--display); font-weight: 700; font-size: 13px; color: var(--ink-2); }
.prompt { background: var(--ivory); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 26px; text-align: center; }
.prompt-label { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-2); }
.prompt-main { font-family: var(--reading); font-weight: 700; font-size: clamp(34px, 7vw, 58px); margin: 14px 0; }
.prompt-main mark { background: transparent; color: var(--coral-ink); }
.audio-orb { width: 84px; height: 84px; border: 0; border-radius: 50%; background: var(--ink); color: #fff; display: grid; place-items: center; margin: 16px auto; cursor: pointer; box-shadow: 0 14px 28px rgba(34,49,76,.22); transition: transform var(--dur) var(--ease); }
.audio-orb:hover { transform: scale(1.05); }
.audio-orb svg { width: 34px; height: 34px; }
.options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 18px; }
.options.two { grid-template-columns: repeat(2, 1fr); }
.opt { min-height: 74px; border-radius: var(--r-lg); border: 2px solid var(--line-2); background: #fff; font-family: var(--reading); font-weight: 700; font-size: 22px; cursor: pointer; padding: 12px; transition: transform var(--dur) var(--ease), border-color var(--dur) var(--ease); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
.opt small { font-family: var(--display); font-size: 12px; color: var(--ink-2); }
.opt:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--ink); }
.opt.correct { background: #E4F3EA; border-color: var(--leaf); }
.opt.correct::after { content: "✓ correct"; }
.opt.wrong { background: #FBE6E3; border-color: var(--coral); }
.opt.wrong::after { content: "✗ try again"; }
.opt.correct::after, .opt.wrong::after { font-family: var(--display); font-size: 11px; font-weight: 700; margin-top: 4px; letter-spacing: .04em; }
.opt.correct::after { color: var(--leaf-deep); }
.opt.wrong::after { color: var(--coral-ink); }
.feedback { margin-top: 16px; border-radius: var(--r-md); padding: 15px 16px; line-height: 1.5; border: 1px solid var(--line); }
.feedback.good { background: #E9F5EE; border-color: #BFE0CC; }
.feedback.bad { background: #FEF0EE; border-color: #F6CFCA; }
.feedback strong { font-family: var(--display); display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.feedback svg { width: 18px; height: 18px; }
.next-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }

/* Build the word tiles */
.tile-bank, .tile-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; min-height: 66px; }
.tile-slots { margin: 16px 0; padding: 14px; border: 2px dashed var(--line-2); border-radius: var(--r-lg); background: #fff; }
.ltile { min-width: 56px; height: 60px; padding: 0 12px; border: 0; border-radius: var(--r-md); background: #fff; box-shadow: var(--shadow-sm); font-family: var(--reading); font-weight: 700; font-size: 26px; cursor: pointer; transition: transform var(--dur) var(--ease); }
.ltile:hover { transform: translateY(-2px); }
.tile-slots .ltile { background: var(--butter); }

/* Word sort columns */
.sort-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.sort-cols.two { grid-template-columns: repeat(2, 1fr); }
.sort-col { border: 2px dashed var(--line-2); border-radius: var(--r-lg); padding: 12px; min-height: 130px; background: #fff; }
.sort-col.over { border-color: var(--sky-deep); background: var(--ivory); }
.sort-col h4 { font-family: var(--display); text-align: center; padding: 6px; border-radius: var(--r-sm); margin-bottom: 8px; }
.sort-tray { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
.sort-word { padding: 8px 13px; border-radius: var(--r-md); background: #fff; border: 1px solid var(--line-2); font-family: var(--reading); font-weight: 700; font-size: 18px; cursor: grab; box-shadow: var(--shadow-sm); }
.sort-word.placed { cursor: pointer; }
.sort-word.sel { outline: 3px solid var(--sky-deep); }

/* Flashcard */
.flash { text-align: center; }
.flashcard { border-radius: var(--r-xl); padding: 40px 20px; margin: 12px 0; box-shadow: var(--shadow); }
.flashcard .fw { font-family: var(--reading); font-weight: 700; font-size: clamp(56px, 13vw, 120px); line-height: 1; }
.flashcard .fw mark { background: transparent; color: var(--coral-ink); }

/* ---- Result / challenge ---- */
.result { text-align: center; padding: 30px; }
.score-orb { width: 150px; height: 150px; margin: 0 auto 20px; border-radius: 50%; display: grid; place-items: center; background: var(--butter); border: 12px solid #FBEBBE; }
.score-orb b { font-family: var(--display); font-size: 42px; }
.skills { display: grid; gap: 10px; margin: 20px auto; max-width: 440px; text-align: left; }
.skill-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
.skill-row span { font-family: var(--display); font-weight: 600; }
.skill-bar { grid-column: 1 / -1; height: 8px; background: #EFE7D6; border-radius: 999px; overflow: hidden; }
.skill-bar > i { display: block; height: 100%; background: var(--leaf); border-radius: inherit; }
.review-list { display: grid; gap: 10px; text-align: left; margin-top: 18px; }
.review-item { background: var(--ivory); border: 1px solid var(--line); border-radius: var(--r-md); padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.review-item b { font-family: var(--reading); font-size: 20px; }
.result-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }

/* celebration */
.spark { position: fixed; inset: 0; pointer-events: none; z-index: 90; overflow: hidden; }
.spark i { position: absolute; top: -12px; width: 9px; height: 14px; border-radius: 2px; animation: fall 2.4s var(--ease) forwards; }
@keyframes fall { to { transform: translateY(105vh) rotate(320deg); opacity: 0; } }

/* ---- Library ---- */
.lib-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
.field { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 0 12px; height: 46px; }
.field svg { width: 18px; height: 18px; color: var(--ink-2); }
.field input { border: 0; outline: 0; background: none; height: 100%; min-width: 150px; }
select.sel { height: 46px; border-radius: var(--r-md); border: 1px solid var(--line-2); background: #fff; padding: 0 12px; cursor: pointer; font-family: var(--display); font-weight: 600; }
.lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.lib-card { border: 1px solid var(--line-2); border-radius: var(--r-md); padding: 14px 12px; background: #fff; text-align: center; cursor: pointer; transition: transform var(--dur) var(--ease); }
.lib-card:hover { transform: translateY(-3px); }
.lib-card.master { background: #E7F3EC; border-color: var(--leaf); }
.lib-card .lw { font-family: var(--reading); font-weight: 700; font-size: 24px; }
.lib-card .lw mark { background: transparent; color: var(--coral-ink); }
.lib-card .meta { font-size: 11px; color: var(--ink-2); font-family: var(--display); font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }
.lib-card .seg { font-size: 13px; color: var(--ink-2); margin-top: 3px; }

/* ---- Presentation / projector mode ---- */
.stage-present { position: fixed; inset: 0; z-index: 200; background: var(--ink); color: #fff; display: flex; flex-direction: column; }
.present-bar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; }
.present-bar .p-title { font-family: var(--display); font-weight: 700; }
.present-bar .spacer { margin-left: auto; }
.present-bar button { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.2); border-radius: var(--r-md); min-height: 44px; padding: 0 14px; cursor: pointer; font-family: var(--display); font-weight: 600; display: inline-flex; align-items: center; gap: 7px; }
.present-bar button:hover { background: rgba(255,255,255,.2); }
.present-bar button svg { width: 18px; height: 18px; }
.present-stage { flex: 1; display: grid; place-items: center; text-align: center; padding: 20px; }
.present-word { font-family: var(--reading); font-weight: 700; font-size: clamp(80px, 20vw, 300px); line-height: .95; letter-spacing: .01em; }
.present-word mark { background: transparent; color: var(--butter); }
.present-seg { font-family: var(--reading); font-weight: 700; font-size: clamp(40px, 9vw, 120px); color: rgba(255,255,255,.5); letter-spacing: .06em; }
.present-nav { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 18px; }
.present-nav .nav-btn { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,.12); color: #fff; border: 0; cursor: pointer; display: grid; place-items: center; }
.present-nav .nav-btn:hover { background: rgba(255,255,255,.22); }
.present-nav .nav-btn svg { width: 30px; height: 30px; }
.present-meta { display: flex; gap: 20px; align-items: center; color: rgba(255,255,255,.7); font-family: var(--display); font-weight: 600; }

/* ---- Toolkit specifics ---- */
.spinner-wrap { display: grid; place-items: center; gap: 16px; padding: 14px; }
.spinner { width: min(320px, 74vw); height: min(320px, 74vw); border-radius: 50%; position: relative; border: 10px solid #fff; box-shadow: var(--shadow); transition: transform 3.4s cubic-bezier(.15,.9,.2,1); }
.spinner .seg-label { position: absolute; left: 50%; top: 12%; transform: translateX(-50%); font-family: var(--reading); font-weight: 700; font-size: 22px; color: var(--ink); }
.spinner-pin { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid var(--ink); margin-bottom: -6px; z-index: 2; }
.picker-word { font-family: var(--reading); font-weight: 700; font-size: clamp(48px, 12vw, 96px); text-align: center; margin: 10px 0; }
.deck-builder { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }
.deck-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; padding: 12px; border: 2px dashed var(--line-2); border-radius: var(--r-lg); background: #fff; }
.deck-word { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--r-md); background: var(--butter); font-family: var(--reading); font-weight: 700; }
.deck-word button { background: none; border: 0; cursor: pointer; font-size: 16px; line-height: 1; }

/* pick list rows */
.pick-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.pick { padding: 7px 12px; border-radius: var(--r-md); border: 1px solid var(--line-2); background: #fff; font-family: var(--reading); font-weight: 700; cursor: pointer; }
.pick.on { background: var(--leaf); color: #fff; border-color: var(--leaf); }

/* ---- Teacher guide ---- */
.guide-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.guide { border-radius: var(--r-lg); padding: 20px; border: 1px solid var(--line); background: var(--paper); }
.guide h3 { margin-bottom: 8px; }
.script { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 13px; border-radius: var(--r-md); background: var(--ivory); margin-top: 8px; }
.script span { font-family: var(--reading); }
.script button { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line-2); background: #fff; cursor: pointer; display: grid; place-items: center; }
.script button svg { width: 18px; height: 18px; }
.collapse summary { cursor: pointer; font-family: var(--display); font-weight: 700; padding: 12px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
.collapse summary::-webkit-details-marker { display: none; }
.collapse summary::before { content: "▸"; transition: transform var(--dur) var(--ease); }
.collapse[open] summary::before { transform: rotate(90deg); }

/* ---- Dialog ---- */
.overlay { position: fixed; inset: 0; z-index: 120; background: rgba(34,49,76,.42); display: grid; place-items: center; padding: 18px; animation: fade var(--dur) var(--ease); }
@keyframes fade { from { opacity: 0; } }
.dialog { background: var(--paper); border-radius: var(--r-xl); padding: 26px; max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); max-height: 90vh; overflow: auto; }
.dialog h3 { font-size: 22px; }
.dialog p { color: var(--ink-2); margin-top: 8px; line-height: 1.55; }
.dialog-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ---- Toast ---- */
.toast { position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 18px); background: var(--ink); color: #fff; padding: 13px 18px; border-radius: var(--r-md); opacity: 0; pointer-events: none; transition: var(--dur) var(--ease); z-index: 130; box-shadow: var(--shadow); font-family: var(--display); font-weight: 600; }
.toast.show { opacity: 1; transform: translate(-50%, 0); }

/* ---- Footer ---- */
footer { border-top: 1px solid var(--line); }
.footer-in { max-width: var(--maxw); margin: 0 auto; padding: 22px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; color: var(--ink-2); font-size: 13.5px; }
.footer-in strong { font-family: var(--display); color: var(--ink); }
.cr { font-family: var(--display); font-weight: 700; }

/* ---- Responsive ---- */
@media (max-width: 1024px) {
  .journey { grid-template-columns: repeat(2, 1fr); }
  .tiles { grid-template-columns: repeat(2, 1fr); }
  .deck-builder { grid-template-columns: 1fr; }
  .grid-side { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; }
  .hero-art { display: none; }
  .hero-copy { padding: 38px 28px; }
  .grid-2 { grid-template-columns: 1fr; }
  .sound-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  main { padding: 18px 14px 60px; }
  .topbar-in { padding: 10px 14px; gap: 10px; }
  .brand-copy span { display: none; }
  .top-nav { display: none; }
  .section-head { flex-direction: column; align-items: flex-start; }
  .journey, .tiles { grid-template-columns: 1fr; }
  .resume { grid-template-columns: auto 1fr; }
  .resume > .btn { grid-column: 1 / -1; }
  .options, .options.two { grid-template-columns: 1fr; }
  .sort-cols, .sort-cols.two { grid-template-columns: 1fr; }
  .stepper { gap: 6px; }
  .step { min-width: 108px; }
  .tabs { top: 62px; }
  .hero h1 { font-size: 40px; }
}
@media (max-width: 380px) {
  .sound-grid { grid-template-columns: 1fr; }
}

/* ---- Print (A4) ---- */
@media print {
  @page { size: A4; margin: 14mm; }
  body { background: #fff !important; }
  .topbar, .tabs, .stepper, footer, .toast, .top-actions, .crumb, .no-print, .present-nav, .present-bar { display: none !important; }
  main { max-width: none; padding: 0; }
  .panel, .stage-hero { box-shadow: none !important; border: 1px solid #ccc; background: #fff !important; }
  .view { animation: none; }
  .print-only { display: block !important; }
  .print-sheet { break-inside: avoid; }
  .print-card { border: 1.5px solid #333; border-radius: 10px; padding: 16px; text-align: center; break-inside: avoid; }
  .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8mm; }
  .print-grid .print-card .pw { font-family: var(--reading); font-weight: 700; font-size: 34px; }
  .print-credit { text-align: center; margin-top: 8mm; font-family: var(--display); font-weight: 700; color: #333; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
.print-only { display: none; }
