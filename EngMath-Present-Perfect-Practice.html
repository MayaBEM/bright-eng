<style>
/* EngMath — Present Perfect Tense
   Bright, friendly branding. No external fonts/CDNs — system font stack only. */

:root {
  --coral: #FF6B6B;
  --coral-dark: #E64545;
  --teal: #00B8A9;
  --teal-dark: #009184;
  --yellow: #FFD93D;
  --navy: #1F2A44;
  --navy-soft: #4A5568;
  --bg: #FFFDF7;
  --card: #FFFFFF;
  --border: #EAE3D5;
  --success: #1FA97A;
  --success-bg: #E5F9F1;
  --danger: #E64545;
  --danger-bg: #FDEAEA;
  --radius: 16px;
  --shadow: 0 4px 16px rgba(31, 42, 68, 0.08);
  --shadow-lg: 0 12px 32px rgba(31, 42, 68, 0.14);
  font-size: 16px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--navy);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.55;
  scroll-behavior: smooth;
}

a { color: var(--teal-dark); text-decoration: none; }
a:hover { text-decoration: underline; }

img, svg { max-width: 100%; display: block; }

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ---------- Header / Nav ---------- */
.site-header {
  background: linear-gradient(120deg, var(--navy) 0%, #2B3A5E 100%);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}

.nav-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 1.3rem;
  color: #fff;
}

.brand .logo-badge {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--coral), var(--yellow));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: var(--shadow);
}

.brand small {
  display: block;
  font-weight: 500;
  font-size: 0.65rem;
  color: #C9D2E8;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.main-nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.main-nav a {
  color: #E7ECFB;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 0.92rem;
  font-weight: 600;
  transition: background 0.15s ease;
}

.main-nav a:hover { background: rgba(255,255,255,0.12); text-decoration: none; }
.main-nav a.active { background: var(--coral); color: #fff; }

/* ---------- Hero ---------- */
.hero {
  background: radial-gradient(circle at 20% 20%, rgba(255,217,61,0.35), transparent 45%),
              radial-gradient(circle at 85% 10%, rgba(0,184,169,0.25), transparent 45%),
              var(--bg);
  padding: 56px 0 40px;
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  margin: 0 0 12px;
  font-weight: 800;
  color: var(--navy);
}

.hero p.lede {
  font-size: 1.08rem;
  color: var(--navy-soft);
  max-width: 640px;
  margin: 0 0 24px;
}

.pill-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.pill {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--navy);
  box-shadow: var(--shadow);
}
.pill.coral { color: var(--coral-dark); }
.pill.teal { color: var(--teal-dark); }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 12px;
  padding: 12px 22px;
  font-size: 0.98rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease;
  font-family: inherit;
}
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary { background: var(--coral); color: #fff; box-shadow: 0 6px 16px rgba(230,69,69,0.3); }
.btn-primary:hover { background: var(--coral-dark); }

.btn-teal { background: var(--teal); color: #fff; box-shadow: 0 6px 16px rgba(0,184,169,0.28); }
.btn-teal:hover { background: var(--teal-dark); }

.btn-outline { background: #fff; color: var(--navy); border: 2px solid var(--border); }
.btn-outline:hover { border-color: var(--navy); }

<script>
/* EngMath — localStorage persistence layer.
   All state lives under one key so refreshes / navigation keep progress. */

window.EngMathStorage = (function () {
  var KEY = "engmath_progress_v1";

  function defaultState() {
    return {
      sets: {},        // { "1": { answers: { "1": {selected:0, correct:true} }, completed:false } }
      mistakes: [],     // array of question ids currently "missed" and not yet corrected
      masteredMistakes: [], // ids the student has since answered correctly in Review Mode
      challenge: { highScore: 0, bestStreak: 0, gamesPlayed: 0 },
      studentName: ""
    };
  }

  function safeParse(raw) {
    try {
      var parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") return parsed;
    } catch (e) { /* ignore corrupt data */ }
    return null;
  }

  function load() {
    if (typeof localStorage === "undefined") return defaultState();
    var raw = localStorage.getItem(KEY);
    if (!raw) return defaultState();
    var parsed = safeParse(raw);
    if (!parsed) return defaultState();
    var d = defaultState();
    return Object.assign(d, parsed, {
      sets: parsed.sets || {},
      mistakes: parsed.mistakes || [],
      masteredMistakes: parsed.masteredMistakes || [],
      challenge: Object.assign(d.challenge, parsed.challenge || {})
    });
  }

  function save(state) {
    if (typeof localStorage === "undefined") return;
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function reset() {
    save(defaultState());
  }

  function recordAnswer(setId, questionId, selectedIndex, isCorrect) {
    var state = load();
    var sKey = String(setId);
    if (!state.sets[sKey]) state.sets[sKey] = { answers: {}, completed: false };
    state.sets[sKey].answers[String(questionId)] = { selected: selectedIndex, correct: !!isCorrect };

    var qKey = questionId;
    var mistakes = state.mistakes.filter(function (id) { return id !== qKey; });
    if (!isCorrect) mistakes.push(qKey);
    state.mistakes = mistakes;

    if (isCorrect) {
      if (state.masteredMistakes.indexOf(qKey) === -1) {
        // if it was previously mastered via review, keep it; nothing extra needed here
      }
    }
    save(state);
    return state;
  }

  function markSetCompleted(setId) {
    var state = load();
    var sKey = String(setId);
    if (!state.sets[sKey]) state.sets[sKey] = { answers: {}, completed: false };
    state.sets[sKey].completed = true;
    save(state);
    return state;
  }

  function setCurrentIndex(setId, index) {
    var state = load();
    var sKey = String(setId);
    if (!state.sets[sKey]) state.sets[sKey] = { answers: {}, completed: false };
    state.sets[sKey].currentIndex = index;
    save(state);
    return state;
  }

  function getCurrentIndex(setId) {
    var state = load();
    var sKey = String(setId);
    var setData = state.sets[sKey];
    return setData && typeof setData.currentIndex === "number" ? setData.currentIndex : 0;
  }

  function restartSet(setId) {
    var state = load();
    var sKey = String(setId);
    state.sets[sKey] = { answers: {}, completed: false, currentIndex: 0 };
    save(state);
    return state;
  }

  function getSetProgress(setId, totalQuestions) {
    var state = load();
    var sKey = String(setId);
    var setData = state.sets[sKey];
    if (!setData) return { answered: 0, correct: 0, total: totalQuestions, completed: false };
    var answered = Object.keys(setData.answers).length;
    var correct = Object.values(setData.answers).filter(function (a) { return a.correct; }).length;
    return { answered: answered, correct: correct, total: totalQuestions, completed: !!setData.completed };
  }

  function updateChallenge(streak) {
    var state = load();
    state.challenge.gamesPlayed += 1;
    if (streak > state.challenge.bestStreak) state.challenge.bestStreak = streak;
    if (streak > state.challenge.highScore) state.challenge.highScore = streak;
    save(state);
    return state;
  }

  function setStudentName(name) {
    var state = load();
    state.studentName = name;
    save(state);
    return state;
  }

  return {
    load: load,
    save: save,
    reset: reset,
    recordAnswer: recordAnswer,
    markSetCompleted: markSetCompleted,
    getSetProgress: getSetProgress,
    updateChallenge: updateChallenge,
    setStudentName: setStudentName,
    setCurrentIndex: setCurrentIndex,
    getCurrentIndex: getCurrentIndex,
    restartSet: restartSet
  };
})();

</script>

    return window.ENGMATH_SETS.filter(function (s) { return s.id === setId; })[0];

  function shuffledQuestionIds() {
    var ids = window.ENGMATH_QUESTIONS.map(function (q) { return q.id; });
    for (var i = ids.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = ids[i]; ids[i] = ids[j]; ids[j] = tmp;
    }
    return ids;
  }

  function parseHash() {
    var raw = window.location.hash || "";
    raw = raw.replace(/^#/, "");
    if (!raw) raw = "/";
    var qIndex = raw.indexOf("?");
    var path = qIndex >= 0 ? raw.slice(0, qIndex) : raw;
    var query = qIndex >= 0 ? raw.slice(qIndex + 1) : "";
    if (!path) path = "/";
    var params = {};
    query.split("&").forEach(function (pair) {
      if (!pair) return;
      var kv = pair.split("=");
      params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || "");
    });
    return { path: path, params: params };
  }

          '<div class="lesson-body">' + bodyHtml + "</div>" +
          examplesHtml +
          '<div style="margin-top:18px;"><a class="btn btn-teal btn-sm" href="#/quiz?set=' + lesson.quizSet + '">Practice: ' + (set ? set.title : "Set " + lesson.quizSet) + "</a></div>" +
        "</div>";

      '<section class="section" style="padding-top:36px;">' +
        '<h1 style="margin-top:0;">Lessons</h1>' +
        '<p class="section-sub">Read a lesson, then jump straight into its matching practice set.</p>' +
        '<div class="toc">' + tocHtml + '</div>' +
        '<div>' + listHtml + '</div>' +

  /* ==================================================================
     QUIZ (picker + player + printable results)
     ================================================================== */
  function renderQuizRoute(params) {
    var setId = params.set ? parseInt(params.set, 10) : null;
    if (setId && setMeta(setId)) {
      renderQuizPlayer(setId);
    } else {
      renderQuizPicker();
    }
  }

  function renderQuizPicker() {
    var html = '<h1 style="margin-top:0;">Practice Quiz</h1>' +
      '<p class="section-sub">Choose a set. Each has 15 questions — answer one at a time and click submit to check.</p>' +
      '<div class="grid">';
    window.ENGMATH_SETS.forEach(function (set) {
      var total = questionsForSet(set.id).length;
      var progress = EngMathStorage.getSetProgress(set.id, total);
      var pct = total ? Math.round((progress.answered / total) * 100) : 0;
      var label = progress.completed ? "Review Results" : (progress.answered > 0 ? "Continue" : "Start Set");
      html +=
        '<div class="card set-card">' +
          '<div class="set-top"><h3>Set ' + set.id + ': ' + set.title + '</h3>' + (progress.completed ? '<span class="set-badge">DONE</span>' : '') + '</div>' +
          '<p>' + set.description + '</p>' +
          '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="progress-label">' + progress.answered + ' / ' + total + ' answered</div>' +
          '<div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;"><a class="btn btn-teal btn-sm" href="#/quiz?set=' + set.id + '">' + label + '</a></div>' +
        '</div>';
    });
    html += '</div>';
    appEl.innerHTML = '<section class="section" style="padding-top:36px;">' + html + '</section>';
  }

  function renderQuizPlayer(setId) {
    var meta = setMeta(setId);
    var questions = questionsForSet(setId);
    var progress = EngMathStorage.getSetProgress(setId, questions.length);
    if (progress.completed) { renderQuizResults(setId, questions); return; }

    var startIndex = EngMathStorage.getCurrentIndex(setId);
    if (startIndex >= questions.length) startIndex = questions.length - 1;
    if (startIndex < 0) startIndex = 0;
    var state = { index: startIndex, selected: null };

    function currentAnswerRecord() {
      var s = EngMathStorage.load();
      var setData = s.sets[String(setId)];
      if (!setData) return null;
      return setData.answers[String(questions[state.index].id)] || null;
    }

    function draw() {
      var q = questions[state.index];
      var existing = currentAnswerRecord();
      var isLast = state.index === questions.length - 1;

      var optsHtml = q.options.map(function (opt, i) {
        var cls = "option-btn";
        var disabledAttr = "";
        if (existing) {
          disabledAttr = "disabled";
          if (i === q.correct) cls += " correct";
          else if (i === existing.selected) cls += " incorrect";
        } else if (state.selected === i) {
          cls += " selected";
        }
        return '<button type="button" class="' + cls + '" data-idx="' + i + '" ' + disabledAttr + '><span class="opt-key">' + letters()[i] + '</span><span>' + opt + '</span></button>';
      }).join("");

      var feedbackHtml = "";
      if (existing) {
        feedbackHtml = existing.correct
          ? '<div class="feedback-box correct"><strong>Correct!</strong>' + q.explanation + '</div>'
          : '<div class="feedback-box incorrect"><strong>Not quite.</strong>' + q.explanation + '</div>';
      }

      var pct = Math.round((state.index / questions.length) * 100);

      appEl.innerHTML =
        '<section class="section" style="padding-top:36px;"><div class="quiz-shell">' +
          '<div class="quiz-meta"><span>Set ' + setId + ': ' + meta.title + '</span><span>Question ' + (state.index + 1) + ' of ' + questions.length + '</span></div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="question-card" style="margin-top:18px;">' +
            '<span class="question-topic">' + meta.title + '</span>' +
            '<p style="color:#4A5568; margin:-6px 0 18px; font-size:0.9rem;">' + meta.instruction + '</p>' +
            '<p class="question-prompt">' + q.prompt + '</p>' +
            '<div class="options-list">' + optsHtml + '</div>' +
            feedbackHtml +
            '<div class="quiz-actions">' +
              '<button class="btn btn-outline btn-sm" id="prev-btn" ' + (state.index === 0 ? "disabled" : "") + '>&larr; Previous</button>' +
              (existing
                ? '<button class="btn btn-primary" id="next-btn">' + (isLast ? "See Results" : "Next Question &rarr;") + '</button>'
                : '<button class="btn btn-primary" id="submit-btn" disabled>Submit Answer</button>') +
            '</div>' +
          '</div>' +
        '</div></section>';

      wire(q, existing, isLast);
    }

    function wire(q, existing, isLast) {
      if (!existing) {
        appEl.querySelectorAll(".option-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            state.selected = parseInt(btn.getAttribute("data-idx"), 10);
            draw();
          });
        });
        var submitBtn = appEl.querySelector("#submit-btn");
        submitBtn.disabled = state.selected === null;
        submitBtn.addEventListener("click", function () {
          if (state.selected === null) return;
          var isCorrect = state.selected === q.correct;
          EngMathStorage.recordAnswer(setId, q.id, state.selected, isCorrect);
          EngMathStorage.setCurrentIndex(setId, state.index);
          draw();
        });
      } else {
        appEl.querySelector("#next-btn").addEventListener("click", function () {
          if (isLast) {
            EngMathStorage.markSetCompleted(setId);
            renderQuizResults(setId, questions);
          } else {
            state.index += 1;
            state.selected = null;
            EngMathStorage.setCurrentIndex(setId, state.index);
            draw();
          }
        });
      }
      var prevBtn = appEl.querySelector("#prev-btn");
      prevBtn.addEventListener("click", function () {
        if (state.index === 0) return;
        state.index -= 1;
        state.selected = null;
        EngMathStorage.setCurrentIndex(setId, state.index);
        draw();
      });
    }

    draw();
  }

  function renderQuizResults(setId, questions) {
    var meta = setMeta(setId);
    var s = EngMathStorage.load();
    var setData = s.sets[String(setId)] || { answers: {} };
    var total = questions.length;
    var correctCount = 0;

    var rows = questions.map(function (q) {
      var rec = setData.answers[String(q.id)];
      var answered = !!rec;
      if (answered && rec.correct) correctCount++;
      var yourAnswer = answered ? q.options[rec.selected] : "Not answered";
      var status = answered ? (rec.correct ? "right" : "wrong") : "wrong";
      return (
        '<div class="review-row ' + status + '">' +
          '<div class="rr-q">' + q.prompt.replace("___", "<u>" + q.options[q.correct] + "</u>") + '</div>' +
          '<div class="rr-a">Your answer: <strong>' + yourAnswer + '</strong>' + (answered && !rec.correct ? ' &middot; Correct answer: <strong>' + q.options[q.correct] + '</strong>' : '') + '</div>' +
          '<div class="rr-exp">' + q.explanation + '</div>' +
        '</div>'
      );
    }).join("");

    var pct = total ? Math.round((correctCount / total) * 100) : 0;

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<div class="print-header print-only"><div><strong>EngMath</strong> — Present Perfect Practice: Set ' + setId + '</div><div id="print-name-slot"></div></div>' +
        '<h1 style="margin-top:0;">Results: Set ' + setId + ' — ' + meta.title + '</h1>' +
        '<div class="card" style="margin-bottom:24px;">' +
          '<div class="score-ring-wrap">' +
            '<div><div class="score-big">' + correctCount + '/' + total + '</div><div class="score-sub">' + pct + '% correct</div></div>' +
            '<div class="field no-print" style="flex:1; min-width:220px;"><label for="student-name">Student name (for printed results)</label><input type="text" id="student-name" placeholder="Type your name"></div>' +
          '</div>' +
          '<div class="quiz-actions no-print" style="margin-top:18px;">' +
            '<button class="btn btn-outline" id="retry-btn">Retry This Set</button>' +
            '<div style="display:flex; gap:10px;"><button class="btn btn-teal" id="print-btn">🖨️ Print Results</button><a class="btn btn-primary" href="#/quiz">Back to Sets</a></div>' +
          '</div>' +
        '</div>' +
        '<h2>Question Review</h2>' + rows +
      '</section>';

    var nameInput = appEl.querySelector("#student-name");
    var printSlot = appEl.querySelector("#print-name-slot");
    var savedName = EngMathStorage.load().studentName || "";
    nameInput.value = savedName;
    printSlot.textContent = savedName ? "Student: " + savedName : "";
    nameInput.addEventListener("input", function () {
      EngMathStorage.setStudentName(nameInput.value);
      printSlot.textContent = nameInput.value ? "Student: " + nameInput.value : "";
    });
    appEl.querySelector("#print-btn").addEventListener("click", function () { window.print(); });
    appEl.querySelector("#retry-btn").addEventListener("click", function () {
      if (!window.confirm("Restart Set " + setId + "? Your answers for this set will be cleared.")) return;
      EngMathStorage.restartSet(setId);
      renderQuizPlayer(setId);
    });
  }

  /* ==================================================================
     CHALLENGE GAME
     ================================================================== */
  function livesDisplay(lives) {
    var hearts = "";
    for (var i = 0; i < 3; i++) hearts += (i < lives ? "❤️" : "🤍");
    return hearts;
  }

  function renderChallenge() {
    challengeGame = null;
    renderChallengeIntro();
  }

  function renderChallengeIntro() {
    var state = EngMathStorage.load();
    var c = state.challenge;
    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<h1 style="margin-top:0;">Challenge Game</h1>' +
        '<p class="section-sub">No timer, no clock — just you and the 75-question bank. Answer to build a streak. You have 3 lives; a wrong answer costs one.</p>' +
        '<div class="card" style="max-width:520px;">' +
          '<div class="card-icon icon-coral">🎮</div>' +
          '<h3>How it works</h3>' +
          '<p>Questions come from all five sets in random order. Click an option, then click <strong>Submit Answer</strong> to check it — nothing submits automatically. Click <strong>Next Question</strong> whenever you\'re ready to continue.</p>' +
          '<div class="progress-label" style="margin-bottom:14px;">🏆 Best streak: ' + (c.bestStreak || 0) + ' &middot; Games played: ' + (c.gamesPlayed || 0) + '</div>' +
          '<button class="btn btn-primary btn-block" id="start-challenge-btn">Start Challenge</button>' +
        '</div>' +
      '</section>';

    appEl.querySelector("#start-challenge-btn").addEventListener("click", function () {
      challengeGame = { queue: shuffledQuestionIds(), pos: 0, lives: 3, streak: 0, selected: null, submitted: false };
      drawChallengeGame();
    });
  }

  function drawChallengeGame() {
    var game = challengeGame;
    var q = findQuestion(game.queue[game.pos]);
    var meta = setMeta(q.set);

    var optsHtml = q.options.map(function (opt, i) {
      var cls = "option-btn";
      var disabledAttr = "";
      if (game.submitted) {
        disabledAttr = "disabled";
        if (i === q.correct) cls += " correct";
        else if (i === game.selected) cls += " incorrect";
      } else if (game.selected === i) {
        cls += " selected";
      }
      return '<button type="button" class="' + cls + '" data-idx="' + i + '" ' + disabledAttr + '><span class="opt-key">' + letters()[i] + '</span><span>' + opt + '</span></button>';
    }).join("");

    var feedbackHtml = "";
    if (game.submitted) {
      var wasCorrect = game.selected === q.correct;
      feedbackHtml = wasCorrect
        ? '<div class="feedback-box correct"><strong>Correct! Streak: ' + game.streak + '</strong>' + q.explanation + '</div>'
        : '<div class="feedback-box incorrect"><strong>Not quite — you lost a life.</strong>' + q.explanation + '</div>';
    }

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;"><div class="quiz-shell">' +
        '<div class="quiz-meta"><span>' + livesDisplay(game.lives) + '</span><span>🔥 Streak: ' + game.streak + '</span></div>' +
        '<div class="question-card" style="margin-top:14px;">' +
          '<span class="question-topic">' + meta.title + '</span>' +
          '<p class="question-prompt">' + q.prompt + '</p>' +
          '<div class="options-list">' + optsHtml + '</div>' +
          feedbackHtml +
          '<div class="quiz-actions">' +
            '<button class="btn btn-ghost btn-sm" id="end-btn">End Challenge</button>' +
            (game.submitted
              ? (game.lives <= 0 ? '<button class="btn btn-primary" id="next-q-btn">See Results &rarr;</button>' : '<button class="btn btn-primary" id="next-q-btn">Next Question &rarr;</button>')
              : '<button class="btn btn-primary" id="submit-q-btn" disabled>Submit Answer</button>') +
          '</div>' +
        '</div>' +
      '</div></section>';

    if (!game.submitted) {
      appEl.querySelectorAll(".option-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          game.selected = parseInt(btn.getAttribute("data-idx"), 10);
          drawChallengeGame();
        });
      });
      var submitBtn = appEl.querySelector("#submit-q-btn");
      submitBtn.disabled = game.selected === null;
      submitBtn.addEventListener("click", function () {
        if (game.selected === null) return;
        var isCorrect = game.selected === q.correct;
        EngMathStorage.recordAnswer(q.set, q.id, game.selected, isCorrect);
        if (isCorrect) game.streak += 1; else game.lives -= 1;
        game.submitted = true;
        drawChallengeGame();
      });
    } else {
      appEl.querySelector("#next-q-btn").addEventListener("click", function () {
        if (game.lives <= 0) {
          renderChallengeGameOver();
        } else {
          game.pos += 1;
          if (game.pos >= game.queue.length) game.queue = game.queue.concat(shuffledQuestionIds());
          game.selected = null;
          game.submitted = false;
          drawChallengeGame();
        }
      });
    }

    appEl.querySelector("#end-btn").addEventListener("click", function () {
      if (!window.confirm("End this challenge run? Your streak of " + game.streak + " will be saved.")) return;
      renderChallengeGameOver();
    });
  }

  function renderChallengeGameOver() {
    var game = challengeGame;
    EngMathStorage.updateChallenge(game.streak);
    var state = EngMathStorage.load();
    var isNewBest = game.streak > 0 && game.streak >= state.challenge.bestStreak;

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<div class="card" style="max-width:520px; text-align:center;">' +
          '<div style="font-size:2.4rem;">' + (isNewBest ? "🏆" : "🎯") + '</div>' +
          '<h2>' + (isNewBest ? "New Best Streak!" : "Challenge Complete") + '</h2>' +
          '<div class="score-big" style="margin:10px 0;">' + game.streak + '</div>' +
          '<p class="score-sub">correct answers in a row this run</p>' +
          '<div class="progress-label" style="margin:14px 0;">🏆 All-time best: ' + state.challenge.bestStreak + ' &middot; Games played: ' + state.challenge.gamesPlayed + '</div>' +
          '<div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">' +
            '<button class="btn btn-primary" id="play-again-btn">Play Again</button>' +
            '<a class="btn btn-outline" href="#/">Back Home</a>' +
          '</div>' +
        '</div>' +
      '</section>';

    appEl.querySelector("#play-again-btn").addEventListener("click", function () {
      challengeGame = { queue: shuffledQuestionIds(), pos: 0, lives: 3, streak: 0, selected: null, submitted: false };
      drawChallengeGame();
    });
  }

  /* ==================================================================
     REVIEW MISTAKES
     ================================================================== */
  var reviewSession = null;

  function renderReview() {
    reviewSession = null;
    var state = EngMathStorage.load();
    var mistakeIds = state.mistakes.slice();

    if (!mistakeIds.length) {
      appEl.innerHTML =
        '<section class="section" style="padding-top:36px;">' +
          '<h1 style="margin-top:0;">Review Mistakes</h1>' +
          '<div class="empty-state"><div class="big-emoji">🎉</div><p>No mistakes saved right now — nice work! Answer questions in the <a href="#/quiz">Practice Quiz</a> or <a href="#/challenge">Challenge Game</a> and anything you miss will show up here automatically.</p></div>' +
        '</section>';
      return;
    }

    var byQuestion = mistakeIds.map(findQuestion).filter(Boolean);
    var bySet = {};
    byQuestion.forEach(function (q) { bySet[q.set] = (bySet[q.set] || 0) + 1; });
    var breakdown = Object.keys(bySet).sort().map(function (sid) {
      var meta = setMeta(parseInt(sid, 10));
      return '<li>' + (meta ? meta.title : "Set " + sid) + ': ' + bySet[sid] + ' question(s)</li>';
    }).join("");

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<h1 style="margin-top:0;">Review Mistakes</h1>' +
        '<p class="section-sub">You have <strong>' + byQuestion.length + '</strong> question(s) to review, pulled from the Practice Quiz and Challenge Game.</p>' +
        '<div class="card" style="max-width:520px;">' +
          '<div class="card-icon icon-navy">🔁</div>' +
          '<h3>Ready to review?</h3>' +
          '<ul style="color:#4A5568; padding-left:20px;">' + breakdown + '</ul>' +
          '<button class="btn btn-primary btn-block" id="start-review-btn">Start Review Session</button>' +
        '</div>' +
      '</section>';

    appEl.querySelector("#start-review-btn").addEventListener("click", function () {
      reviewSession = { ids: byQuestion.map(function (q) { return q.id; }), pos: 0, selected: null, submitted: false, fixed: 0, stillMissed: 0 };
      drawReviewSession();
    });
  }

  function drawReviewSession() {
    var session = reviewSession;
    if (session.pos >= session.ids.length) { renderReviewSummary(); return; }
    var q = findQuestion(session.ids[session.pos]);
    var meta = setMeta(q.set);

    var optsHtml = q.options.map(function (opt, i) {
      var cls = "option-btn";
      var disabledAttr = "";
      if (session.submitted) {
        disabledAttr = "disabled";
        if (i === q.correct) cls += " correct";
        else if (i === session.selected) cls += " incorrect";
      } else if (session.selected === i) {
        cls += " selected";
      }
      return '<button type="button" class="' + cls + '" data-idx="' + i + '" ' + disabledAttr + '><span class="opt-key">' + letters()[i] + '</span><span>' + opt + '</span></button>';
    }).join("");

    var feedbackHtml = "";
    if (session.submitted) {
      var wasCorrect = session.selected === q.correct;
      feedbackHtml = wasCorrect
        ? '<div class="feedback-box correct"><strong>Fixed it! Nice.</strong>' + q.explanation + '</div>'
        : '<div class="feedback-box incorrect"><strong>Still not quite.</strong>' + q.explanation + '</div>';
    }

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;"><div class="quiz-shell">' +
        '<div class="quiz-meta"><span>Review Session</span><span>Question ' + (session.pos + 1) + ' of ' + session.ids.length + '</span></div>' +
        '<div class="question-card" style="margin-top:14px;">' +
          '<span class="question-topic">' + meta.title + '</span>' +
          '<p class="question-prompt">' + q.prompt + '</p>' +
          '<div class="options-list">' + optsHtml + '</div>' +
          feedbackHtml +
          '<div class="quiz-actions">' +
            (session.submitted
              ? '<button class="btn btn-primary" id="next-review-btn">' + (session.pos === session.ids.length - 1 ? "Finish Review" : "Next Question &rarr;") + '</button>'
              : '<button class="btn btn-primary" id="submit-review-btn" disabled>Submit Answer</button>') +
          '</div>' +
        '</div>' +
      '</div></section>';

    if (!session.submitted) {
      appEl.querySelectorAll(".option-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          session.selected = parseInt(btn.getAttribute("data-idx"), 10);
          drawReviewSession();
        });
      });
      var submitBtn = appEl.querySelector("#submit-review-btn");
      submitBtn.disabled = session.selected === null;
      submitBtn.addEventListener("click", function () {
        if (session.selected === null) return;
        var isCorrect = session.selected === q.correct;
        EngMathStorage.recordAnswer(q.set, q.id, session.selected, isCorrect);
        if (isCorrect) session.fixed += 1; else session.stillMissed += 1;
        session.submitted = true;
        drawReviewSession();
      });
    } else {
      appEl.querySelector("#next-review-btn").addEventListener("click", function () {
        session.pos += 1;
        session.selected = null;
        session.submitted = false;
        drawReviewSession();
      });
    }
  }

  function renderReviewSummary() {
    var session = reviewSession;
    var remaining = EngMathStorage.load().mistakes.length;
    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<div class="card" style="max-width:520px; text-align:center;">' +
          '<div style="font-size:2.4rem;">✅</div>' +
          '<h2>Review Session Complete</h2>' +
          '<p class="score-sub">' + session.fixed + ' fixed &middot; ' + session.stillMissed + ' still need practice</p>' +
          '<div class="progress-label" style="margin:14px 0;">Remaining in your Review list: ' + remaining + '</div>' +
          '<div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;"><a class="btn btn-primary" href="#/review">Back to Review</a><a class="btn btn-outline" href="#/">Back Home</a></div>' +
        '</div>' +
      '</section>';
  }

  /* ==================================================================
     TEACHER MODE — printable full answer key
     ================================================================== */
  function renderTeacher() {
    var tocHtml = "";
    var contentHtml = "";

    window.ENGMATH_SETS.forEach(function (set) {
      tocHtml += '<a href="#tset-' + set.id + '">Set ' + set.id + ': ' + set.title + '</a>';

          '<tr><td>' + (i + 1) + '</td><td>' + q.prompt + '</td><td>' + optsList + '</td>' +
          '<td><strong>' + letters()[q.correct] + '. ' + q.options[q.correct] + '</strong></td>' +
          '<td>' + q.explanation + '</td></tr>'
        );
      }).join("");
      contentHtml +=
        '<div id="tset-' + set.id + '" style="margin-bottom:40px;">' +
          '<h2>Set ' + set.id + ': ' + set.title + '</h2>' +
          '<p class="section-sub" style="margin-bottom:10px;">' + set.instruction + '</p>' +
          '<table class="lesson-table"><thead><tr><th>#</th><th>Question</th><th>Options</th><th>Correct Answer</th><th>Explanation</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>';
    });

    appEl.innerHTML =
      '<section class="section" style="padding-top:36px;">' +
        '<div class="print-header print-only"><div><strong>EngMath</strong> — Present Perfect Tense: Full Answer Key</div></div>' +
        '<h1 style="margin-top:0;">Teacher Mode</h1>' +
        '<p class="section-sub">Open access, no login — everything below is for teachers, tutors, or parents checking work. Print the full key using the button below.</p>' +
        '<div class="banner info no-print">This page reveals every correct answer and explanation for all 75 questions. Students working through the quiz on their own should use <a href="#/quiz">Practice Quiz</a> instead.</div>' +
        '<div class="toc no-print">' + tocHtml + '</div>' +
        '<div class="quiz-actions no-print" style="margin-bottom:24px;"><button class="btn btn-teal" id="print-all-btn">🖨️ Print Full Answer Key</button><span></span></div>' +
        contentHtml +
      '</section>';

    appEl.querySelector("#print-all-btn").addEventListener("click", function () { window.print(); });
  }

  /* ==================================================================
     404
     ================================================================== */
  function render404() {
    appEl.innerHTML =
      '<div class="error-page">' +
        '<div class="code">404</div>' +
        '<h1>Page not found</h1>' +
        '<p class="section-sub">The section you\'re looking for doesn\'t exist.</p>' +
        '<div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px;">' +
          '<a class="btn btn-primary" href="#/">Back Home</a>' +
          '<a class="btn btn-outline" href="#/quiz">Go to Quiz</a>' +
        '</div>' +
      '</div>';
  }

  /* ---------------- router ---------------- */
  var ROUTES = {
    "/": renderHome,
    "/lessons": renderLessons,
    "/quiz": renderQuizRoute,
    "/challenge": renderChallenge,
    "/review": renderReview,
    "/teacher": renderTeacher
  };

  function renderRoute() {
    var parsed = parseHash();
    renderHeader(parsed.path);
    renderFooter();
    var handler = ROUTES[parsed.path];
    if (handler) {
      handler(parsed.params);
    } else {
      render404();
    }
    window.scrollTo(0, 0);
  }

  document.addEventListener("DOMContentLoaded", function () {
    appEl = document.getElementById("app");
    headerEl = document.getElementById("site-header");
    footerEl = document.getElementById("site-footer");
    window.addEventListener("hashchange", renderRoute);
    renderRoute();
  });
})();

</script>
</body>
</html>
